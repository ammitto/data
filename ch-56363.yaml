  justification: Mr. Chuyko is the head of the Regional Executive Committee of the
    All-Russian People's Front and member of the regional Legislative Assembly in
    Tuymen Oblast. Mr. Chuyko is a member of the Kremlin-aligned ruling party “United
    Russia”. As Head of the Regional Executive Committee in his region, Mr. Chuyko
    repeatedly expresses support for Russia’s invasion of Ukraine, spreads propaganda
    messages and denounces Ukrainian authorities as Nazis on social media platforms,
    on regional TV channels and on news agency websites. Given his political influence,
    Mr. Chuyko is responsible for inciting hatred against Ukraine, spreading pro-Russian
    disinformation and propaganda in the context of the war, as well as seeking to
    garner domestic support in Russia for the war against Ukraine. Therefore, he is
    responsible for supporting actions or policies which undermine the territorial
    integrity, sovereignty and independence of Ukraine.
