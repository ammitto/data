  justification: Lieutenant General Khin Hlaing has been the Commander of the Bureau
    of Special Operations 4 since Oct 2022. He is the former Triangle Region Commander
    of the Myanmar Armed Forces (Tatmadaw). He is the former Commander of the 99th
    Light Infantry Division (LID) and he was the Commander of the North-eastern Command
    of the Myanmar Armed Forces (Tatmadaw). As the Commander of the 99th LID he oversaw
    military operations carried out in Shan State in 2016 and early 2017. In that
    context, he is responsible for the atrocities and serious human rights violations
    committed against ethnic minority villagers in Shan State in the second half of
    2016 by the 99th LID. Those include unlawful killings, forced detention and destruction
    of villages.
