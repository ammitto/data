  justification: "“Typhoon” JSC is a leading enterprise in Russia’s military-industrial
    complex that develops, manufactures, and supplies weapons systems that are actively
    used by the Russian armed forces in the war of aggression against Ukraine. For
    instance, the BAL-E coastal missile system which “Typhoon” JSC developed for the
    Russian Ministry of Defence, was used by the Russian armed forces to launch cruise
    missiles against Ukrainian land targets in the Odesa region in June 2022. Moreover,
    the coastal tactical missile system Rubezh-ME developed by “Typhoon” JSC has been
    used by the Russian armed forces to launch missiles from the Crimean peninsula
    since the start of Russia’s war of aggression against Ukraine."
