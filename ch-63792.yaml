  justification: SPS CJSC is a Russia-based entity that manufactures computers and
    other electronic equipment. SPS CJSC is actively involved in circumventing sanctions
    through its partnership with an EU-based entity, namely Woerd-Tech BV. Since the
    imposition of EU sanctions prohibiting the export of semiconductors to Russia,
    the Netherlands-based entity Woerd-Tech BV has been suspected of illegally smuggling
    semiconductors to the Russian Federation. The owner of Woerd-Tech BV has been
    arrested by the competent Dutch authority on suspicion of sanctions circumvention.
    SPS CJSC has functioned as a key facilitator in the illegal smuggling operation
    run by Woerd-Tech BV, acting as the Russia-based recipient of illegally exported
    semiconductors.
