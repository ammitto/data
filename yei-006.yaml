comments1: Sultan Saleh Aida Aida Zabin has engaged in acts that threaten the peace,
  security and stability of Yemen, including violations of applicable international
  humanitarian law and human rights abuses in Yemen. Zabin has played a prominent
  role in a policy of intimidation and use of systematic arrest, detention, torture,
  sexual violence and rape against politically active women. Zabin as director for
  CID is directly responsible for, or by virtue of his authority responsible for,
  and complicit in the use of multiple places of detention including house arrest,
  police stations, formal prisons and detention centres and undisclosed detention
  centres. In these sites, women, including at least one minor, were forcibly disappeared,
  repeatedly interrogated, raped, tortured, denied timely medical treatment and subjected
  to forced labour. Zabin himself directly inflicted torture in some cases. INTERPOL-UN
  Security Council Special Notice web link:https://www.interpol.int/en/How-we-work/Notices/View-UN-Notices-Individuals
