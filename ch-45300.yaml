  justification: Lieutenant General Soe Htut is a member of the Myanmar Armed Forces
    (Tatmadaw). He is also member of the State Administrative Council (SAC) led by
    Commander-in-Chief Min Aung Hlaing. On 1 February 2021, the Myanmar Armed Forces
    (Tatmadaw), led by Commander-in-Chief Min Aung Hlaing, staged a coup in Myanmar
    by setting aside the results of the elections held on 8 November 2020 and by overthrowing
    the democratically elected government. As part of the coup, Vice-President Myint
    Swe, functioning as Acting President, declared a state of emergency on 1 February
    2021 and transferred the legislative, executive and judicial powers of the state
    to the Commander-in-Chief of Defence Services Senior General Min Aung Hlaing.
    On 2 February 2021, the SAC was established to exercise those powers, preventing
    the democratically elected government from fulfilling its mandate. Soe Htut was
    appointed Minister for Home Affairs on 1 February 2021. Soe Htut participated
    in the meeting of the National Defence and Security Committee (NDSC) on 31 January
    2022, which extended the state of emergency until 31 July 2022. Through that decision
    and by being a member of SAC, his activities and policies undermine democracy
    and the rule of law in Myanmar/Burma.
