  justification: Olga Kuznetsova is a judge of the Kyiv District Court of the city
    of Simferopol, Crimea. She has been appointed by the President of the Russian
    Federation Vladimir Putin. She systematically prosecutes Ukrainian citizens for
    political reasons, abusing anti-extremism and anti-terrorism legislation. She
    has repeatedly arrested and extended the arrest of Crimean Tatars on charges of
    belonging to organisations banned in Russia. Kuznetsova sentenced Crimean Tatars
    Ruslan Abdurakhmanov and Rustem Gugurik, despite the lack of evidence linking
    them to a paramilitary group. She extended the arrest of Crimean nurse and civil
    activist Irina Danilovich, whose release was demanded by the United Nations. Those
    who were arrested and sentenced by Kuznetsova were repeatedly recognised as political
    prisoners.
