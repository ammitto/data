  justification: AO Plasma is a state-owned corporation and the largest developer
    and manufacturer of plasma electronics products in Russia, including gas lasers
    and systems based on them, information display tools (plasma panels and monitors
    based on them and other devices), gas-discharge switching devices, and industrial
    ceramics. AO Plasma also produces vacuum-dense metal-ceramic units and a Passive
    Antenna Device that is used by the GLONASS Global Navigation Satellite System.
    GLONASS is a Russian satellite navigation system designed for operational navigation
    and time support for an unlimited number of land, sea, air and space-based users.
    The GLONASS system continually assists the Russian Armed Forces in delivering
    accurate strikes with tactical missiles (e.g. Iskander tactical missiles) during
    the Russia’s war of aggression against Ukraine.
