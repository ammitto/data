  justification: Head (Director) of the Special Affairs Division (DAE) of the Directorate-General
    of Military Counter-Intelligence (Dirección General de Contrainteligencia Militar
    (DGCIM)) since 2017. Head of Office of DGCIM’s Boleita detention centre since
    29 Aug 2022. From 2017 to 2022 he ordered, supervised and directly participated
    in arbitrary detentions, short-term enforced disappearances, torture, including
    sexual violence, and other cruel, inhuman or degrading treatment. Promoted to
    the rank of lieutenant colonel of the Bolivarian National Guard on 1 Jul 2020.
    Responsible for serious human rights violations, including torture, the use of
    excessive force causing death and injury and the ill-treatment of detainees in
    DGCIM facilities committed by himself and by officials under his command. Also
    responsible for the repression of civil society by members of DGCIM under his
    command, as well as being directly involved in such repression. Linked to the
    death of Captain Acosta Arévalo.
