    JSC Serov Mechanical Plant is a Russian plant that produces equipment for oil and gas production, geological exploration and mining. The plant is very important because it is one of the leading suppliers of oil drilling and production equipment to major Russian oil companies such as Lukoil, Gazpromneft and Rosneft. In addition to its important role in the Russian fossil fuel industry, JSC Serov Mechanical Plant produces special products
