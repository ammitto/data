  justification: Htoo Group of Companies is a private conglomerate founded and chaired
    by U Tay Za, who is closely connected to the top leadership of the Myanmar Armed
    Forces (Tatmadaw). Its activities include trading, banking, mining, tourism and
    aviation. Htoo Group of Companies provided the Tatmadaw with financial support
    in 2017 in connection to the Rakhine ‘clearance operations’ and thus contributed
    to serious human rights violations in 2017 against the Rohingya population. Additionally,
    Htoo Group of Companies has acted as an intermediary for the provision of military
    equipment which was used against civilian populations protesting against the 1
    Feb coup, all across the country and in particular in areas with ethnic minorities.
    By contributing to the military’s capabilities to carry out activities undermining
    democracy and the rule of law in Myanmar/Burma, Htoo Group of Companies provided
    support to the Tatmadaw, and engaged in actions that threaten the peace, security
    or stability of Myanmar/Burma.
