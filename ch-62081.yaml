  justification: The Wagner Group is a Russia-based unincorporated private military
    entity, which was established in 2014 as a successor organisation of the Slavonic
    Corps. It is led by Pavel Prigozhin and Mikhail Vatanin. Through the setting-up
    of local entities, and with the support of local governments, the Wagner Group
    finances and conducts its operations. The Wagner Group spearheaded the attacks
    against the Ukrainian towns of Soledar and Bakhmut in January 2023 and it is actively
    participating in Russia’s war of aggression against Ukraine. The Wagner Group
    is therefore responsible for supporting materially actions which undermine and
    threaten the territorial integrity, sovereignty and independence of Ukraine.
