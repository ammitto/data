        value: Ni Lin Aung
  justification: Major General Ni Lin Aung has been working in the Eastern Central
    Command since August 2022. He is the former Commander of the Eastern Command of
    the Myanmar Armed Forces (Tatmadaw). Part of the jurisdiction of the Eastern Command
    is the State of Kayah. In an attack on 24 December 2021 near Moso village in Phruso
    township, Karenni (Kayah) State, at least 35 persons were killed, among them civilians,
    children and two humanitarian aid workers of the NGO Save the Children. The Tatmadaw
    is held responsible for the attack. In his position as Commander of the Eastern
    Command, Major (formerly Brigadier) General Ni Lin Aung directly commanded the
    units in the State of Kayah, including those responsible for that massacre.
