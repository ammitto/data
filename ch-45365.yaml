  justification: Myanmar Gems Enterprise (MGE) is a state-owned enterprise controlled
    by the Myanmar Armed Forces (Tatmadaw), responsible for drafting rules and regulations
    and for supervising and granting permits to local private entrepreneurs, organizing
    emporiums and special sales for the productive hades and gems sale. MGE operates
    under the instructions of the Ministry of Natural Resources and Environmental
    Conservation (MONREC), whose Minister has been appointed by the State Administrative
    Council (SAC). The Myanmar Armed Forces (Tatmadaw), has for a long time held significant
    jade and gemstone interests, especially through MGE’s leadership, which consists
    almost entirely of former military officials, and activities conducted by two
    military conglomerates (Myanmar Economic Holdings Limited (MEHL) and Myanmar Economic
    Corporation Limited (MEC)). The coup of 1 Feb 2021 has put MGE back under military
    control, allowing the Tatmadaw to significantly control the gem sector. MGE generates
    revenue for different department of the Myanmar State and through its various
    activities described above, the Tatmadaw is able to benefit directly or indirectly
    from the revenue generated by this sector, therefore contributing to its capabilities
    to carry out activities undermining democracy and the rule of law and to serious
    human rights violations in Myanmar/Burma.
