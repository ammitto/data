    navigation instrument systems. The contracting parties are other Russian military
    industry companies and the Russian Government itself. In particular, Temp-Avia
    produces basic attitude indicator AGB-96, which is used on Mi-8 helicopters of
    the Russian Armed Forces deployed in the war of aggression against Ukraine.
