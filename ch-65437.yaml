  justification: Iryna Padkavyrava is a prosecutor. She has been associated with the
    prosecuting authorities since at least 2009, when she served as a senior prosecutor
    in the Gomel region. In 2022, she acted as a prosecutor in the trial of an independent
    journalist affiliated with TVP and Belsat TV. At the time, she requested a 4-year
    prison sentence for the journalist. She also took part in the consideration of
    appeals against sentences handed down for posting entries on Belarusian social
    media critical of the government and its officials. As a prosecutor, she supported
    the penalties, considering them adequate and fair.
