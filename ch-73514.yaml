  justification: Ángel Pineda Ávila is the Secretary-General of the Public Ministry
    (Ministerio Público) of Guatemala (equivalent to the Public Prosecutor’s Office).
    He is second-in-command in the Public Ministry after the Attorney General, and
    Head of the General Secretariat of that institution. In that position, Ángel Pineda
    Ávila is involved in efforts to overturn the results of the first and second round
    of elections held in June and August 2023, including through spurious criminal
    investigations targeting the Supreme Electoral Tribunal, the political party Movimiento
    Semilla and President Arévalo. In December 2023, he participated in a press conference
    where the Public Ministry presented claims that the outcome of the first round
    of elections in June 2023 was invalid. In 2025, Ángel Pineda Ávila engaged in
    the spurious investigation into indigenous leaders who were accused of terrorism
    for their actions in defending the 2023 election results.
