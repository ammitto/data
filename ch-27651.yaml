  justification: 'Engaging in or providing support for acts that undermine the peace,
    stability or security of CAR: Since the coup d’état on 24 Mar 2013, Bozizé provided
    financial and material support to militiamen who are working to destabilize the
    ongoing transition and to bring him back to power. François Bozizé, in liaison
    with his supporters, encouraged the attack of 5 Dec 2013 on Bangui. The situation
    in CAR deteriorated rapidly after the 5 Dec 2013 attack in Bangui by anti-Balaka
    forces that left over 700 people dead. Since then, he has continued trying to
    run destabilization operations and to federate the anti-balakas militias, in order
    to maintain tensions in the capital of CAR. Bozizé tried to reorganize many elements
    from the Central African Armed Forces who dispersed into the countryside after
    the coup d’état. Forces loyal to Bozizé have become involved in reprisal attacks
    against CAR’s Muslim population. Bozizé called on his militia to pursue the atrocities
    against the current regime and the Islamists.'
