  justification: Two-thirds of Bahrain-based Future Bank are owned by Iranian banks.
    Bank Melli and Bank Saderat each own one-third of the shares, the remaining third
    being held by Ahli United Bank (AUB) of Bahrain. Although AUB still owns its shares
    of Future Bank, according to its 2007 annual report, AUB no longer exercises significant
    influence over the bank which is effectively controlled by its Iranian parents
    both of which are singled out in UNSCR 1803 as Iranian banks requiring particular
    «vigilance». The tight links between Future Bank and Iran are further evidenced
    by the fact that the Chairman of Bank Melli has also held concurrently the position
    of Chairman of Future Bank.
