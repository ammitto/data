  justification: Gleb Varenitsa is General Director of the Joint Stock Company Novosibirsk
    Plant of Artificial Fiber (JSC NZIV), which is an enterprise of the Russian military-industrial
    complex that produces industrial explosives for use in the Russian Armed Forces’
    multiple launch rocket systems. The industrial explosives produced by JSC NZIV
    are used in the Uragan, Smerch and Topol-S multiple launch rocket systems, which
    are extensively used by the Russian army in Russia’s war of aggression against
    Ukraine. The main partner of JSC NZIV is another enterprise of the Russian military-industrial
    complex, JSC SPLAV, which develops and assembles multiple launch rocket systems
    for the Russian Armed Forces.
