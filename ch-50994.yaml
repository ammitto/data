  justification: Alexey Mordashov is a Russian businessperson with close links to
    the Russian government. On 24 February 2022, in the aftermath of the initial stages
    of Russia’s war of aggression against Ukraine, Alexey Mordashov, along with 36
    other businesspersons, met with the President of the Russian Federation, Vladimir
    Putin, and other members of the Russian government to discuss the impact of the
    course of action in the wake of Western sanctions. The fact that he was invited
    to attend this meeting shows that he is a member of the closest circle of the
    President of the Russian Federation, Vladimir Putin. Moreover, he was among the
    leading Russian businesspersons who participated in the congress of the Russian
    Union of Industrialists and Entrepreneurs in March 2023, where the President of
    the Russian Federation, Vladimir Putin, gave a speech and urged billionaires to
    put “patriotism before profit”. Alexey Mordashov is the chairman and majority
    shareholder of the company Severgroup, a private investment company with a diversified
    portfolio of assets, including Cordiant group of companies, one of Russia’s leading
    manufacturers of tyres, auto components, thermal equipment and power tools, whose
    subsidiary, Severstal, operates in the steel and mining sector and supplies special
    steel products to the military industry, including armoured steel.
