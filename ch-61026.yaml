  justification: SUN Ship Management (D) Ltd., formerly known as SCF Management Services
    (Dubai) Ltd., is a Dubai-based ship management company, which is part of PAO Sovcomflot
    (SCF Group), Russia’s largest shipping company, specialising in the transportation
    of liquefied gas, crude oil, and petroleum products, as well as the servicing
    of offshore upstream energy production. SUN Ship Management (D) Ltd. manages and
    operates a fleet of almost one hundred oil, liquefied natural gas, and chemical
    vessels with a capacity of more than 150 000 deadweight tonnage. Since the start
    of Russia’s war of aggression against Ukraine, Sun Ship Management (D) Ltd. has
    been operating as one of the key companies managing and operating the maritime
    transport of Russian oil. Importantly, as part of the Russian state shipping company
    PAO Sovcomflot, the Russian Federation is the ultimate beneficiary of the services
    offered by SUN Ship Management (D) Ltd. Such services provide a substantial source
    of revenue to the government of the Russian Federation, accounting for more than
    70 % of Russia’s energy revenue, thereby enabling the Kremlin to finance its war
    of aggression against Ukraine.
