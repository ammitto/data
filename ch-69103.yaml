        value: Hla Moe
  justification: Major General Hla Moe is the commander of the Eastern Command. Under
    his command, airstrikes in particular in Kayah state have risen sharply, doubling
    the combined total in 2021 and 2022. These airstrikes increasingly target civilians,
    leading to higher civilian casualties and an increasing number of IDPs (up from
    a total of 200 000 in 2022 to 250 000 so far in 2023). Under the command of Hla
    Moe, the military units of the Eastern Command continue to commit serious breaches
    of international humanitarian law and human rights violations, including using
    civilians as human shields, extrajudicial killings and arson in Southern Shan
    and Kayah State. In addition to committing these acts of violence, they actively
    obstruct the flow of food supply, medicines and essential goods and services to
    the local population and IDPs.
