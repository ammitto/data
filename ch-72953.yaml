  justification: Vitaly Kuzmenko is the General Director of JSC 163 Armor Repair Plant.
    JSC 163 Armor Repair Plant’s primary activity is maintenance of T-72 main battle
    tanks and BMP-2 amphibious infantry fighting vehicles. The plant is part of the
    High Precision Systems holding company of Rostec. Various models of BMP-2 infantry
    fighting vehicles and T-72 main battle tanks are used by the Russian army in the
    war of aggression against Ukraine. JSC 163 Armor Repair Plant set a record in
