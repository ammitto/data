  justification: Brigadier-General Ahmad Vahidi has been a prominent member of the
    Islamic Revolutionary Guard Corps (IRGC) since 1979. He was appointed as Deputy
    Chief for Intelligence in 1981, played a role in organising the Ministry of Intelligence,
    became the first commander of the IRGC Quds Force in 1988 and was in charge of
    the IRGC Intelligence Unit. He further set up a number of IRGC garrisons that
    are responsible for organising terrorist activities. In 1997, he was transferred
    to the Ministry of Defense. He has been nominated as Defence Minister in 2009
    and served in this post until 2013. He is still a high-ranking figure within the
    IRGC.
