  justification: OJSC BelAZ is one of the leading state-owned companies in Belarus
    and one of the largest manufacturers of large trucks and large dump trucks in
    the world. It is a source of significant revenue for the Lukashenka regime. Lukashenka
    stated that the government will always support the company, and described it as
    a “Belarusian brand” and “part of the national legacy”. OJSC BelAZ has offered
    its premises and equipment to stage a political rally in support of the Lukashenka
    regime. Therefore OJSC BelAZ benefits from and supports the Lukashenka regime.
    The employees of OJSC BelAZ who took part in strikes and peaceful protests in
    the aftermath of the fraudulent Aug 2020 elections in Belarus were threatened
    with layoffs and intimidated by the company management. A group of employees was
    locked indoors by OJSC BelAZ to prevent them from joining the other protesters.
    The company management presented a strike to the media as a staff meeting. Therefore
    OJSC BelAZ is responsible for the repression of civil society and supports the
    Lukashenka regime.
