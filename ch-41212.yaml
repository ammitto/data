  justification: Member of the Federation Council of the Russian Federation for the
    illegally annexed City of Sevastopol and Deputy Chair of the Federation Council
    Committee on Science, Education and Culture. In taking on and acting in this capacity,
    she has worked for further integration of the illegally annexed City of Sevastopol
    into the Russian Federation. On 22 Feb 2022, Altabaeva supported, in the Federation
    Council, the ratification of the government decisions of the ‘Treaty of Friendship,
    Cooperation and Mutual Assistance between the Russian Federation and the “Donetsk
