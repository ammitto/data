  justification: Lieutenant General Aung Kyaw Zaw was the Commander of the Bureau
    of Special Operations No 3 of the Myanmar Armed Forces (Tatmadaw) from Aug 2015
    to the end of 2017. The Bureau of Special Operations No 3 oversaw the Western
    Command and, in that context, Lieutenant General Aung Kyaw Zaw is responsible
    for the atrocities and serious human rights violations committed against the Rohingya
    population in Rakhine State by the Western Command during that period. These include
    unlawful killings, sexual violence and the systematic burning of Rohingya houses
    and buildings.
