  justification: Former judge at the Central District Court of the city of Minsk.
    He was directly involved in the judicial repression of the peaceful demonstrators
    on 19 December 2010. On 20 December 2010, he sentenced civil society activist
    Uladzimir Kozhych to 14 days in jail. On 31 January 2011, he sentenced civil society
    activist Maksim Viniarski to 10 days in jail for his participation in a demonstration
    in support of political prisoners. On 24 and 26 October 2011, he sentenced civil
    society activists Alyaksandr Valantsevich and Alyaksandr Saldatsenka to 7 days
    in jail. On 9 January 2012, he sentenced civil society activist Mikita Kavalenka
    to 15 days in jail for his participation in a one-minute action in support of
    political prisoners. The way he conducted the trials was a clear violation of
    the Code of Criminal Procedure. He sustained the use of evidence and testimonies
    irrelevant to the accused.
