  justification: |-
    Myanmar War Veterans Organization (MWVO) is a non-governmental organization that aims at providing support to former members of the Myanmar Armed Forces (Tatmadaw). It is the main organization that weighs in on social and economic issues related to the military in the country. On 1 Feb 2021, the Myanmar Armed Forces (Tatmadaw), led by Commander-in-Chief Min Aung Hlaing, seized power from the civilian legitimate Government in a coup d’état and established the State Administration Council (SAC) to exercise legislative, executive and judicial powers of the State. On 2 Feb, the SAC was established to exercise those powers, preventing the democratically elected government from fulfilling its mandate. According to MWVO’s mandate, the non-governmental organization acts as a reserve force of the Tatmadaw and takes part in shaping the national defence and security policy. Additionally, MWVO organizes pro-regime rallies and practises people’s militia, therefore supporting Tatmadaw carrying out activities undermining democracy and the rule of law Myanmar/Burma.
    The central patron group of MWVO is represented by high-ranking figures of Tatmadaw such as Commander-in-Chief Min Aung Hlaing and Deputy-Commander-in-Chief Soe Win. Members of the MWVO are part of the governance structure of the military-led conglomerates, the Myanmar Economic Holdings Limited (MEHL) and Myanmar Economic Corporation Limited (MEC). Therefore, MWVO is associated with persons and entities listed under Council Decision (CFSP) 2013/184 and Council Regulation (EU) No 401/2013.
