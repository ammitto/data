  justification: Myanmar Economic Holdings Public Company Ltd (MEHL) is a conglomerate
    owned and controlled by the Myanmar Armed Forces (Tatmadaw), having subsidiaries
    and affiliated companies in diverse sectors of the economy, including banking,
    insurance, construction, trade, transportation, mining, gem extraction, manufacturing
    and tourism. MEHL and its subsidiaries generate revenue for the Tatmadaw, therefore
    contributing to its capabilities to carry out activities undermining democracy
    and the rule of law and to serious human rights violations in Myanmar/Burma. MEHL
    and its subsidiaries donated assets to the military in 2017 during the Tatmadaw’s
    fundraising ceremonies. Therefore, MEHL financially supported the Tatmadaw and
    thus contributed to its capability to carry out the “clearance operations” and
    serious human rights violations in 2017 against the Rohingya population. MEHL’s
    board of directors is exclusively composed of senior officers (active or retired)
    of the Tatmadaw. Two members of the board of Directors (Lt. Gen. Dwe Aung Lin
    and Lt. Gen. Moe Myint Tun) are also members of the State Administration Council,
    the ad hoc body created after the 1 Feb coup, currently governing de facto Myanmar.
    Commander-in-Chief Min Aung Hlaing and Deputy-Commander-in-Chief Soe Win lead
    the Patron Group of MEHL as Chairman and Vice Chairman, respectively.
