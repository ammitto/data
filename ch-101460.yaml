  justification: The 5 Segond gang is a powerful gang in Haiti, based in the Village
    de Dieu neighbourhood in Port-au-Prince. Its leader is Johnson André, a.k.a “Izo”.
    The 5 Segond gang was officially part of the G-Pèp gang alliance. In 2024, G-Pèp
    and its former rivals, G9 Family and Allies, formed a new coalition, Viv Ansanm,
    a.k.a. Living Together. Together, they increased attacks against state institutions
    and contributed to instability. The 5 Segond gang also commits theft, rape, kidnapping,
    murder, piracy, and extortion, obstructs humanitarian aid and engages in arms
    and drugs trafficking.
