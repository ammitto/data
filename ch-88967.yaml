  justification: Autonomous Non-Commercial Organization “Directorate of the Exhibition
    of Achievements ‘Russia’” organised the international exhibition and forum “Russia”
    and now manages the National Center “Russia”. In July 2024, President Vladimir
    Putin signed an order to establish the National Center “Russia” to preserve the
    legacy of the exhibition on a permanent basis. At the “Russia” exhibition, as
    well as at the National Center “Russia”, there have been exhibitions on the illegally
    occupied Ukrainian territories, which are presented as territories of the Russian
    Federation and showcased alongside Russian territories. At the exhibition, events
    celebrating the Russian occupation and annexation of Ukrainian territories are
    held regularly. Therefore, the Autonomous Non-Commercial Organization “Directorate
    of the Exhibition of Achievements ‘Russia’” is supporting and implementing policies
    which undermine and threaten the territorial integrity, sovereignty and independence
    of Ukraine.
