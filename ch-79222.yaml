  justification: Colonel Saw Chit Thu is a Karen/Kayin warlord and businessperson.
    He is a founding member and the Secretary-General of the Karen/Kayin Border Guard
    Forces (BGF)/Karen National Army (KNA), an armed group affiliated with the Tatmadaw
    (the Myanmar Armed Forces). Under Chit Thu’s leadership, the BGF/KNA is responsible
    for human rights violations and abuses against civilians in its operations areas,
    including scam compounds like Shwe Kokko. The compounds are regional hubs for
    transnational crime, including online fraud, drugs and human trafficking. The
    scam compounds are experiencing massive human rights violations, including forced
    labour and torture, thus threatening the peace, security and stability in Myanmar/Burma.
