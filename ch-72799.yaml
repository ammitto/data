  justification: Kang Sun Nam is the former Defence Minister of the Democratic People’s
    Republic of Korea (DPRK). In that position, he supervised the development of the
    DPRK’s unlawful ballistic missile programme and was directly involved in the military
    cooperation between the DPRK and the Russian Federation, which resulted in the
    DPRK providing ammunition to Russia in order to pursue its war of aggression against
    Ukraine. Ballistic missiles designed, developed and produced by the DPRK have
    been used by the Russian Armed Forces against Ukraine. Kang Sun Nam publicly supported
    and justified Russia’s war of aggression against Ukraine. He is thus supporting
    actions which undermine and threaten the territorial integrity, sovereignty and
    independence of Ukraine.
