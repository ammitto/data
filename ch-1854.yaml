  justification: A. Ties to Senior Members of the Former Iraqi Regime. Information
    available also indicates that after Operation Iraqi Freedom, Ayman Sabawi Ibrahim
    Hasan Al-Tikriti provided support to elements of the former regime and to groups
    carrying out attacks against Iraqi and Coalition forces, as well as against Iraqi
    civilians. B. Activities Against the New Iraqi Government, Coalition Forces, and
    Iraqi Civilians. Ayman Sabawi Ibrahim Hasan Al-Tikriti was suspected of financing
    anti-Coalition attacks in central Iraq by the Fedayeen Saddam, an Iraqi paramilitary
    organization formerly headed by Saddam Hussein’s son Uday Saddam Hussein. Ayman
    SabawiIbrahim Hasan Al-Tikriti also reportedly urged Ba’athist loyalists to attack
    Iraq’s infrastructures, notably oil pipelines, water and power facilities. C.
    Immediate Family Member of Senior Former Iraqi Regime Official. Ayman Sabawi Ibrahim
    Hasan Al-Tikriti falls under the requirements of Security Council resolution 1483
    (2003) by virtue of him being an «immediate family member» of a senior former
    Iraqi regime official. His father, Sabawi Ibrahim Hasan Al-Tikriti, was former
    Presidential Advisor to Saddam Hussein.
