  justification: Andrey Falaleev is the rector of the V.I. Vernadsky Crimean Federal
    University. On 4 March 2022, following the beginning of Russia’s war of aggression
    against Ukraine, Andrey Falaleev, in his capacity as the rector of the University,
    signed a letter supporting the actions of the President of the Russian Federation
    Vladimir Putin. During Andrey Falaleev’s leadership at Vernadsky Crimean Federal
    University, an event called “Our Support to the Armed Forces of the Russian Ministry
    of Defence Participating in the Special Military Operation” took place. The main
    objective of the event was to share stories of the heroes of the special military
    operation and explore alternative ways to support the servicemen involved.
