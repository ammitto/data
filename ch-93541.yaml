  justification: Dmitry Kuzyakin is the founder, General Director and co-owner of
    LLC “Center for Integrated Unmanned Solutions”, a company that is part of the
    Russian military and industrial complex. LLC “Center for Integrated Unmanned Solutions”
    deals with the full cycle of first-person view (FPV) systems for combat use, from
    training personnel in piloting and effective use to production of end devices
    and ground equipment. Based in Zhukovsky in the Moscow Oblast, which is the centre
    of Russian aviation research, LLC “Center for Integrated Unmanned Solutions” develops
    and produces unmanned aerial vehicles (UAVs) which are provided to the Russian
    Armed Forces and used in Russia’s war of aggression against Ukraine.
