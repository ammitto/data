        value: Aung Zaw Aye
  justification: Lieutenant General Aung Zaw Aye has been the Shan State chief minister
    since Feb 2023. He is the former Commander of the Bureau of Special Operations
    No 2 of the Myanmar Armed Forces (Tatmadaw). In a military attack on 24 Dec 2021
    near Moso village in Phruso township, Karenni (Kayah) State, at least 35 persons
    were killed, among them civilians, children and two humanitarian aid workers of
    the NGO Save the Children. The Tatmadaw is held responsible for the attack. In
    his position as commander of the Bureau of Special Operations 2, Lt. Gen. Aung
    Zaw Aye was in command of the Eastern Command, which directly commands the military
    units active in the State of Kayah, including those responsible for that massacre.
    Lt. Gen. Aung Zaw Aye is therefore responsible for serious human rights violations
    and for engaging in actions that threaten the peace, security and stability of
    Myanmar/Burma.
