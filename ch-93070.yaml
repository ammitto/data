  justification: JSC “Research Institute of Communication and Control Systems” (JSC
    NIISSU) is a Russian military industry company and part of the JSC Sozvezdie Concern,
    and is therefore ultimately part of the State Corporation Rostec. JSC NIISSU is
    involved in the development of military equipment, as it develops and supplies
    complexes and elements of digital ground-level communication systems and of automated
    control systems to the military of the Russian Federation. JSC NIISSU is therefore
    supporting materially Russia’s military and industrial complex and the Government
    of the Russian Federation, which is responsible for the annexation of Crimea and
    the destabilisation of Ukraine.
