  justification: Evrazia is a Russia-based non-governmental association founded by
    Nelli Parutenco. Its goal is to promote Russian interests in former Soviet republics,
    including in the Republic of Moldova. Evrazia promotes Russian propaganda narratives,
    including among young children at youth camps it organises. Evrazia serves as
    a channel to provide financing from a Russian bank and from Ilan Shor to citizens
    and infrastructure projects in Gagauzia, as well as a channel for the financing
    of violent protest trainings for citizens of the Republic of Moldova, organised
    by Russia. Evrazia funnelled money from Ilan Shor to influence the 2024 presidential
    elections and the 2024 constitutional referendum on accession to the Union. Evrazia
    worked closely with Shor’s “Victory” political bloc, providing financial backing
    and logistical support to bolster Russian influence in the region.
