  justification: Nikita Zakharov is a Russian businessperson, and founder and owner
    of LLC Aeroscan. LLC Aeroscan is a Russian commercial operator that provides services
    in the areas of aerial photography, video and thermal imaging monitoring and laser
    scanning for unmanned aerial vehicles (UAVs). It is also part of the ZALA Aero
    group of companies which specialises in the development and production of UAVs,
    in particular Lancet loitering munitions and reconnaissance UAVs. Lancet loitering
    munitions and the Z-16 UAVs are actively used by the Russian army in its war of
    aggression against Ukraine. LLC Aeroscan also manufactures, in cooperation with
    Zala Aero Group, the new military reconnaissance, artillery fire and battlefield
    surveillance Zala Z-20 UAVs which are also used by the Russian army in its war
    of aggression against Ukraine.
