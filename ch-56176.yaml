  justification: Maya Bolotova (born Tokareva) is the daughter of Nikolay Tokarev,
    the CEO of Transneft, a major Russian oil and gas company. Maya Bolotova and her
    ex-husband Andrei Bolotov own luxury real estate in Moscow, Latvia and Croatia
    worth more than USD 50 million, which can be linked to Nikolay Tokarev. She also
    has links with the company Ronin, which manages the pension fund for Transneft.
    When she applied for Cypriot citizenship, she listed the address of Ronin Europe
    as her own in the press announcement. Furthermore, she is linked to the Ronin
    Trust, which manages the Transneft pension fund, through her real estate company
    Ostozhenka 19 (formerly called RPA Esteit). Maya Bolotova is therefore an immediate
    family member benefitting from Nikolay Tokarev, a leading businessperson operating
    in Russia.
