  justification: Dmitry Skoropupov is the General Director of JSC Uralcryomash. Uralcryomash
    supplies the Ministry of Defence of the Russian Federation under Russia’s state
    defence order. The company supplies naphthalene and oxygen transportation solutions
    for Roscosmos’ Vostochny Cosmodrome. In Vostochny Cosmodrome, satellites are launched
    for the Russian Army to identify targets in the Russian war of aggression against
    Ukraine. Moreover, as a longtime Deputy for the Nizhny Tagil City Duma, he supports
    Russia’s war of aggression against Ukraine by providing humanitarian assistance
    to the so-called Donetsk and Lugansk People’s Republics.
