  justification: |-
    Vasily Gerasimov is the Chairman of the State Control Committee of the Republic of Belarus and a member of the Security Council of the Republic of Belarus. The Security Council of the Republic of Belarus is the constitutional, supreme collective coordinating and political body that enforces the powers of the President. The new Concept of National
    Security of the Security Council provides for the development of a regional grouping of forces of the Republic of Belarus and the Russian Federation, increasing the effectiveness of military command and control bodies. The military-technical cooperation contributes to strengthening the military capabilities of Russia, which is carrying out a war of aggression against Ukraine. In his role as a member of the Security Council, Vasily Gerasimov is supporting materially the Government of the Russian Federation, which is responsible for the annexation of Crimea and the destabilisation of Ukraine.
