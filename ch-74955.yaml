  justification: Ali Ahmed Karti Mohamed was the Sudanese Minister of Foreign Affairs
    under the Government of Omar al-Bashir. Following the fall of the al-Bashir regime,
    Ali Ahmed Karti Mohamed was selected as one of the leaders of the Sudanese Islamist
    Movement (SIM) and led efforts to derail Sudan’s progress towards a full democratic
    transition, by undermining the former civilian-led transitional government and
    the Framework Political Agreement process. This contributed to the conflict between
    the SAF and RSF, which began on 15 April 2023.
