  justification: 'Abhinav Kamal is the captain of crude oil tanker ARGENT (formerly
    JAGUAR, IMO: 9293002). ARGENT is not registered with the International Group of
    Protection and Indemity Clubs and therefore is sailing without a trusted liability
    cover. It is also the only vessel managed by Sapang Shipping Inc (registered owner
    and ship manager) and Zhu Jiang Shipmanagement Co (technical manager), which indicates
    that it operates under a non-transparent corporate governance policy. ARGENT has
    changed management companies and flag state multiple times in the last few years
    and has also sailed without a flag. It has also not verified its Automatic Identification
    Systems on multiple occasions. ARGENT is a vessel that has transported crude oil
    or petroleum products, originating in Russia or exported from Russia, while practicing
    irregular and high-risk shipping practices as set out in the International Maritime
    Organisation General Assembly resolution A.1192(33). As captain of the ARGENT,
    Abhinav Kamal therefore provides material, technical or financial support to the
    operations of a vessel that transports crude oil or petroleum products, originating
    in Russia or exported from Russia, while practicing irregular and high-risk shipping
    practices as set out in the International Maritime Organisation General Assembly
    Resolution A.1192(33). As captain of the ARGENT, he is moreover associated with
    Sapang Shipping Inc, which is managing and operating a vessel that transports
    crude oil or petroleum products, originating in Russia or exported from Russia,
    while practicing irregular and high-risk shipping practices as set out in the
    International Maritime Organisation General Assembly resolution A.1192(33).'
