  justification: OJSC Grodno Tobacco Factory Neman is a Belarusian state-owned enterprise
    and one of the major sources of revenue for the Lukashenka regime. The company
    has a 70-80 % share of the tobacco market in Belarus. Grodno Tobacco Factory Neman
    therefore benefits from and supports the Lukashenka regime. Manufactured in Belarus,
    Grodno Tobacco Factory Neman brands are among the most common cigarettes smuggled
    into the Union as part of the lucrative contraband tobacco trade. Train cars belonging
    to Belarusian state-owned companies Belaruskali and Grodno Azot are used in the
    contraband scheme. Grodno Tobacco Factory Neman therefore contributes to facilitating
    the illegal transfer of restricted goods into the territory of the Union.
