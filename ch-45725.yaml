  justification: Aliaksei Aleksin is one of the leading businessmen in Belarus, with
    business interests in the sectors of oil and energy, real estate, development,
    logistics, tobacco, retail, finance and others. He enjoys a close relationship
    with Aliaksandr Lukashenka and his son and former National Security Advisor Viktar
    Lukashenka. He is active in the biker movement in Belarus, a hobby he shares with
    Viktar Lukashenka. His company owns property in “Alexandria 2” (Mogilev region),
    commonly called “presidential residence”, where Aliaksandr Lukashenka is a frequent
    visitor. He is the co-owner of “Bremino Group” – the initiator and co-administrator
    of the Bremino-Orsha special economic zone project, created by a presidential
    decree signed by Aliaksandr Lukashenka. The company has received state support
    for developing the Bremino-Orsha zone, as well as a number of financial and tax
    advantages and other benefits. Aleksin and other owners of Bremino Group received
    support from Viktar Lukashenka. Companies “Inter Tobacco” and “Energo-Oil”, which
    belong to Aleksin and members of his close family, were given exclusive privileges
    to import tobacco products to Belarus, based on a decree signed by Aliaksandr
    Lukashenka, and received state support for the creation of Tabakierka kiosks.
    He was allegedly involved in the establishment of the first government-approved
    private military company in Belarus “GardServis”, with reported links to the Belarussian
    security apparatus. He is therefore benefitting from the Lukashenka regime.
