  justification: Lieutenant General Dwe Aung Lin is member of the Myanmar Armed Forces
    (Tatmadaw) and he is the Secretary of the State Administration Council (SAC).
    On 1 Feb 2021, the Myanmar Armed Forces (Tatmadaw), led by Commander-in-Chief
    Min Aung Hlaing, staged a coup in Myanmar by setting aside the results of the
    elections held on 8 Nov 2020 and by overthrowing the democratically elected government.
    As part of the coup, Vice-President Myint Swe, functioning as Acting President,
    declared a state of emergency on 1 Feb and transferred the legislative, executive
    and judicial powers of the state to the Commander-in-Chief of Defence Services
    Senior General Min Aung Hlaing. On 2 Feb, the SAC was established to exercise
    those powers, preventing the democratically elected government from fulfilling
    its mandate. Lieutenant General Dwe Aung Lin was appointed Secretary of the SAC
    on 2 Feb 2021 and he has issued orders of the SAC. Amongst others, he ordered
    the removal of individuals from offices they had been appointed to by the legally
    elected government as well as in re-staffing the Myanmar election commission.
    As member and Secretary of the SAC, Lieutenant General Dwe Aung Lin has been directly
    involved in and responsible for decision making concerning state functions and
    is therefore responsible for undermining democracy and the rule of law in Myanmar/Burma.
    Additionally, the SAC adopted decisions restricting the rights to freedom of expression,
    including access to information, and peaceful assembly. The military forces and
    authorities operating under the control of the SAC have committed serious human
    rights violations since 1 Feb 2021, killing civilian and unarmed protestors, restricting
    freedom of assembly and of expression, including by restricting internet access,
    and through arbitrary arrests and detention of opposition leaders and opponents
    of the coup. As member and Secretary of the SAC, Lieutenant General Dwe Aung Lin
    is directly responsible for those repressive decisions and for serious human rights
    violations.
