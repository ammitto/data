  justification: Listed pursuant to paragraph 7 (c), 7 (d), and 7 (e) of resolution
    2293 (2016) as “being political and military leaders of Congolese militias, including
    those receiving support from outside the DRC, who impede the participation of
    their combatants in disarmament, demobilization and reintegration processes”;
    “recruiting or using children in armed conflict in the DRC in violation of applicable
    international law”; “planning, directing, or committing acts in the DRC that constitute
    human rights violations or abuses or violations of international humanitarian
    law, as applicable, including those acts involving the targeting of civilians,
    including killing and maiming, rape and other sexual violence, abduction, forced
    displacement, and attacks on schools and hospitals” and “acting on behalf of or
    at the direction of a designated individual or entity, or acting on behalf of
    or at the direction of an entity owned or controlled by a designated individual
    or entity”, as extended by resolution 2688 (2023). As a military leader of an
    armed Congolese militia, MICHEL RUKUNDA is involved in promulgating and supporting
    the group’s activities.
