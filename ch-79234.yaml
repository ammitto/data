  justification: Lieutenant Colonel Mote Thun is a founding member and the Deputy
    Secretary-General of the Karen/Kayin Border Guard Forces (BGF/Karen National Army
    (KNA), an armed group affiliated with the Tatmadaw (Myanmar Armed Forces). He
    is particularly powerful in the South of Myawaddy township at the Thai-Myanmar
    border, where many scam centres are located. Key compounds under Mote Thun’s control
    include Wan Kuok-Koi’s (a.k.a. Broken Tooth) and Dongmei Zone. Mote Thun is also
    involved in the KK Park Project. The compounds are regional hubs for transnational
    crime, including online fraud, drugs, human trafficking. The scam compounds are
    experiencing massive human rights violations, including forced labour and torture,
    thus threatening peace, security and stability in Myanmar/Burma.
