  justification: Zamid Chalayev is the commander of the Second Special Purpose Police
    Regiment of the Ministry of Internal Affairs of the Russian Federation in the
    Chechen Republic. As a commander of the Chechen Second Special Purpose Police
    Regiment, Zamid Chalayev actively participates in Russia’s war of aggression against
    Ukraine, taking part in, inter alia, the Russian capture of the city of Mariupol
    and the storming of the metallurgical plant “Azovstal”. Moreover, Zamid Chalayev
    is directly involved in the forced re-education and military training of Ukrainian
    children. He actively contributes to the organisation of “military re-education”
    camps based in the Chechen Republic. One particular indoctrination camp forces
    Ukrainian teenagers to follow a “young fighter course”, which teaches Ukrainian
    children to operate military equipment. Zamid Chalayev is one of the key persons
    involved in the illegal deportation of Ukrainian children to the Republic of Chechnya.
    Zamid Chalayev’s actions violate the rights of Ukrainian children and infringe
    Ukraine’s law and administrative order.
