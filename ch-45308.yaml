  justification: Lieutenant General Tun Tun Naung is a member of the Myanmar Armed
    Forces (Tatmadaw) and was previously a Commander. He is the Minister of Border
    Affairs and member of the National Defence and Security Council (NDSC). In 2013,
    Tun Tun Naung was the Northern Commander overseeing the Burmese military’s conflict
    with the Kachin Independence Army. In this conflict, the Myanmar troops under
    the command of Tun Tun Naung carried out serious human rights abuses and violations
    of international humanitarian law. In 2017, Tun Tun Naung was commanding officer
    of the “1st Bureau of Special Operations”. Under his command, troops committed
    atrocities and serious human rights violations against ethnic minorities in Rakhine
    state during the “Rohingya clearance operations”. Those operations commenced on
    25 August 2017 and involved arbitrary killings, physical abuse, torture, sexual
    violence and detention of Rohingya people. As Commander in 2013 and 2017, Tun
    Tun Naung is responsible for serious human rights violations committed in Myanmar/Burma.
