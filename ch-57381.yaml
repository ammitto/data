  justification: Kan Zaw has been the Minister for Investment and Foreign Economic
    Relations since 19 August 2022. He was appointed by the State Administrative Council
    (SAC), led by Commander-in-Chief Min Aung Hlaing, which took over the legislative,
    executive and judicial powers of the State as of 2 February 2021. He was previously
    appointed by the SAC as the Union Auditor-General following the 1 February 2021
    coup. As Government Minister, he forms part of the military regime which seized
    power during a military coup and overthrew legitimately elected leaders in Myanmar/Burma.
    As Minister for Investment and Foreign Economic Relations, he is in charge of
    facilitating business and investments in Myanmar/Burma and cooperation with foreign
    partners. In that capacity, Kan Zaw takes an active role in supporting the military’s
    efforts to attract foreign investment, thereby contributing to securing the financial
    needs of the military regime. Therefore, he is responsible for undermining democracy
    and the rule of law in Myanmar/Burma as well as for engaging in actions that threaten
    the peace, security and stability of Myanmar.
