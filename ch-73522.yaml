  justification: José Curruchiche Cucul is the Head of the Special Prosecution Office
    Against Impunity (FECI), which operates under the Public Ministry (Ministerio
    Público) of Guatemala (equivalent to the Public Prosecutor’s Office). Under his
    leadership, the FECI spearheaded the ongoing investigation into the creation of
    the political party Movimiento Semilla of President Arévalo. He personally participated
    in the raid by the Public Ministry of the premises of the Supreme Electoral Tribunal
    that entailed the opening of sealed ballot boxes. Additionally, he was involved
    in the request for the suspension of the legal personality of Movimiento Semilla
    in July 2023. Furthermore, in December 2023 he participated in a press conference
    where the Public Ministry presented claims that the outcome of the first round
    of elections in June 2023 was invalid. He has been personally involved in the
    spurious investigation into and the spurious prosecution of democratically elected
    authorities, former representatives of the media (such as journalist José Rubén
    Zamora), as well as justice operators, especially the spurious investigation into
    and the spurious prosecution of those who fought against corruption and impunity
    with the International Commission Against Impunity in Guatemala (CICIG).
