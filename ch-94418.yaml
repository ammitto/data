  justification: The Foundation Against Terrorism (Fundación contra el Terrorismo),
    FCT, is involved in a campaign of politically-motivated prosecutions led by the
    Guatemalan Attorney General’s Office against journalists, prosecutors and judges
    who have been involved in exposing corruption and impunity in Guatemala as well
    as against the democratically-elected government of Guatemala, including President
    Bernardo Arévalo. The FCT has initiated a multitude of criminal investigations
    against justice operators, journalists and representatives of the government through
    the filing of criminal complaints and by acting as third party plaintiff in criminal
    proceedings that do not respect the fundamental rights of defendants.
