  justification: Ahmed Diriye was appointed as the new emir of Al-Shabaab following
    the death of the previous leader Ahmed Abdi aw-Mohamed, an individual listed by
    the Security Council Committee pursuant to resolutions 751 (1992) and 1907 (2009).
    This was publicly announced in a statement by Al-Shabaab’s spokesperson, Sheikh
    Ali Dheere, released on 6 Sep 2014. Diriye has been a senior member of Al-Shabaab
    and as the emir he exercises command responsibility for Al-Shabaab’s operations.
    He will be directly responsible for Al-Shabaab’s activities which continue to
    threaten the peace, security and stability of Somalia. Diriye has since adopted
    the Arabic name Sheikh Ahmed Umar Abu Ubaidah.
