uk_statement_of_reasons: "\nThe Secretary of State considers that there are reasonable
  grounds to suspect that Oleg Igorevich FISHELEV is and has been involved in destabilising
  Ukraine or undermining or threatening the territorial integrity, sovereignty or
  independence of Ukraine by directly owning entities involved in providing economic
  resources, goods or technology that could contribute to destabilising Ukraine or
  undermining or threatening the territorial integrity, sovereignty or independence
  of Ukraine. Namely, FISHELEV is the owner of LIMITED LIABILITY COMPANY UNIMATIC,
  DALIAN UNITECH TRADING CO., LTD. and DALIAN UNIMATIC TRADING CO., LTD. which are
  involved persons. \n \nThe Secretary of State considers that there are reasonable
  grounds to suspect that Oleg Igorevich FISHELEV is and has been involved in obtaining
  a benefit from or supporting the Government of Russia by directly owning an entity
  involved in carrying on business in a sector of strategic significance to the Government
  of Russia, namely he is the owner of LIMITED LIABILITY COMPANY UNIMATIC which is
  carrying on business in the Russian defence sector. \n"
