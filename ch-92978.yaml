  justification: JSC Airburg is a military industry company specialised in the design
    and production of manned aerial vehicles and unmanned aerial vehicles (UAVs).
    One of its key developments is the Phaeton, a UAV that offers significant advantages
    in range, flight time, and ease of take-off and landing. With support from the
    Ministry of Industry and Trade of the Russian Federation, JSC Airburg has recently
    launched a new factory site. The Ministry of Industry and Trade has allocated
    over 380 million roubles for production modernisation and expansion, further strengthening
    the company’s role in advancing Russian UAV technology. UAVs manufactured by JSC
    Airburg are used by Russia in its war of aggression against Ukraine.
