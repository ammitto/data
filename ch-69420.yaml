  justification: Oleg Mishchenko is the First Deputy Chairman of the State Military-Industrial
    Committee of the Republic of Belarus. In his capacity as the First Deputy Chairman
    of the State Military-Industrial Committee of the Republic of Belarus he increased
    the supply of military equipment to Russia against the backdrop of its war of
    aggression against Ukraine. Moreover, a military-technical cooperation programme
    between Moscow and Minsk until 2025 will be put into effect, which provides for
    mutual deliveries of military products in the interests of the law enforcement
    agencies of Belarus and Russia. Therefore, Oleg Mishchenko is supporting materially
    the Government of the Russian Federation, which is responsible for the annexation
    of Crimea and the destabilisation of Ukraine.
