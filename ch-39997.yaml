  justification: Thant Zaw Win is a Major in the 564th Light Infantry Battalion (LIB)
    of the Myanmar Armed Forces (Tatmadaw). In that capacity, he oversaw military
    operations carried out in Rakhine State and is responsible for the atrocities
    and serious human rights violations committed against the Rohingya population
    in Rakhine State by the 564th LIB, notably in and around Maung Nu village on 27
    Aug 2017. These include unlawful killings, sexual violence and systematic burning
    of Rohingya houses and buildings.
