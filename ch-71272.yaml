  justification: Chiril Guzun is the founder and current leader of the “Scutul Poporului”,
    a paramilitary organisation in the Republic of Moldova, including former military,
    police and law-enforcement personnel, which uses violence while attending protests,
    particularly to destabilise the Republic of Moldova. During the attempts of Feb
    2023 to destabilise the national government, groups of protesters affiliated to
    the subsequently-banned “Partidul ȘOR” and to the Building Europe at Home Party,
    “Partidul Acasă Construim Europa” (PACE) were supported and surrounded by members
    of the “Scutul Poporului”, who were involved in riots and violent demonstrations.
