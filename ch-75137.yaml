  justification: Igor Kostin is a judge of the Southern District Military Court of
    the Russian Federation. In his position, he took multiple politically motivated
    decisions against opponents of the illegal annexation of Crimea and Sevastopol,
    as well as decisions based on religious grounds. In particular, Igor Kostin prosecuted
    various members of the Crimean Tatars, such as Seytumer Seytumerov, Osman Seytumerov,
    Rustem Seytmemetov and Amet Suleimanov, as well as other political prisoners.
    He is therefore supporting and implementing actions and policies which undermine
    and threaten the territorial integrity, sovereignty and independence of Ukraine.
