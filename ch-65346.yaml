  justification: In her position as judge of Mazyr district court, Halina Knizhonak
    is responsible for numerous politically-motivated rulings against peaceful protesters,
    in particular the sentencing of Hleb Koipish, Uladzislau Hancharou, Aliaksandr
    Tsimashenka and Daniil Skipalski. She has sentenced people to terms of imprisonment
    for taking part in peaceful protests against the Lukashenka regime. She is therefore
    responsible for serious human rights violations and for seriously undermining
    the rule of law, as well as for the repression of civil society and democratic
    opposition in Belarus.
