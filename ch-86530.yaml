  justification: Vladislav Kostin is the General Director of JSC VNIIR-Progress. JSC
    VNIIR-Progress is a Russian research and development institute that specialises
    in the production of advanced electronic warfare (EW) systems, focusing on technologies
    for signal-jamming and intelligence-gathering. One of its key products is the
    Kometa antenna, which is designed to disrupt communications by interfering with
    radio, satellite and radar frequencies. The Kometa-M variant, a type of Kometa
    antenna, used in devices like the Orlan-10 unmanned aerial vehicle and guided
    bomb kits, employs adaptive antenna arrays to enhance resistance against electronic
    interference, ensuring accurate targeting even under adversarial EW measures.
    Weapons that incorporate Kometa antennas manufactured by JSC VNIIR-Progress are
    extensively used in Russia’s war of aggression against Ukraine, therefore JSC
    VNIIR-Progress is supporting actions which undermine the territorial integrity,
    sovereignty and independence of Ukraine.
