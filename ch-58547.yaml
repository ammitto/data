  justification: Valeriy Dmitrovich Zorkin is the Chairman of the Constitutional Court
    of Russia that recognised as constitutional the ‘agreements’ on the admission
    of the Kherson and Zaporizhzhia regions, the so-called Luhansk People’s Republic
    and the self-proclaimed Donetsk People’s Republic to the Russian Federation. This
    decision artificially creates the image of the legitimacy of Russia's invasion
    of Ukraine and is aimed at endowing those regions with features of actors of international
    legal relations. The Constitutional Court formally plays a decisive role in the
    process of accession of foreign territories to Russia. Therefore, Valeriy Dmitrovich
    Zorkin is responsible for, supporting or implementing actions or policies which
    undermine or threaten the territorial integrity, sovereignty and independence
    of Ukraine, or stability or security in Ukraine, or which obstruct the work of
    international organisations in Ukraine.
