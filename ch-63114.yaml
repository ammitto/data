  justification: Leonid Kharchenko was commander of the “Reconnaissance Battalion”
    intelligence unit of the socalled “Donetsk People’s Republic” and took an active
    part in the separatist movement at an early stage of the armed conflict in Ukraine.
    He was found guilty by a Dutch court over the downing of Malaysia Airlines Flight
    MH17 in 2014. In 2018, Kharchenko retired with the rank of lieutenant colonel
    from the “Donetsk People’s Republic” forces. He took part in local elections in
    Crimea following his recommendation to the Commission by the Crimean Republican
    branch of the “Communists of Russia”. These elections were in breach of Ukrainian
    law and therefore illegal.
