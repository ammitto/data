  justification: Aleksandr Potapov is the Director of Uralvagonzavod, a large Russian
    machine building corporation. It is the only military tank manufacturer in the
    Russian Federation. Tanks are delivered by Uralvagonzavod to the Russian Armed
    Forces for their use in the war of aggression against Ukraine. Furthermore, Potapov
    has held several meetings with officials of the occupied Ukrainian territories.
    During those meetings, Potapov discussed strengthening cooperation between Russian
    industry and the occupying authorities. Therefore, Aleksandr Potapov is supporting
    and implementing actions and policies which undermine and threaten the territorial
    integrity, sovereignty and independence of Ukraine. As Director of Uralvagonzavod,
    he is also associated with Uralvagonzavod which is supporting, materially or financially,
    actions which undermine or threaten the territorial integrity, sovereignty and
    independence of Ukraine.
