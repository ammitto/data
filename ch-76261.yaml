  justification: Vadim Vasiliev is Deputy Minister of Construction, Housing and Utilities
    of the Russian Federation, in charge of the Department for the Implementation
    of Regional Investment Programmes, the Department for Coordination of Socio-Economic
    Development of Regions and the Department of Social and Economic Development of
