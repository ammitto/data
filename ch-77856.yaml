  justification: Tatsiana Shotsik is a judge who has served in the court of Leninsky
    district in Minsk since 2021, having been appointed by Aliaksandr Lukashenka.
    She has issued politically motivated sentences against citizens of Belarus who
    voiced their opinions against the President and the brutality of Belarusian law-enforcement
    structures. Igor Lednik, a political prisoner, who was sentenced by Shotsik to
    three years in prison, died on 20 February 2024.
