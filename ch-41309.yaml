  justification: Leading businessperson operating in Syria benefitting from and supporting
    the former al-Assad regime. Owner of multiple businesses and holding companies
    with interests and activities in various economic sectors such as real estate,
    the luxury hotel industry and commercial centres. Waseem al-Kattan rose rapidly
    as a leading businessperson by imposing taxes on goods smuggled into Eastern Ghouta
    under siege, and is now involved in aggressive forms of clientelism to the benefit
    of the former al-Assad regime. Waseem al-Kattan benefits financially from favoured
    access to public tenders as well as to licences and contracts awarded by government
    agencies as a result of his close ties to the former al-Assad regime.
