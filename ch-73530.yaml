  justification: Leonor Morales Lazo De Sánchez is a prosecutor in the Special Prosecution
    Office Against Impunity (FECI), which operates under the Public Ministry (Ministerio
    Público) of Guatemala (equivalent to the Public Prosecutor’s Office). She is directly
    involved in the ongoing investigation into the creation of the political party
    Movimiento Semilla of President Arévalo. Following the second round of Presidential
    elections in August 2023, she participated in the raid by the Public Ministry
    of the premises of the Supreme Electoral Tribunal that entailed the opening of
    sealed ballot boxes. She also participated in a press conference in December 2023
    where the Public Ministry presented claims that the outcome of the first round
    of elections in June 2023 was invalid.
