  justification: Federal state enterprise “Plant named after Ia. M. Sverdlov” is a
    Russian military-industrial enterprise that manufactures explosives that are used
    by the Russian Armed Forces during Russia’s illegal and unjustified military invasion
    of Ukraine in 2022. The entity has at least three ongoing contracts with the Russian
    Ministry of Defense worth over RUB 608 179 800. Importantly, Federal state enterprise
    “Plant named after Ia. M. Sverdlov” is the only Russian manufacturer of HMX (i.e.
    octogen, a powerful nitroamine high explosive) and RDX (i.e. hexogen, an organic
    compound widely used as an explosive). Russian HMX- and RDX-based explosives have
    been confirmed as used in Ukraine during Russia’s war of aggression against Ukraine.
