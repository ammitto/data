  justification: Mahmoud al-Dj is a leading businessperson operating in Syria under
    the former al-Assad regime, who owns several companies active in different sectors
    such as logistics and tourism. He facilitates illicit transactions between regime-affiliated
    persons and entities in Syria and Eastern Libya, including in relation to narcotics,
    and the shipments of arms and mercenaries. His position is enabled through his
    close ties with the former al-Assad regime, from which he and his businesses are
    benefitting. His activities, on the other hand, support the former al-Assad regime
    and enable it to access illicit revenues. He is therefore benefiting from, and
    providing support to, the former al-Assad regime.
