  justification: Dzmitriy Bubenchik is a Belarussian judge who serves in a Grodno
    District Court. He was appointed by Aliaksandr Lukashenka. He issued politically-motivated
    rulings against the opponents of the Belarusian authorities. On 8 Feb 2023, he
    sentenced Andrzej Poczobut, an independent journalist and a Polish minority activist
    critical of the government of the Republic of Belarus, to eight years imprisonment.
    He is therefore responsible for serious human rights violations and for seriously
    undermining the rule of law, as well as for the repression of civil society and
    democratic opposition in Belarus.
