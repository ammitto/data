  justification: LLC “Krafttek” is a significant system integrator and software developer
    in Russia. The company is responsible for wholesale software trading, as well
    as for wholesale trade in computing equipment, telecommunications equipment and
    other office equipment. In 2024, public data showed that Russian military manufacturers
    were able to use western microchips for the production of military equipment.
    The tools and equipment needed to manufacture such microchips were imported by
    LLC “Krafttek” in circumvention of Union restrictive measures. Since the imposition
    of Union restrictive measures prohibiting the export of microchips and microchip-manufacturing
    equipment to Russia, LLC “Krafttek” has been actively involved in circumventing
    such restrictive measures through acting as the Russia-based recipient of illegally
    exported goods and technologies.
