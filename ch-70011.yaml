  justification: Sergey Lagodiuk is Deputy Chief of the General Staff of the Armed
    Forces of the Republic of Belarus and Head of the Main Operational Directorate.
    The Main Operational Directorate participates in military policy of the Republic
    of Belarus and acts as the leading structural unit of the General Staff in the
    system of strategic planning and management. In his position, Sergey Lagodiuk
    oversees the actions of the Main Operational Directorate. In addition, Sergey
    Lagodiuk is a member of the Joint Board of the Ministry of Defence of the Republic
    of Belarus and the Russian Federation and therefore participates in the bilateral
    Russian-Belarusian cooperation in the military sphere. The Republic of Belarus
    is used as a military hub of the Russian military and that strategically puts
    pressure on Ukraine to keep troops near the border, thus weakening defensive capabilities
    of Ukraine. Therefore, Sergey Lagodiuk, as a member of the Joint Board of the
    Ministry of Defence of the Republic of Belarus and the Russian Federation, is
    supporting materially the Government of the Russian Federation, which is responsible
    for the annexation of Crimea and the destabilisation of Ukraine.
