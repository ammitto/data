  justification: The Joint Stock Company “Scientific and Production Association ‘Impuls’”
    develops and implements automated control systems for the Strategic Rocket Forces
    of the Ministry of Defence of the Russian Federation. It also implements for the
    Armed Forces of the Russian Federation the full life-cycle of its products. The
    entity is a part of the “Automated control systems” division of the “Roselektronika”
    holding of the “Rostec” corporation. It is of strategic importance for the Russian
    Federation, including for the Russian military-industrial complex. Joint Stock
    Company “Scientific and production association ‘Impuls’” manufactures and supplies
    military products used by the Russian Armed Forces in the war of aggression against
    Ukraine. Joint Stock Company “Scientific and production association ‘Impuls’”
    is therefore responsible for supporting and benefitting from the Government of
    the Russian Federation, which is responsible for the annexation of Crimea and
    the destabilisation of Ukraine. Furthermore, Joint Stock Company “Scientific and
    production association ‘Impuls’” is responsible for supporting materially actions
    which undermine the territorial integrity, sovereignty and independence of Ukraine.
