  justification: Secretary-General of the National Electoral Council of Venezuela
    (CNE) since August 2023. In this role, Antonio José Meneses Rodríguez delayed
    the processes in the electoral centers and forbade the acceptance of messages
    from the opposition addressed to the CNE revealing irregularities. Before assuming
    his function at the CNE, he signed a document of the Supreme Audit Office confirming
    the suspension of the electoral rights of opposition leader María Corina Machado.
