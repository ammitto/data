  justification: Nazariy Domanin is the Chairman of the Council of the Regional Branch
    of “Movement of the First” of the Kherson Region. In his position, he is responsible
    for implementing policies and ideas that support Russian annexation of the occupied
    territories of Ukraine. The “Movement of the First” was established in Russia
    with the backing and under the supervision of President of the Russian Federation
    Vladimir Putin. The organisation, using its own television and radio broadcasting
    capabilities, aims to carry forward the traditions of the Soviet pioneers and
    actively contribute to the patriotic upbringing of Russian society as well as
    developing anti-Ukrainian sentiments in children from the territories illegally
    occupied by the Russian Federation. Therefore, Nazariy Domanin is supporting and
    implementing actions and policies which undermine and threaten the territorial
    integrity, sovereignty and independence of Ukraine.
