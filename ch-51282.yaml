  justification: Alexander Vinokurov is a Russian businessperson with interests in
    food retail, pharmaceuticals, agriculture and infrastructure. He is in a leadership
    position in Maraton Group, an investment company. Through this company, he holds
    a significant part of the capital of Magnit, the biggest Russian food retailer
    also active in the sale of pharmaceutical products. Until August 2023, he held
    shares in Demetra Holding, one of Russia’s largest grain traders active in the
    exportation of grains, while Russia is the world’s largest exporter of wheat.
    He is married to Ekaterina Vinokurova, daughter of Sergey Lavrov, the Minister
    of Foreign Affairs of the Russian Federation. His father is Semen Vinokurov, known
    for his activity in the Russian pharmaceutical industry.
