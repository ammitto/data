  justification: Aleksey Uchenov was Deputy Minister of the Ministry of Industry and
    Trade from 2021 to March of 2023.The Ministry of Industry and Trade is the federal
    executive body responsible for the development of state policy and legal regulation
    in the field of, inter alia, the military-industrial complex, space activities
    and the development of aviation technology. The Ministry supervises Russia’s weapons
    and defence industry and plays a crucial role in procuring military equipment
    used in Russia’s war of aggression against Ukraine. During his term as Deputy
    Minister of the Ministry of Industry and Trade, he was responsible for actions
    and activities of the Ministry that undermine and threaten the territorial integrity,
    sovereignty and independence of Ukraine, and he is a natural person supporting
    the Government of the Russian Federation, which is responsible for the annexation
    of Crimea and the destabilisation of Ukraine.
