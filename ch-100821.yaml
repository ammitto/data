  justification: The National Iranian Oil Refining and Distribution Company (NIORDC)
    is a subsidiary (100 %) of the state-owned and operated National Iranian Oil Company
    (NIOC), responsible for engineering and building refineries, pipelines and communications
    networks. NIOC holds the production, sale and export monopoly for Iranian oil.
    The revenue generated by NIOC’s oil sales plays a significant role in funding
    Iran’s military and the IRGC. Furthermore, the Minister of Petroleum is responsible
    for appointing NIORDC’s CEO. Therefore, NIORDC is controlled by the Government
    of Iran and by NIOC, which provides support to and is owned by the Government
    of Iran.
