  justification: Tatsiana Grakun is a Belarusian prosecutor who serves in the Minsk
    Region Prosecutor’s Office. In this position, she has represented the Lukashenka
    regime in politically-motivated cases against journalists. In particular, she
    has prosecuted Maryna Zolatava, TUT.BY editor-in-chief, who was sentenced to 12
    years in prison, and Liudmila Chekina, TUT.BY general director, who was sentenced
    to 12 years in prison in Mar 2023, based on groundless charges of “harming to
    the national security of the Republic of Belarus”. Tatsiana Grakun is therefore
    responsible for serious violations of human rights and the repression of civil
    society and democratic opposition in Belarus.
