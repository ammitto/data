  justification: |-
    Hossein Shamsabadi is the Managing Director and CEO of Paravar Pars Company, which has produced Unmanned Aerial Vehicles (UAVs) for the Islamic Revolutionary Guard Corps (IRGC) Aerospace Force (IRGC AF) and has tested UAVs for the IRGC
    Navy. In particular, Paravar Pars Company was involved in the research, development and production of the Iranian Shahed-171 UAV developed by the IRGC AF. Shahed-171 UAVs produced in Iran are used by the Russian Federation in the war of aggression against Ukraine. In his role, he is therefore responsible for actions and policies which undermine and threaten the territorial integrity, sovereignty and independence of Ukraine.
