  justification: Tatiana Moskalkova is the Commissioner for Human Rights of the Russian
    Federation. In that capacity, she serves as a key government interlocutor, actively
    promoting official narratives that deny the existence of Russian “filtration”
    and deportation practices implemented vis-à-vis the Ukrainian population. Authoritative
    sources confirm that "filtration” camps are part of a major Russian effort to
    “filter” the Ukrainian population as a means of suppressing Ukrainian resistance
    and enforcing loyalty among the remaining population. As part of Russia’s “filtration”
    operations, Russia’s forces and proxies have interrogated, detained, and forcibly
    deported between 900 000 and 1,6 million Ukrainian citizens, including thousands
