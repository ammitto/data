  justification: PJSC Motovilikhinskiye Zavody is a Russian public weapons and ammunition
    manufacturer. It is managed by the company ‘RT Capital’ of the State Corporation
    Rostec. The main activity of PJSC Motovilikhinskiye Zavody is the production of
    military equipment, such as artillery pieces, mortars, and multiple rocket launchers.
    PJSC Motovilikhinskiye Zavody develops and manufactures combat and transport-loading
    vehicles from the Grad, Smerch, Tornado-G, and Tornado-S multiple launch rocket
    systems. It is the only Russian manufacturer of combat and transport-loading vehicles
    from the composition of multiple launch rocket systems of the type ‘Grad’, ‘Smerch’
    and their modified versions ‘Tornado-G’ and ‘Tornado-S’.
