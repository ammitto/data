  justification: The “Engineering Center of Innovative Technologies” specialises in
    the sphere of radio electronics and produces new integrated technological lines
    and electronic components. It participates in the established logistics scheme
    to deliver sanctioned goods (microchips) from abroad to the Russian military-industrial
    complex enterprises that manufacture equipment used in Russia’s war of aggression
    against Ukraine. In view of the western sanctions, the Russian Government has
    provided substantial support to all Russian companies involved in the microelectronics
    industry, which is of strategic importance for Russia’s efforts in the war. Therefore,
    Engineering Center of Innovative Technologies is supporting materially the Government
    of the Russian Federation, which is responsible for the annexation of Crimea and
    the destabilisation of Ukraine. In addition, Engineering Center of Innovative
    Technologies, as its subsidiary, is associated with electronics importer LLC TC
    Fly Bridge.
