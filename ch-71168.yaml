  justification: Listed pursuant to paragraphs 7 (b), 7 (e) and 7 (h) of resolution
    2293 (2016) as “being political and military leaders of foreign armed groups operating
    in the DRC who impede the disarmament and the voluntary repatriation or resettlement
    of combatants belonging to those groups”; “planning, directing, or committing
    acts in the DRC that constitute human rights violations or abuses or violations
    of international humanitarian law, as applicable, including those acts involving
    the targeting of civilians, including killing and maiming, rape and other sexual
    violence, abduction, forced displacement, and attacks on schools and hospitals”;
    and “acting on behalf of or at the direction of a designated individual or entity,
    or acting on behalf of or at the direction of an entity owned or controlled by
    a designated individual or entity,” as extended by resolution 2688 (2023). As
    a military leader of FDLR, APOLLINAIRE HAKIZIMANA is involved in promulgating
    and supporting the group’s activities.
