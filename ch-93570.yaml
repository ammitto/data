  justification: Yaroslav Tabolsky is General Manager of LLC “Moscow Arms Company”,
    which manufactures weapons and ammunition, notably sniper rifles of the Raptor
    Tactical and Specter series, for Armed Forces of the Russian Federation. Since
    2022, sniper rifles of the Raptor series are used by Russian Armed Forces snipers
    in Russia’s war of aggression against Ukraine. LLC “Moscow Arms Company” improves
    the design of its manufactured rifles in coordination with the Russian Armed Forces
    and the Russian University of Special Forces (Gudermes). Sniper rifles produced
    by LLC “Moscow Arms Company” are actively used by Russian snipers at the frontline.
    At least 350 sniper rifle complexes manufactured by LLC “Moscow Arms Company”
    have been provided to the Russian Armed Forces.
