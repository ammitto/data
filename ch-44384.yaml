  justification: Member of the non-democratically elected National Assembly and chair
    of the parliamentary commission that investigates the “actions perpetrated against
    the Republic” by members of the National Assembly elected in 2015. Furthermore,
    José Dionisio Brito Rodríguez illegitimately assumed leadership over opposition
    party Primero Justicia, due to a decision of the Supreme Court in Jun 2020. In
    2019, he was expelled from Primero Justicia over corruption allegations. Moreover,
    as a member of the National Assembly, he participated in the illegitimate election
    of Luis Eduardo Parra Rivero as the President of the National Assembly on 5 Jan
    2020, thereby undermining democracy and the rule of law in Venezuela. The election
    took place while entry of several parliamentarians to the premises of the National
    Assembly was blocked by military police, and without a quorum being reached. Therefore
    opposition members had to organise themselves outside of the premises of the National
    Assembly to re-elect Juan Guaidó as its President. His actions have therefore
    undermined democracy and the rule of law in Venezuela.
