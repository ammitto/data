  justification: In his position as the Deputy Head of the Frunzensky District Police
    Department of Minsk Aliaksandr Zakhvitsevich supervises public security police
    and is responsible for the inhumane and degrading treatment, including torture,
    inflicted on citizens detained in the Frunzenskiy District in the wake of the
    2020 presidential election and for the general brutal crackdown on peaceful protesters
    in this district. Officers under Zakhvitsevich's supervision used torture against
    detainees. He is therefore responsible for serious violations of human rights
    and the repression of civil society and democratic opposition.
