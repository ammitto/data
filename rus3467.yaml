uk_statement_of_reasons: |2

  The Secretary of State considers that there are reasonable grounds to suspect that POSTV is an involved person under the Russia (EU Exit) (Sanctions) Regulations 2019 on the basis of the following ground: it spreads and has spread deliberately misleading information concerning Russia’s full-scale invasion of Ukraine to its audiences, which are predominately located in Georgia, which provides support for or promotes a policy or action which destabilises Ukraine or undermines or threatens the territorial integrity, sovereignty or independence of Ukraine. In particular, it regularly disseminates content that the Ukrainian Government and President Zelensky are illegitimate, Ukraine is a “puppet” of the West, Ukraine is a corrupt country and that Ukraine and the West are seeking to destabilise Georgia.
