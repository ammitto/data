  justification: Nikolay Rogalev is the rector of the National Research University
    “Moscow Power Engineering Institute”, which is a public university in Russia.
    It is actively participating in the “Universities for the Front!” campaign coordinated
    by the Ministry of Science and Higher Education of the Russian Federation. As
    part of that campaign, Russian universities send material aid to Russian soldiers
    participating in the war of aggression against Ukraine. The Moscow Power Engineering
    Institute is involved in such activities. Its students and staff send equipment
    (such as backpacks, bulletproof vests, tactical first aid kits and stretchers)
    to soldiers. At the experimental lab of the Institute, sapper equipment and stoves
    for soldiers have been produced and then shipped to soldiers at the frontlines.
    As the rector of the National Research University “Moscow Power Engineering Institute”,
    Nikolay Rogalev is therefore supporting and implementing actions or policies which
    undermine or threaten the territorial integrity, sovereignty and independence
    of Ukraine.
