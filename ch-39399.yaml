  justification: Brigadier General Khin Maung Soe is the Commander of the Military
    Operation Command 15, also sometimes known as the 15th Light Infantry Division,
    of the Myanmar Armed Forces (Tatmadaw), under which Infantry Battalion No 564
    falls. In that context, he is responsible for the atrocities and serious human
    rights violations committed against the Rohingya population in Rakhine State in
    the second half of 2017 by the Military Operation Command 15, in particular by
    Infantry Battalion No 564. These include unlawful killings, sexual violence and
    the systematic burning of Rohingya houses and buildings.
