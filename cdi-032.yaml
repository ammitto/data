comments1: Muhindo Akili Mundos is an FARDC General, Commander of the 31st Brigade.
  He was appointed commander of the FARDC’s Operational Sector in the areas of Beni
  and Lubero, including Operation Sukola I against the Allied Democratic Forces (ADF)
  in September 2014. He remained in that position until June 2015. He is also a threat
  to the peace, stability and security of the DRC under UNSCR 2293 paragraph 7(e).  INTERPOL-UN
