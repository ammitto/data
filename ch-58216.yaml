  justification: Olga Borisovna Lyubimova is the Minister of Culture of the Russian
    Federation. Under her responsibility, the Ministry has extended both financial
    resources and programme support to the so-called ‘Donetsk People’s Republic’ and
    ‘Luhansk People’s Republic’. Several projects undertaken under her guidance aim
    to integrate those illegally annexed regions of Ukraine into Russia’s cultural
    scene. She is also indirectly involved with the destruction of Ukraine’s cultural
    heritage and artefacts, and for lack of efforts to protect the cultural heritage
    in the now annexed territories.
