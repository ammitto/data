  justification: In his position as the Head of the Main Department for Combating
    Organized Crime and Corruption of the Ministry of Internal Affairs, Mikalai Karpiankau
    is responsible for the inhumane and degrading treatment inflicted on citizens
    who participated in peaceful protests and for their arbitrary arrest and detention.
    Numerous testimonies, photo and video evidence indicate that the group under his
    command beat and arrested peaceful protestors, threatened them with firearms.
    On 6 Sep 2020, Karpiankou was filmed as he was smashing a glass door with a baton
    to the café where peaceful protestors were hiding and brutally detaining them.
    A recording has been published where he claimed his department would use firearms
    against the protestors. He is therefore responsible for serious human rights violations
    and for repression of civil society and democratic opposition.
