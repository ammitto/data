  justification: Judge of Pervomayskij district court in Vitsebsk. On 24 Feb 2012,
    she sentenced Syarhei Kavalenka, who was considered as a political prisoner in
    2012-2013, to two years and one month in prison for violation of probation. Alena
    Zhuk was directly responsible for violations of the human rights of a person because
    she denied Syarhei Kavalenka the right to a fair trial. Syarhei Kavalenka was
    previously given a suspended sentence for hanging out a banned historical white-red-white
    flag, a symbol of the opposition movement, in Vitsebsk. The subsequent sentence
    given by Alena Zhuk was disproportionately harsh given the nature of the crime
    and not in line with the criminal code of Belarus. The actions of Alena Zhuk constituted
    a direct violation of the international commitments of Belarus in the field of
    human rights.
