  justification: Oleg Semenovykh is General Manager of LLC “SKB TSM” and LLC NPO “Favorit”.
    Oleg Semenovykh was the General Director of LLC Favorit Research and Production
    Company (LLC NPK Favorit) until 11 March 2025. LLC NPK Favorit creates automated
    information and control systems for monitoring the surface and ground situation
    of geographically distributed objects, operating on the basis of special software.
    LLC NPK Favorit produces situation awareness systems, mobile complexes, stationary
    automated complexes, optoelectronic equipment, radar stations, lighting equipment,
    multifunctional navigation system (Azimuth-F) as well as mobile maintenance complex
    (Arsenal) and special software designed to automate the activities of control
    bodies. Moreover, some of LLC NPK Favorit products (Ratnik, Helios and Helios-B)
    are used by Russian authorities in the military field as well as for the border
    patrol. LLC NPO “Favorit” bears many similarities to the LLC NPK “Favorit”, such
    as the same top customers and the same main, as well as other, activities.
