  justification: |-
    Tatyana Ilyushnikova is Deputy Minister of the Russian Ministry of Economic Development. During her administration, the Ministry of Economic Development has been involved in activities to undermine and threaten the territorial integrity of Ukraine, including measures to explore the economic potential of the annexed Ukrainian regions
