  justification: Oleg Khorokhordin is the former Head of Altai, a Republic of the
    Russian Federation. In his role as the Head of the Altai Republic, he participated
    in the mobilisation efforts of the Russian Government to recruit soldiers for
    its war of aggression against Ukraine. He directed legislative changes for the
    support of Russian soldiers and their families. He has also personally delivered
    military equipment provided by the Altai Republic to soldiers deployed in the
    war of aggression against Ukraine. He has consistently justified the illegal annexation
    of Crimea and the actions of Russia’s armed forces in Ukraine and issued medals
    to soldiers. Under his leadership, the Altai Republic has promised to participate
    in the Russian restoration of the illegally occupied Ukrainian territories with
    the aim of integrating them into the Russian Federation. Therefore, Oleg Khorokhordin
    is supporting and implementing actions and policies which undermine and threaten
    the territorial integrity, sovereignty and independence of Ukraine.
