  justification: According to open-source and official reporting, including the UNSC
    DRC Sanctions Committee’s Group of Experts’ reports, Mr. Jamil Mukulu is the military
    leader of the Allied Democratic Forces (ADF), a foreign armed group operating
    in the DRC that impedes the disarmament and voluntary repatriation or resettlement
    of ADF combatants, as described in paragraph 4 (b) of resolution 1857 (2008).
    The UNSC DRC Sanction Committee’s Group of Experts has reported that Mukulu has
    provided leadership and material support to the ADF, an armed group operating
    in the territory of the DRC. According to multiple sources including the UNSC
    DRC Sanctions Committee’s Group of Experts’ reports, Jamil Mukulu has also continued
    to exercise influence over the policies, provided financing, and maintained direct
    command and control over the activities of, ADF forces in the field, including
    overseeing links with international terrorist networks.
