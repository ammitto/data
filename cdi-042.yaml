  or acting on behalf of or at the direction of an entity owned or controlled by a
  designated individual or entity”, as reaffirmed by paragraph 2 of resolution 2688
  (2023). As a leader of ADF (CDe.001), MOHAMED ALI NKALUBO is involved in planning,
  promulgating and supporting the armed group’s activities. He has effective command
  and control over the group’s combatants.
