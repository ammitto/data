  justification: JSC Ural Plant of Transport Mechanical Engineering (Uraltransmash)
    is one of the oldest enterprises in the Russian defence complex. It produces a
    wide variety of heavy military equipment including self-propelled artillery machines
    such as Msta-s and Tyulpan. The ownership of Uraltransmash was recently transferred
    to the Tekhmash concern in order to improve efficiency of artillery production.
    The Tekhmash concern is owned by Russian State corporation Rostec. Uraltransmash
    produces Msta-s and Tyulpan self-propelled artillery machines, which are extensively
    used in Ukraine. Military equipment made by Uraltransmash provides crucial fighting
    and firepower capabilities to the Armed Forces of the Russian Federation.
