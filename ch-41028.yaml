  justification: Second Commander and Chief of Staff of the 35th Military Police Brigade
    since 2019. Director of the Special Directorate of Criminal and Criminalistics
    Investigations (DEIPC) at the Directorate-General of Military Counter-Intelligence
    (Dirección General de Contrainteligencia Militar (DGCIM)) from Nov 2018 to Aug
    2019. As Director of DEIPC, he supervised the DGCIM facility in Boleita detention
    centre. During this period, acts of torture and other cruel, inhuman or degrading
    treatment, as well as sexual violence, were committed by DGCIM officials at Boleita.
    Responsible for serious human rights violations, including torture, the use of
    excessive force and the ill-treatment of detainees committed by himself and by
    officials under his command, particularly in Boleita. Linked to the death of Captain
    Acosta Arévalo.
