  justification: Crimea Patriot Centre is an organisation based in illegally annexed
    Crimea, with the main objective to provide schoolchildren in Crimea with a military-patriotic
    education in order to prepare them for service in Russia’s Armed Forces. The Crimea
    Patriot Centre cooperates with the All-Russia “Young Army” Military Patriotic
    Social Movement (Yunarmiya) to organise events and programmes for schoolchildren
    in support of the Russian Army and in support of Russia’s war of aggression against
    Ukraine. Those programmes have the aim of teaching children to use weapons. The
    centre also disseminates propaganda related to Russia’s war of aggression against
    Ukraine, glorifying soldiers who have participated in this. The Crimea Patriot
    Centre operates with the support of and financing by the Ministry of Defence of
    the Russian Federation and without the consent of the Ukrainian government.
