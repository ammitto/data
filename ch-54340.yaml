  justification: The VTB Bank is a systemically important financial institution for
    the Government of the Russian Federation, which in turn is a major shareholder
    of VTB Bank. The bank itself has close ties to Russian intelligence, and its CEO
    was appointed by President Vladimir Putin and has defended his actions including
    the annexation of the Crimean peninsula. As one of Russia’s leading financial
    institutions, largely owned by the Government of the Russian Federation, VTB furthermore
    generates high revenue for the Government of the Russian Federation. In June 2022,
    VTB expressed its intention to recover its former subsidiary, RNCB Bank (main
    bank in Crimea with 70 % of customers on the peninsula), which was nationalised
    following the 2014 sanctions. In October 2022, President Putin signed a law authorising
    the government to transfer 100 % of RNCB shares to VTB. In November 2022, the
    General Director of VTB announced the completion of the transfer of RNBC to VTB
    in the first quarter of 2023. VTB would thus become the leading bank in Crimea.
