  justification: Former President of UCD/FAPC. FAPC’s control of illegal border posts
    between Uganda and the DRC – a key transit route for arms flows. As President
    of the FAPC, he exercised influence over policies and command and control over
    the activities of FAPC forces, which were involved in arms trafficking and, consequently,
    in violations of the arms embargo. According to the Office of the SRSG on Children
    and Armed Conflict, he was responsible for recruitment and use of children in
    Ituri in 2002. One of five senior FARDC officers who had been accused of serious
    crimes involving sexual violence and whose cases the Security Council had brought
    to the Government’s attention during its visit in 2009.
