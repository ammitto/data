  justification: Federal State Budgetary Educational Institution International Children’s
    Centre “Artek” has been under the control of Russia’s Ministry of Education since
    the illegal annexation of Crimea and the city of Sevastopol in 2014. Since the
    beginning of Russia’s war of aggression against Ukraine in 2022, it has been organising
    camps for children from Ukraine, including from the occupied territories of Kherson,
    Donetsk, Luhansk and Zaporizhzhia. In those camps, children prepare supportive
    materials for Russian soldiers participating in the war. In some cases, Ukrainian
    children have not been allowed to return home and have been pushed to show their
    support for Russia.
