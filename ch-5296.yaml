  justification: Public prosecutor of the case against ex-presidential candidates
    Nikolai Statkevich and Dmitri Uss, as well as political and civil society activists
    Andrei Pozniak, Aleksandr Klaskovski, Aleksandr Kvetkevich, Artiom Gribkov and
    Dmitri Bulanov. The accusation presented by him had a clear and imminent political
    motivation and was a clear violation of the Code of Criminal Procedure. It was
    based on an incorrect classification of the events of 19 Dec 2010, and not sustained
    by evidence, proofs and testimonies of witnesses. As a state prosecutor he opposed
    the appeal of Ales Byalyatski regarding the sentence imposed on him by the Pervomaiski
    District Court of Minsk even though Byalyatski's trial was conducted in a way
    that was a clear violation of the Code of Criminal Procedure. Byalyatski was active
    in defending and providing assistance to those who suffered from repression in
    relation to the 19 Dec 2010  elections and the crackdown on civil society and
    on the democratic opposition.
