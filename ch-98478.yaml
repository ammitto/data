  justification: JSC NII Steel is active in the research, development and production
    of materials, structures and technologies for the protection of weapons, military
    equipment and personnel of all types of ground forces, as well as the production
    of innovative protective solutions for civilian use. JSC NII Steel has launched
    the development of the complex of signature reduction systems for the T-90M, T-80
    BVM and T-72B3 tanks. Furthermore, JSC NII Steel supplied protection coating services
    on metal tanks and components (spare parts) of tanks and other self-propelled
    armoured combat vehicles.
