  justification: Tatyana Alexeyevna Golikova is a Deputy Prime Minister of the Russian
    Federation responsible for social policy, labour, health and pension provision.
    She is a Presidium member of the Coordinating Council under the Government to
    meet the needs of the Armed Forces of Russia, other troops, military formations
    and bodies for Russia’s war against Ukraine. She has participated in and approved
    the Russian government's decisions on the mobilisation in Russia, by which she
    has directly supported and been involved in Russia’s war against Ukraine. She
    is also ultimately responsible for the conduct of Russia’s educational system
    in the illegally annexed territories of Ukraine.
