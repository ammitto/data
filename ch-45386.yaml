  justification: Myanma Timber Enterprise (MTE) is a state-owned enterprise operating
    under the Ministry of Natural Resources and Environmental Conservation (MONREC).
    MTE has exclusive rights on the production and the export of timber in Myanmar/Burma.
    On 1 Feb 2021, the Myanmar Armed Forces (Tatmadaw), led by Commander-in-Chief
    Min Aung Hlaing, seized power from the civilian legitimate Government in a coup
    d’état and established the State Administration Council (SAC) to exercise legislative,
    executive and judicial powers of the State. On 2 Feb 2021, the military regime
    appointed a new cabinet, including a new minister for Natural Resources and Environmental
    Conservation (MONREC). Through the SAC and the new cabinet, the military regime
    acquired control over and benefits from state-owned enterprises, including MTE.
    Therefore the Myanma Timber Enterprise and its subsidiaries are controlled by
    and generate revenue for the Tatmadaw, therefore contributing to its capabilities
    to carry out activities undermining democracy and the rule of law.
