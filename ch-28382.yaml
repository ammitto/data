  justification: 'The ownership of the entity was transferred contrary to the Ukrainian
    law. The "Parliament of Crimea" adopted resolution No 1757-6/14 on 17 Mar 2014
    "On nationalisation of some companies belonging to the Ukrainian ministries of
    infrastructure or agriculture" and resolution No 1865-6/14 on 26 Mar 2014 "On
    State-Owned Enterprise "Crimean Sea Ports"" ("О Государственном предприятии "Крьмские
    морские порть"") declaring the appropriation of assets belonging to the state
    enterprise "Kerch Commercial Sea Port" on behalf of the "Republic of Crimea".
    The enterprise is thus effectively confiscated by the Crimean "authorities". In
    terms of volume of trade, it is the second biggest commercial seaport in Crimea.
    Re-registered on 9 Dec 2014 as Limited Liability Company "Kerch seaport" "Kamysh-Burun"
    (ОБЩЕСТВО С ОГРАНИЧЕННОЙ ОТВЕТСТВЕННОСТЬЮ "КЕРЧЕНСКИЙ МОРСКОЙ ПОРТ "КАМЫШ-БУРУН"").
