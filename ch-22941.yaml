  justification: Sultani Makenga is a military leader of the «mouvement du 23 Mars»
    (M23) group operating in the Democratic Republic of the Congo (DRC). As a leader
    of M23 (also known as the Congolese Revolutionary Army), Sultani Makenga has committed
    and is responsible for serious violations of international law involving the targeting
    of women and children in situations of armed conflict, including killing and maiming,
    sexual violence, abduction, and forced displacement. He has also been responsible
    for violations of international law related to M23’s actions in recruiting or
    using children in armed conflict in the DRC. Under the command of Sultani Makenga,
    M23 has carried out extensive atrocities against the civilian population of the
    DRC. According to testimonies and reports, the militants operating under the command
    of Sultani Makenga have conducted rapes throughout Rutshuru territory against
    women and children, some of whom have been as young as 8 years old, as part of
    a policy to consolidate control in Rutshuru territory. Under Makenga’s command,
    M23 has conducted extensive forced recruitment campaigns of children in the DRC
    and in the region, as well as killing, maiming, and injuring scores of children.
    Many of the forced child recruits have been under the age of 15. Makenga has also
    been reported to be the recipient of arms and related materiel in violation of
    measures taken by the DRC to implement the arms embargo, including domestic ordinances
    on the importing and possession of arms and related materiel. Makenga’s actions
    as the leader of M23 have included serious violations of international law and
    atrocities against the civilian population of the DRC, and have aggravated the
    conditions of insecurity, displacement, and conflict in the region.
