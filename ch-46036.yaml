  justification: In his former capacity as the Director of the Aviation Department
    of the Ministry of Transport and Communications of Belarus, Artsiom Sikorski was
    responsible for state management in the sphere of civil aviation and supervision
    of air traffic control. He therefore bears responsibility for diverting passenger
    flight FR4978 to Minsk on 23 May 2021 without a proper justification. This politically
    motivated decision was aimed at arresting and detaining the opposition journalist
    Raman Pratasevich and Sofia Sapega and is a form of repression against civil society
    and democratic opposition of Belarus. Following the incident, he gave press statements
    together with Commander of the Air Force and Air Defence Forces of the Armed Forces
    of the Republic of Belarus, Ihar Holub, justifying the actions of the Belarusian
    aviation authorities. He is therefore responsible for repression of civil society
    and democratic opposition and is supporting the Lukashenka regime. He remains
    active in the Lukashenka regime as the Director General of the BELAERONAVIGATSIA
    State-Owned Enterprise.
