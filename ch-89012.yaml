  justification: The Federal State Budgetary Educational Institution of Higher Education
    “Russian Presidential Academy of National Economy and Public Administration” (RANEPA)
    is a federal institution of higher education in the Russian Federation. RANEPA
    is the institution responsible for implementing the so-called “Time of Heroes”
    programme, which has been launched on the initiative of the Russian President
    to provide training for Russian soldiers who have fought in the war of aggression
    against Ukraine. The aim of the training is to prepare Russian veterans for management
    positions in public administration of state-owned companies, thereby offering
    them a significant career boost for participating in the war. Therefore, the Federal
    State Budgetary Educational Institution of Higher Education “Russian Presidential
    Academy of National Economy and Public Administration” is supporting the Government
    of the Russian Federation, which is responsible for the annexation of Crimea and
    the destabilisation of Ukraine.
