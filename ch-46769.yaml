  justification: Oskartour is a tour operator, which facilitated the obtainment of
    visas for migrants coming from Iraq and organised their subsequent travel to Belarus
    by flights from Bagdad to Minsk. Those Iraqi migrants were later transported to
    the Belarusian-Union border with the aim of illegally crossing it. Thanks to Oskartour
    and its contacts with Iraqi airlines, Belarusian authorities and the state-owned
    Tsentrkurort company, regular flights from Baghdad to Minsk were launched by the
    Iraqi air carrier, in order to bring more persons to Belarus to illegally cross
    the external borders of the Union. Oskartour took part in this illegal border-crossing
    scheme carried out by Belarusian security services and state-owned companies.
    It is therefore contributing to activities by the Lukashenka regime that facilitate
    the illegal crossing of the external borders of the Union.
