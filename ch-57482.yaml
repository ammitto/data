  justification: Brigadier General Than Htike is the Commander of the North Western
    Command of the Myanmar Armed Forces (Tatmadaw) since 6th January 2022. As regional
    commander, he commands and controls military forces in the Sagaing Region. Military
    forces under his command committed serious human rights violations, excessive
    use of force and brutal actions against the civilian population, including the
    military attack against a school in Depeyin Township, Sagaing Region, killing
    at least 13 people including 11 children. In the Sagaing Region, military forces
    burned over 20 000 houses since the military coup.
