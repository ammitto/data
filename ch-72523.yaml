  justification: Mikhail Ivanchikhin is the Director of JSC MNII Agat (a.k.a. Moscow
    Research Institute Agat). JSC MNII Agat is a Russian military-industrial state
    enterprise that develops and produces radar transceivers for guided missiles deployed
    by the Russian Armed Forces, including the “9B-1103M-350 active radar homing head”
    used in Russian air-to-air and surface-to-air missiles. Moreover, JSC MNII Agat
    is part of the Almaz-Antey concern, a Russian state-owned arms manufacturer that
    develops anti-aircraft defence and cruise missile systems for the Russian military.
