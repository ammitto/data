  justification: In his position as Chief of police in Leon since 23 Aug 2018 and
    then General Commissioner of the National Police since Sep 2020, Fidel de Jesús
    Domínguez Alvarez is responsible for numerous serious violations of human rights,
    in particular arbitrary arrests and detention including the kidnapping of members
    of a political opponent’s family, death threats, the excessive use of force and
    violations of freedom of expression and freedom of the media. He is considered
    as one of the main figures of repression against the democratic opposition in
    the region of Leon. He is therefore responsible for serious human rights violations
    and the repression of civil society and democratic opposition.
