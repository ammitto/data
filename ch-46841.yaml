  justification: Hotel Minsk is a subsidiary company of the Belarus President Property
    Management Directorate – a government agency that directly reports to the President.
    Hotel Minsk took part in the illegal border-crossing scheme carried out by Belarusian
    security services and Stated-owned companies. Migrants were accommodated in the
    hotel before being transported to the border between Belarus and Union Member
    States in order to illegally cross it. Iraqi migrants had listed Hotel Minsk as
    a temporary residence in their Belarusian visa applications, which were lodged
    immediately before their arrival to Belarus. Hotel Minsk is therefore contributing
    to activities by the Lukashenka regime that facilitate the illegal crossing of
    the external borders of the Union.
