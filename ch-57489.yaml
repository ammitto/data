  justification: Lieutenant General Nyunt Win Swe has been the Commander of Bureau
    of Special Operation 4 (BSO 4) since 2023. In that capacity, he commands and controls
    military forces in the area of Yangon. He was the Commander of the Yangon Region
    of the Myanmar Armed Forces (Tatmadaw) from June 2020 to early 2023. In that capacity,
    Nyunt Win Swe commanded and controlled military forces in the Yangon Region and
    oversaw the military tribunals for the Yangon Region.
