  justification: In January 2024, General Sayed Qureishi was promoted to the position
    of Deputy Minister of Defence at the Iranian Ministry of Defence and Armed Forces
    Logistics MODAFL). Until then, he held the position of Head of the Supply, Research
    and Industrial Affairs Division at the Iranian Ministry of Defence and Armed Forces
    Logistics (MODAFL) and was responsible for negotiating the agreement with the
    Russian Federation in relation to the supply of Iranian-made Unmanned Aerial Vehicles
    (UAVs) for their use in the war of aggression against Ukraine. Therefore, General
    Sayed Qureishi is responsible for supporting actions which undermine or threaten
    the territorial integrity, sovereignty and independence of Ukraine.
