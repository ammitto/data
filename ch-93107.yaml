  justification: JSC Ryazan Radio-Plant is a manufacturer of radio communication equipment
    used by the Russian Armed Forces and a producer of systems that ensure encrypted
    communication for military units. The plant also produces equipment for civilian
    and emergency response purposes, aimed at enhancing military communication capabilities.
    The company collaborates with the Ministry of Defence and other security agencies
    and fulfils state defence orders. In this context, JSC Ryazan Radio-Plant acts
    as a supplier to the Russian ground forces, airborne troops and electronic warfare
    units, contributing directly to the tactical and strategic communication infrastructure
    of the Russian military. The plant’s radio communication equipment is installed
    in tanks and infantry vehicles used by the Russian Armed Forces in Russia’s war
    of aggression against Ukraine, such as R-168 series radios, including the R-168-25U-2
    which is installed in BMD-4M infantry vehicles, T-72B3M and T-80 tanks, and the
    Tigr-M Leer-2 electronic warfare vehicle.
