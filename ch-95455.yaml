  justification: JSC Scientific and Production Association “POISK” is a leading Russian
    manufacturer of weapons and ammunition as well as a leading entity for the development
    of mechanical, electromechanical and electronic multifunctional fuses for ammunition.
    It has well-established cooperation with some of the major Russian defence companies,
    such as Tekhmash, Air Defence Concern Almaz-Antey and Tactical Missile Weapons
    Corporation. In recent years, JSC Scientific and Production Association “POISK”
    has developed over 20 different types of fuse for all types of ammunition used
    by the Russian army in its war of aggression against Ukraine. Moreover, the company
    is the developer of the 9E133M safety and actuating mechanism for the 9M723 Iskander-M
    ballistic missiles.
