  justification: JSC “Sarapul Electric Generator Plant” (SEGZ) is a Russian company
    manufacturing power generation, control and protection systems, equipment for
    military aircraft and helicopters, and components for rocket technology. JSC SEGZ
    produces critical parts for Russian long-range aircraft. The company participates
    in the fulfilment of the Russian State defence order, with over half of its revenue
    derived from military contracts. Therefore, JSC SEGZ is forming part of Russia’s
    military and industrial complex, including by being involved in the development,
    production or supply of military technology and equipment.
