  justification: Yuriy Mutsenek is Deputy Minister of Construction, Housing, and Utilities
    of the Russian Federation, in charge of the Administrative Department and the
    Legal Department. He is in charge of implementing the policy of the Ministry of
    Construction in the annexed regions of Donetsk, Luhansk, Zaporizhzhia and Kherson.
    Subsidies from the federal budget of the Russian Government are channelled through
    the Ministry of Construction in order to strengthen the “redevelopment” of the
    Ukrainian regions currently under Russian control. In his position as Deputy Minister,
    Yuriy Mutsenek is implementing policies which undermine or threaten the territorial
    integrity, sovereignty and independence of Ukraine.
