  justification: 'Alena Ananich is a Belarusian judge who has served in the Minsk
    City Court since 2015, having been appointed by Aliaksandr Lukashenka. She has
    issued numerous politically motivated rulings against the opponents of the Belarusian
    authorities, including with particularly high prison sentences: Yauhen Yushkevich
    – 11 years; Vital Brahiniets (lawyer of Nobel Peace Prize laureate Alies Bialatski)
    – 8 years; Viachaslau Kandyba – 7 years; and Siarhiei Nikitsin – 6 years. She
    also sentenced in absentia an opposition activist abroad, Stanislau Lupanosau,
    formerly an officer of the Main Department for Combating Organised Crime and Corruption
    (GUBOPiK) of the Ministry of Internal Affairs, to 18 years in prison.'
