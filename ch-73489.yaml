  justification: JSC MZIK (a.k.a. Kalinin Machine-Building Plant) is a Russian military-industrial
    state enterprise that develops combat equipment for the S-300V anti-aircraft missile
    system and the BUK-M1 anti-aircraft missile system deployed by the Russian Armed
    Forces. Moreover, JSC MZIK is part of the Joint Stock Company Almaz-Antey air
    and space defence corporation, a Russian state-owned arms manufacturer that develops
    anti-aircraft defence and cruise missile systems for the Russian military.
