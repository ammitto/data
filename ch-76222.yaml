  justification: Aleksey Eresko is Deputy Minister of Construction, Housing and Utilities
    of the Russian Federation, in charge of the Department of Housing and Communal
    Services and the Department of Strategic Projects. He is in charge of implementing
    the policy of the Ministry of Construction in the annexed regions of Donetsk,
    Luhansk, Zaporizhzhia and Kherson. Subsidies from the federal budget of the Russian
    Government are channelled through the Ministry of Construction in order to strengthen
    the “redevelopment” of the Ukrainian regions currently under Russian control.
    In his position as Deputy Minister, Aleksey Eresko is implementing policies which
    undermine or threaten the territorial integrity, sovereignty and independence
    of Ukraine.
