  justification: FSE Kazan State-Owned Gunpowder Plant is a Russian chemical plant
    that produces a variety of pyroxylin powders and charges for almost all types
    of weapons. The plant manufactures 5.45-14.5 mm caliber cartridges for rifles
    (Kalashnikov assault rifles), grenade launchers charges, propellant charges for
    naval cannons (AK-100, AK-130 and AK-726) and land artillery of 76 mm to 152 mm
    caliber (mortars 2S9 and 2S12, howitzers D-20, D-30, ML-20, 2S1, 2S3 and 2S19).
    The plant produces 115 mm, 122 mm and, most importantly, 125 mm caliber tank ammunition,
    which is used in the T-64, T-72, T-80 and T-90 tanks of the Russian Armed Forces.
    FKP KGKPZ supplies ammunition to the Russian Armed Forces and their weapon systems
    used in Ukraine.
