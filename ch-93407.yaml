  justification: Eiger Shipping DMCC is a Dubai-based company with strong ties to
    the Russian energy industry. Eiger Shipping DMCC has enabled the procurement of
    numerous vessels forming part of the so-called “shadow fleet”. Those vessels have
    transported oil from Russia while turning off or manipulating their AIS transponders,
    while not maintaining adequate liability insurance or other financial security,
    and while carrying out unsafe maritime operations. Therefore, Eiger Shipping DMCC
    is an entity that controls vessels that transport crude oil or petroleum products,
    originating in Russia or exported from Russia, while practicing irregular and
    high-risk shipping practices as set out in the International Maritime Organisation
    General Assembly resolution A.1192(33), or that otherwise provides material, technical
    or financial support to the operations of such vessels.
