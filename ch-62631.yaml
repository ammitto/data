  justification: Gheorghe Petru Cavcaliuc is the former Deputy Head of the General
    Police Inspectorate of the Republic of Moldova. He is known for having organised
    and participated in the violent protests of Oct 2022, alongside Ilan Shor. He
    has used his connections within the General Police Inspectorate to recruit former
    police officers and create a paramilitary group to “protect” the violent demonstrators
