  justification: Li Xiaocui (“Sophia Li”) is a Chinese businessperson. She controls
    and represents enterprises from the People’s Republic of China and Hong Kong which
    have been designated by the European Union for having infringed prohibitions against
    circumvention of the Union’s restrictive measures regime imposed on the Russian
    Federation, namely ARCLM International Trading Co. Ltd and Shijiazhuang Hanqiang
    Technology Co. Those infringements included the export of listed goods to Unimatik,
    a major actor in the Russian Military-Industrial Complex. Li Xiaocui thus facilitated
    infringements of the prohibition against circumvention of the Union’s restrictive
    measures regime imposed on the Russian Federation and thus additionally significantly
    frustrated existing Union restrictive measures provisions.
