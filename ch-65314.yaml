  justification: In the position of judge at the Minsk Municipal Court, Siarhei Khrypach
    has represented the Lukashenka regime in numerous politically-motivated cases,
    in particular against Marfa Rabkova, Andrei Chapiuk who received exceptionally
    lengthy sentences of 15 and six years in prison, respectively, and their eight
    co-defendants who received custodial sentences of between five to 17 years. Marfa
    Rabkova was imprisoned on politically-motivated charges of “training people to
    participate in mass riots or financing such activities”, for coordinating the
    volunteer service at the internationally recognized human rights group Viasna
    and for organising the monitoring of the election in Aug 2020. She also documented
    cases of torture and other ill-treatment against detained protesters. Marfa Rabkova
    was one of the first members of Viasna to be targeted by the authorities with
    politically-motivated criminal charges after the protests in Aug 2020. Andrei
    Chapiuk was charged for participation in a criminal organisation and the incitement
    of hatred among other things, for his engagement in Viasna as a volunteer. Their
    trial was held behind closed doors by request of prosecutor Raman Biziuk and by
    approval of judge Siarhei Khrypach due to the alleged existence of “materials
    of extremist nature” in the case. Siarhei Khrypach is also responsible for the
    politically-motivated conduct of the trial and verdicts for the co-defendants
    in the same trial, namely Akihiro Haeuski-Hanada, Alyaksandr Frantaskevich, Alykaksei
    Galauko, Alyaksandr Kazlyanka, Pavel Shpteny, Mikita Dranets, Andrei Marach and
    Daniil Chul. Siarhei Khrypach is also responsible for the politically-motivated
    verdict against Yegor Dudnikov in May 2021. He is therefore responsible for serious
    violations of human rights, the repression of civil society and democratic opposition,
    and activities that seriously undermine democracy or the rule of law in Belarus.
