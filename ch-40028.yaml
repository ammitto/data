  justification: Leading businessperson operating in Syria linked to the former al-Assad
    regime, with significant investments in the construction and aviation sectors.
    Through his investments and activities, Mazin al-Tarazi benefits from and/or supports
    the former al-Assad regime. In particular, Mazin al-Tarazi has concluded a deal
    with Damascus Cham Holding for a USD 320 million investment in the construction
    of Marota City, a luxury residential and commercial development backed by the
    former al-Assad regime. He has also been granted a licence for a private airline
    in Syria. In September 2019, he created “al-Dana Group Investments LLC”, a 25
    million SYP company involved in export-import and investing in tourism facilities
    and commercial complexes. Mazin al-Tarazi is a member of the Syrian-Iranian Business
    Council (SIBC) and served as an intermediary for the Iranian regime to purchase
    real estate in Syria.
