  justification: OJSC Hotel Planeta is a subsidiary company of the Belarus President
    Property Management Directorate – a government agency that directly reports to
    the President. Hotel Planeta took part in the illegal border-crossing scheme carried
    out by Belarusian security services and state-owned companies. Migrants were accommodated
    in the hotel before being transported to the border between Belarus and the Union
    in order to illegally cross it. They paid USD 1 000 to a travel agent in Baghdad
    for the flight, a tourist visa and a stay in the hotel. Hotel Planeta is therefore
    contributing to activities by the Lukashenka regime that facilitate the illegal
    crossing of the external borders of the Union.
