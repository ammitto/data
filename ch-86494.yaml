  justification: Andrey Kocherga is the General Director of PJSC “Stavropol Radio
    Plant Signal”. PJSC “Stavropol Radio Plant Signal” is one of the main manufacturers
    of radio-electronic devices for the Armed Forces of the Russian Federation. It
    belongs to the Rostec State Corporation. The Armed Forces of the Russian Federation
    use devices produced by PJSC “Stavropol Radio Plant Signal”, such as remote-control
    platforms for PKT tank machine guns, in Russia’s war of aggression against Ukraine.
    PJSC “Stavropol Radio Plant Signal” upgraded the machine gun remote-control platform
    for the control of a 7,62  mm tank machine gun, designed in 2023, upon direct
    request from the Russian military.
