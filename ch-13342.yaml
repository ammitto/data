  justification: In 2019, Mohammad-Bagher Bagheri was appointed Deputy Head of the
    Judiciary for International Affairs and Secretary of the Human Rights Staff, replacing
    Mohammad Javad Larijani in this position by a decree of Ebrahim Raisi. He was
    judge at the Supreme court between December 2015 and 2019. Former vice-chairman
    of the judiciary administration of South Khorasan province, in charge of crime
    prevention. In addition to his acknowledging, in June 2011, 140 executions for
    capital offences between March 2010 and March 2011, approximately 100 other executions
    are reported to have taken place in the same period and in the same province of
    South Khorasan without either the families or the lawyers of those executed being
    notified. He was, therefore, complicit in a grave violation of the right to due
    process, contributing to a high number of death sentences.
