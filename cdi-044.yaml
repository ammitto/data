comments1: Listed pursuant to paragraphs 7 (c), 7 (e) and 7 (h) of resolution 2293
  (2016) as “being political and military leaders of Congolese militias, including
  those receiving support from outside the DRC, who impede the participation of their
  combatants in disarmament, demobilization and reintegration processes;” “planning,
  directing, committing acts in the DRC that constitute human rights violations or
  abuses or violations of international humanitarian law, as applicable, including
  those acts involving the targeting of civilians, including killing and maiming,
  rape and other sexual violence, abduction, forced displacement, and attacks on schools
  and hospitals;” and “acting on behalf of or at the direction of an entity owned
  or controlled by a designated individual or entity”, as reaffirmed by paragraph
  2 of resolution 2688 (2023). As a leader of M23 (CDe.006), WILLY NGOMA is involved
  in planning, promulgating and supporting the armed group’s activities.
