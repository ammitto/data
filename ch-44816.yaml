  justification: Min Aung Hlaing has been the Commander-in-Chief of the Myanmar Armed
    Forces (Tatmadaw) since 2011. He is Chairman of the State Administration Council
    (SAC) and member of the National Defence and Security Council (NDSC). Min Aung
    Hlaing declared himself as “Prime Minister” on 1 August 2021. On 1 February 2021,
    the Myanmar Armed Forces (Tatmadaw), led by Commander-in-Chief Min Aung Hlaing,
    staged a coup in Myanmar/Burma by setting aside the results of the elections held
    on 8 November 2020 and by overthrowing the democratically elected government.
    As part of the coup, Vice-President Myint Swe, functioning as Acting President,
    declared a state of emergency on 1 February 2021 and transferred the legislative,
    executive and judicial powers of the State to the Commander-in-Chief of Defence
    Services Senior General Min Aung Hlaing. On 2 February 2021, the SAC was established
    to exercise those powers, preventing the democratically elected government from
    fulfilling its mandate. On 31 January 2022, upon the request of Min Aung Hlaing,
    the NDSC formally extended the state of emergency until 31 July 2022.
