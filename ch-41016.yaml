  justification: Division General of the Venezuelan Bolivarian National Army (FANB).
    Agent in the Bolivarian National Intelligence Service (SEBIN). Head of Security
    at Maiquetía International Airport since August 2019. Director of the Special
    Directorate of Criminal and Criminalistics Investigations (DEIPC) at the Directorate-General
    of Military Counter-Intelligence (Dirección General de Contrainteligencia Militar
    (DGCIM)) between November 2016 and November 2018. Responsible for serious human
    rights violations, including torture, the use of excessive force and the ill-treatment
    of detainees in DGCIM facilities by members of the DGCIM under his command, notably
    at the Boleita detention centre. Officials under his authority were also implicated
    in sexual violence against detainees. Also responsible for the repression of civil
    society and democratic opposition by members of the DGCIM under his command. Linked
    to the death of Captain Acosta Arévalo.
