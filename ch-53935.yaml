    and as People’s Artist of the so-called “Luhansk People’s Republic” in 2015. He
    is the artistic director of the Luhansk Academic Ukrainian Music and Drama Theatre
    in Oboronna. In 2022, he received the Certificate of Honour of the People’s Council
