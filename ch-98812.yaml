  justification: PJSC “Far Eastern Shipping Company” (FESCO) is one of Russia’s largest
    transportation and logistics firms, and the largest port container operator in
    the Russian Far East. The company specialises in container shipping, port operations,
    and intermodal transport across sea, rail and road. Its core operations are concentrated
    in the Russian Far East, with key assets including the Commercial Port of Vladivostok
