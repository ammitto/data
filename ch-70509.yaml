  justification: SuperCam Unmanned Systems Group is a Russian company that operates
    in the Alabuga special economic zone (SEZ). The Alabuga SEZ hosts manufacturing
    facilities that assemble unmanned aerial vehicles (UAVs). Those facilities are
    part of a Russian State-backed programme and have been set up with assistance
    from Iran in the training of staff and supply of material in order to assemble
    military drones for use in Russia’s war of aggression against Ukraine. The UAVs
    (Shahed-136) produced in the Alabuga SEZ with the financing of the State-owned
    VTB Banking Group have been used by the Russian army in Ukraine. Therefore, SuperCam
    Unmanned Systems Group is supporting materially actions which undermine and threaten
    the territorial integrity, sovereignty and independence of Ukraine.
