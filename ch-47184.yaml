  justification: Nahima Janett Díaz Flores is the Director of the Nicaraguan Institute
    of Telecommunications and Postal Services (TELCOR), the regulatory entity for
    telecommunications and postal services. TELCOR has been used by the Nicaraguan
    authorities to silence independent media, including three news organisations since
    2018. During the 2021 general elections campaign, TELCOR was implementing disinformation
    campaigns on a large scale. As the institution in charge of the implementation
    of the “cybersecurity law”, TELCOR has been commanding and operating surveillance
    actions regarding civil society and democratic opposition. In her position, Nahima
    Díaz Flores has acted as a supporter of the Ortega regime, and has commanded and
    operated actions of disinformation and surveillance through TELCOR of civil society
    and democratic opposition. She is therefore responsible for serious violations
    of human rights, repression of civil society and democratic opposition, and undermining
    democracy in Nicaragua.
