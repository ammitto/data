  justification: Lumberto Ignacio Campbell Hooker has been since 2014 a member of
    the Supreme Electoral Council (SEC) – a body responsible for the preparation,
    holding and certification of the general elections of 7 Nov 2021 and local elections
    of 6 Nov 2022, which, by their lack of transparency, true opposition and democratic
    debate, undermined democratic institutions and processes. The SEC deprived the
    opposition of the opportunity to stand for free elections and ensured the organisation
    of polls in non-democratic conditions. His mandate as member of the SEC was renewed
    by the General Assembly in May 2021. He spoke to the media during the general
    elections of 7 Nov 2021 and local elections of 6 Nov 2022, justifying and praising
    their organisation. He is therefore responsible for the repression of democratic
    opposition and for undermining democracy and the rule of law in Nicaragua.
