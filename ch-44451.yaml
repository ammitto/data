  justification: President of state enterprise Corporación Ecosocialista Ezequiel
    Zamora (CORPOEZ) since Mar 2021. Division General and Deputy Director of the Directorate-General
    of Military Counter-Intelligence (Dirección General de Contrainteligencia Militar
    (DGCIM)) since 21 Aug 2020. Successor of General Rafael Ramón Blanco Marrero.
    Previously, Carvallo Guevara served for the DGCIM in Los Andes region and held
    an upper rank in the Bolivarian National Guard. Responsible for the serious human
    rights violations in Venezuela committed by DGCIM officials under his command.
    In the findings of the Independent International Fact-Finding Mission on the Bolivarian
    Republic of Venezuela of 20 Sep 2022, DGCIM is characterised as an institution
    directly responsible for carrying out severe human rights violations.
