  justification: Akuta JSC holds a license administered by the FSB “to carry out work
    related to the use of information constituting a state secret”. The FSB license
    is issued to IT companies that develop encryption and cryptography technology,
    information systems, and telecommunication systems for the Russian intelligence
    services, as well as IT companies that develop “personal database management systems”
    for the Russian security services (i.e. tools specifically designed to store,
    retrieve, and manage large amounts of data obtained through, for example, social
    media scraping or other intelligence gathering practices). Additionally, Akuta
    holds a license administered by the Russian Ministry of Industry and Trade. This
    license administered by the Russian Ministry of Industry and Trade serves for
    the “development, production, testing, installation, maintenance, disposal and
    sale of weapons and military equipment”. In particular, Akuta JSC produces “Unmanned
    Undersea Vehicles” (UUV) for the Russian Armed Forces, which are deployed for
    intelligence, surveillance, and reconnaissance missions, anti-submarine warfare,
    information operations, and time-critical strikes. The entity describes itself
    as operating in the Russian IT sector, working “mainly within the framework of
    the [Russian] state defense order [with] larger enterprises of the [Russian] military-industrial
    complex”. Akuta furthermore holds a license “for activities in the field of creating
    information security”, which is administered by the 8th directorate of the GRU,
    that is the foreign military intelligence agency of the General Staff of the Armed
    Forces of the Russian Federation.
