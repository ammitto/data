  justification: Valyantsina Ziankevich is a Belarusian judge who serves in a Judicial
    Collegium for Criminal Cases of the Minsk City Court. She has issued politically-motivated
    rulings against the opponents of the Belarusian authorities. She has convicted
    at least seven Belarusian citizens on political grounds, including Maryna Zolatava,
    TUT.BY editor-in-chief, who was sentenced to 12 years in prison, and Liudmila
    Chekina, TUT.BY general director, who was sentenced to 12 years in prison in Mar
    2023. She has a documented history of issuing politically-motivated rulings against
    the opponents of the Belarusian authorities since 2022. She is therefore responsible
    for serious violations of human rights and the repression of civil society and
    democratic opposition in Belarus.
