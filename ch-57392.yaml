  justification: Htun Htun Oo is the Chief Justice of the Supreme Court in Myanmar/Burma,
    as confirmed in that position by Commander-in-Chief Min Aung Hlaing on 2 February
    2021, following the 1 February 2021coup. The Supreme Court, under Htun Htun Oo’s
    leadership, has been involved in the prosecution of democratically elected leaders
    and opposition figures, and failed to accomplish its duties as the highest jurisdiction
    responsible for upholding the rule of law and guaranteeing the independence of
    the judiciary. Therefore, in his capacity as Chief Justice of the Supreme Court,
    Htun Htun Oo is engaged in activities that undermine democracy and the rule of
    law in Myanmar/Burma.
