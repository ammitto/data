  justification: Anna Luzhanskaya is the founder of electronics importer Limited Liability
    Company Technology Company “Fly Bridge” (LLC TC Fly Bridge). Thanks to an established
    logistics scheme, the company delivers sanctioned goods (microchips) from abroad
    to the Russian military-industrial complex that manufactures equipment used in
    Russia’s war of aggression against Ukraine. In view of the western sanctions,
    the Russian Government has provided substantial support to all Russian companies
    involved in the microelectronics industry, which is of strategic importance for
    Russia’s efforts in the war. By being the founder of LLC TC Fly Bridge, Anna Luzhanskaya
    is responsible for its actions and therefore she is supporting materially the
    Government of the Russian Federation, which is responsible for the annexation
    of Crimea and the destabilisation of Ukraine. Furthermore, she is significantly
    frustrating the provisions of Decision 2014/512/CFSP and Regulation (EU) No 833/2014.
