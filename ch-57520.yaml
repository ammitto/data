        value: State Administration Council (SAC)
  justification: The State Administration Council (SAC) is a public entity established
    on 2 February 2021 following the military coup in Myanmar/Burma on 1 February
    2021. As part of the coup, Vice-President Swe declared a state of emergency and
    transferred the legislative, executive and judicial powers of the state to Commander-in-Chief
    Min Aung Hlaing. The SAC, led by Commander-in-Chief Min Aung Hlaing, was established
    to exercise those functions. The SAC, through its power to exercise state functions,
    is responsible for policies and activities that undermine democracy and the rule
    of law in Myanmar/Burma. Additionally, the SAC adopted decisions that resulted
    in the repression of the civilian population and political opposition, atrocities
    and serious human rights violations committed by the Myanmar Security Forces.
    Therefore, the SAC is engaged in actions that threaten the peace, security and
    stability of Myanmar/Burma.
