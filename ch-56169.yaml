  justification: Stanislav Sergeyevich Chemezov is the son of Sergei Chemezov, a member
    of the Supreme Council of “United Russia” and chairman of the Rostec conglomerate,
    the leading Russian state-controlled defence and industrial manufacturing corporation.
    Stanislav Chemezov owned an Offshore company called Erlinglow Ltd that was benefiting
    from the construction of a $550 million national fiber-optic superhighway by Rostec.
    Additionally he co-owns various offshore companies with Maya Bolotova, the daughter
    of Nikolay Tokarev, including Irvin-2, which has received contracts worth 8 billion
    Rubels. As a reward for the exchange, the Tokarev family allowed the Chemezov
    family to cut the budget of Transneft. Stanislav Chemezov also owns the company
    Independent Insurance Group, which manages large insurance contracts in the defence
    sector, including contracts for the defence conglomerate Rostec, in which his
    father Sergei Chemezov is CEO. Stanislav Chemezov is therefore a natural person
    associated with a listed person.
