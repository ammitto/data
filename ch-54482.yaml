  justification: Bogoljub Karić is a Serbian businessman and politician. Together
    with his family members, he developed a network of real estate companies in Belarus
    and has cultivated a network of contacts with the family of Aliaksandr Lukashenka.
    In particular, he has been closely associated with Dana Holdings and its former
    subsidiary Dana Astra, and he reportedly represented those entities during meetings
    with Lukashenka. The Minsk World project, which was developed by a company associated
    with Karić, was described by Lukashenka as “an example of cooperation of the Slavonic
    world”. Thanks to those close relationships with Lukashenka and his entourage,
    companies associated with Karić received preferential treatment from the Lukashenka
    regime, including tax breaks and plots of land for real estate development. He
    is therefore benefitting from and supporting the Lukashenka regime.
