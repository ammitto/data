  justification: |-
    First Deputy Director of the Federal Service of the National Guard of the Russian Federation (Rosgvardia) – Commander-in-Chief of Rosgvardia. Units of the Rosgvardia have been sent to the areas under the control of the Russian authorities, such as Kherson, Henichesk, Berdyansk and certain areas of Mariupol, in order to suppress protests by the local population. They have also taken part in the killing, rape and torture of civilians in Bucha, Ukraine. Members of Rosgvardia have arrested pro-Ukrainian citizens and have set up a military-police administration. In this capacity, he is therefore responsible for, supporting or implementing actions or policies which undermine or threaten the territorial integrity, sovereignty and independence of Ukraine, or stability
    or security in Ukraine.
