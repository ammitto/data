  justification: In his position of Deputy Prosecutor General, Aliaksei Stuk bears
    responsibility for politically motivated criminal cases against opposition, journalists,
    civil society and regular citizens. He is responsible for tightening the Prosecutor's
    Office's control of citizens' activities in localities and work places and is
    responsible for applying excessive legal responsibilities on participants in peaceful
    protests. He publicly stated that the Office of Prosecutor General would work
    to identify "illegal" citizen associations and suppress their activities. He is
    therefore responsible for serious human rights violations and seriously undermining
    the rule of law, as well as for the repression of civil society and democratic
    opposition.
