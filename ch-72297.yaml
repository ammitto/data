        value: Non-governmental organisation “Delfini”
  justification: Delfini is a non-governmental organisation in the Republic of Belarus
    founded by Olga Volkova, who is one of the main actors involved in the deportation
    of Ukrainian children from the illegally occupied territories of Ukraine to Belarus.
    Olga Volkova and the Delfini organisation have coordinated the movement of multiple
    groups of children from Ukraine to Belarus and been involved in subjecting children
    to re-education and military training. Therefore, the Delfini organisation is
    supporting materially actions which undermine and threaten the territorial integrity,
    sovereignty and independence of Ukraine, and stability and security in Ukraine.
