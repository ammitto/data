  justification: Fares Mohammed Mana'a has directly or indirectly supplied, sold or
    transferred to Somalia arms or related materiel in violation of the arms embargo.
    Mana'a is a known arms trafficker. In Oct 2009, the Yemeni government released
    a blacklist of 9 arms dealers with Mana'a "on top," as part of an effort to stem
    the flood of weapons in the country, where weapons reportedly outnumber people.
    "Faris Manaa is a major weapons trafficker, and that's well known," according
    to Jun 2009 reporting by a U.S. journalist who is a commentator on Yemeni affairs,
    authors a semi-annual country report, and has contributed to Jane's Intelligence
    Group. In a Dec 2007 Yemen Times article, he is referenced as "Sheikh Fares Mohammed
    Mana'a, an arms dealer." In a Jan 2008 Yemen Times article, he is referred to
    as "Sheikh Faris Mana'a, an arms tradesman."
