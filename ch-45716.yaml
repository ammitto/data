  justification: Mikail Gutseriev is a prominent Russian businessman, with business
    interests in Belarus in the sectors of energy, potash, hospitality and others.
    He is a long-time acquaintance of Aliaksandr Lukashenka and thanks to that association
    has accumulated significant wealth and influence among the political elite in
    Belarus. Safmar, a company which has been controlled by Gutseriev, was the only
    Russian oil firm that carried on supplying oil to Belarusian refineries during
    the energy crisis between Belarus and Russia in early 2020.
