  justification: Member of the non-democratically elected National Assembly. Former
    member and illegitimately elected first Vice-President of the National Assembly
    elected in 2015. As a member of the National Assembly elected in 2015, he staged
    his election as the first Vice-President of the National Assembly on 5 Jan 2020,
    thereby undermining democracy and the rule of law in Venezuela. The election took
    place while entry of several parliamentarians to the premises of the National
    Assembly was blocked by military police, and without a quorum being reached. Therefore,
    opposition members had to organise themselves outside of the premises of the National
    Assembly to re-elect Juan Guaidó as its President. Shortly after the staged election
    of Duarte, supported by the regime’s political party (PSUV), the election of the
    Board of Directors of the National Assembly was welcomed by Maduro and the non-recognised
    National Constituent Assembly (ANC).
