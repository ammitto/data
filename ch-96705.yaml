  justification: Abu Aqla Mohamed Ahmed Kaikal is a Sudanese Military Commander who
    served in the Rapid Support Forces (RSF) in the Jazira state in Sudan until he
    defected to the Sudanese Armed Forces (SAF) in October 2024. In December 2023,
    he was appointed by the RSF as Governor of the Jazira state, after the RSF violently
    took over that area. The RSF is responsible for attacking cities and humanitarian
    hubs in the Jazira state, leading to massive displacement of civilians, hunger,
    shortage of medicines and impediment of humanitarian aid. Jazira state specifically
    has been a centre of violence committed by the RSF during Kaikal’s governorship.
    Therefore, Abu Aqla Mohamed Ahmed Kaikal is responsible for actions and policies
    that threaten the peace, stability and security of Sudan. In addition, he is responsible
    for directing acts in Sudan that constitute serious human rights violations, and
    for obstructing the delivery of, access to and distribution of humanitarian assistance
    in Sudan.
