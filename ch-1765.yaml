  justification: According to information available to the Governments of Iraq and
    the United States, Muhammad Yunis Ahmad served as the Governor of the Al-Muthana
    Governorate prior to the 1990 Gulf War. After the Gulf War, he was promoted to
    become a senior Ba’ath Party official in Northern Iraq. Mr. Ahmad is a former
    Ba’ath Party regional command member and was responsible for party activities
    in the Salah Ad Din, the Al-Ta’mim and the Al-Sulaymaniyah Governorates. He held
    this position until the fall of the Saddam regime in 2003. Mr. Ahmad is also reported
    to have a close working relationship with Izzat Ibrahim Al-Duri, who is listed
    in the annex to United States Executive Order 13315 and placed as number six on
    this list (see SSID 70-1155), and who allegedly served as his second incommand.
    Following the Coalition Provisional Authority’s disestablishment of the Iraqi
    Ba’ath Party after Operation Iraqi Freedom, the Party began to reconstitute itself
    under a new leadership. According to information available to the Governments
    of Iraq and the United States, the reconstituted Iraqi Ba’ath Party was allegedly
    operating with Mr. Al-Duri as the head of the Party and Mr. Ahmad as his deputy.
    Recently he was elected General Secretary of the reconstituted Ba’ath Party. Iraqi
    and United States Government information also indicates that Mr. Al-Duri headed
    the military wing of an anti-Coalition group formed after the fall of the Saddam
    regime, while Mr. Ahmad ran the political wing of the group.
