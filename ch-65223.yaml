  justification: In his position of Head and the former Deputy Head of Penal Colony
    No°1, Ruslan Mashadzeou is responsible for the inhuman and degrading treatment,
    including torture, inflicted on the political prisoners and other citizens detained
    in that penal colony in the wake of the 2020 presidential election and in the
    ensuing peaceful protests. He was the head of the penal colony at the time of
    the death of the political prisoner Vitold Ashurak in that penal colony on 21
    May 2021, in unexplained circumstances. He is therefore responsible for serious
    violations of human rights and the repression of civil society in Belarus.
