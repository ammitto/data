  justification: Anton Tsykurenko is a judge of the Kyiv District Court of the city
    of Simferopol, Crimea. He has been appointed by the President of the Russian Federation
    Vladimir Putin. Tsykurenko makes politically motivated court decisions on charges
    against Ukrainian citizens, such as Oleg Prikhodko, who opposed the illegal annexation
    of Crimea and Sevastopol and the repressive policies of the occupation authorities
    towards the Crimean Tatars. He arrested lawyer Emil Kurbedinov, who defended Crimean
    Tatars and Ukrainian activists who were persecuted by Russian authorities for
    political reasons. Tsykurenko also arrested Crimean Tatar Mumine Salieva, the
    wife of political prisoner Seyran Saliev, for posts on social networks and other
    Crimean Tatar women for peaceful assembly during the detention of compatriots.
