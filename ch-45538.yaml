    complaints about abuse of powers by law enforcement officers, Dzmitry Hara is
    responsible for inaction of this institution, since no case of such an investigation
    is known, despite applications for the initiation of criminal cases complaining
    about the use of violence, ill-treatment and torture. As of Mar 2021, he is the
    Chairman of the Investigative Committee of Belarus. In this position he is responsible
    for prosecuting human rights defenders and participants in peaceful protests.
