  justification: "“‘Federal Research Centre Institute of Applied Physics’ A.V. Gaponov-Grekhova
    of the Russian Academy of Sciences” (IAP RAS) is a state institute whose main
    areas of scientific research include high-power electronics, plasma electrodynamics,
    laser physics and nonlinear optics, and quantum systems. IAP RAS is financed by
    the Russian state and its inventions are used in precision material processing,
    control of production processes, and military and technical tasks. In addition,
    IAP RAS has licences for the maintenance and development of weapons and military
    equipment. IAP RAS is therefore supporting materially and benefitting from the
    Government of the Russian Federation, which is responsible for the annexation
    of Crimea and the destabilisation of Ukraine."
