  justification: Vadzim Gigin is one of the most vocal and influential members of
    the Belarusian state propaganda system. He systematically supports the Lukashenka
    regime and often presents his views on the state TV channels ONT and Belarus 1.
    Vadzim Gigin has supported and justified the repression of democratic opposition
    and civil society and of independent media, in particular after the presidential
    elections in Aug 2020. Vadzim Gigin spreads his propaganda narratives on a “nazi
    regime in Ukraine”, discrediting the West and justification of Russia’s war of
    aggression against Ukraine. Until Jun 2023, Vadzim Gigin was the head of the Belarusian
    society “Knowledge”, which is known as a state-sponsored non-governmental organisation
    promoting Lukashenka and his regime. Gigin’s contribution to the regime has been
    acknowledged by Lukashenka in Sep 2021 when Gigin received the medal “For Labor
    Merits”. Furthermore, he was appointed in Feb 2023 as member of the Commission
    to consider appeals of Belarusian citizens abroad concerning offences committed
    by them, headed by Prosecutor General of Belarus Andrei Shved. Therefore, Vadzim
    Gigin is benefiting from and supporting the Lukashenka regime.
