  justification: OJSC Grodno Azot is a large state-owned producer of nitrogen compounds,
    based in Grodno/Hrodna. Lukashenka described it as “a very important enterprise,
    a strategic one”. Grodno Azot also owns Khimvolokno Plant, which is a large manufacturer
    of polyamide and polyester and composite materials. Grodno Azot and its Khimvolokno
    Plant are a source of substantial revenue for the Lukashenka regime. Grodno Azot
    is therefore supporting the Lukashenka regime. Lukashenka visited the company
    and met with its representatives, discussing the plant's modernisation and various
    forms of State support. Lukashenka also promised that a loan would be used for
    the construction of a new nitrogen plant in Grodno/Hrodna. Grodno Azot is therefore
    benefitting from the Lukashenka regime. The workers of Grodno Azot, including
    its employees at the Khimvolokno Plant, who participated in peaceful protests
    against the regime and went on strike, were dismissed, intimidated and threatened
    both by the Grodno Azot management and regime representatives. Grodno Azot is
    therefore responsible for the repression of civil society.
