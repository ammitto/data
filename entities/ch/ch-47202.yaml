  justification: The National Police of Nicaragua is responsible for the degrading
    treatment, including physical and psychological torture, of those who opposed
    the Ortega regime. It is responsible for the unlawful imprisonment of presidential
    pre-candidates, civil society leaders, student and rural leaders or independent
    journalists without any legal and democratic guarantees. The National Police was
    instrumental in Daniel Ortega avoiding facing any real democratic opposition during
    the general elections of 7 Nov 2021. Prior to those elections, the National Police
    conducted continuous surveillance and persecution of opposition leaders, unlawful
    residential break-ins and arbitrary arrests of opposition members, and it systematically
    threatened public employees. In 2018, the National Police was involved in killings
    of peaceful protesters across Nicaragua. The National Police of Nicaragua is therefore
    responsible for serious violations of human rights, repression of civil society
    and democratic opposition, and undermining democracy and the rule of law in Nicaragua.
