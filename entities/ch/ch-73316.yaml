  justification: Federal State Enterprise Avangard (FKP Avangard) is a Russian defence
    enterprise that fulfils state defence orders for the disposal of military equipment
    and weapons. FKP Avangard also carries out research and development work on the
    creation and modernisation of ammunition. The enterprise is state-owned through
    the Rostec State Corporation and Federal Agency for State Property Management.
    The modernisation of the enterprise was covered by a federal targeted programme
    and the territorial administration of the Federal Agency for State Property Management
    in Bashkiria provided FKP Avangard with land to expand its production capacity.
