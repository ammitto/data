  justification: The ADF has recruited and used child soldiers in violation of applicable
    international law (UNSCR paragraph 4 (d)). The United Nations Group of Experts
    on the Democratic Republic of the Congo’s ("GOE") 2013 final report stated that
    the GOE interviewed three former ADF fighters who had escaped during 2013 and
    who described how ADF recruiters in Uganda lure people to the DRC with false promises
    of employment (for adults) and free education (for children) and then force them
    to join the ADF. Also according to the GOE’s report, former ADF fighters told
    the GOE that the ADF’s training groups typically include adult men and boys and
    two boys who escaped from the ADF in 2013 told the GOE that they had received
    military training from the ADF. The GOE report also includes an account of ADF’s
    training by a “former ADF child soldier”. According to the GOE’s 2012 final report,
    the ADF recruits include children, as exemplified by the case of an ADF recruiter
    who was captured by Ugandan authorities in Kasese with six young boys on his way
    to the DRC in Jul 2012. A specific example of the ADF’s recruitment and use of
    children is seen in a 6 Jan 2009 letter from the former Africa Director for Human
    Rights Watch, Georgette Gagnon, to Uganda’s former Minister of Justice, Kiddhu
    Makubuyu, stating that a boy named Bushobozi Irumba was abducted at 9 years of
    age by the ADF in 2000. He was required to provide transport and other services
    to ADF fighters. In addition, “The Africa Report” cited allegations that the ADF
    is allegedly recruiting children as young as 10 years of age as child soldiers
    and cited a Uganda People’s Defence Force (UPDF) spokesperson as stating that
    the UPDF rescued 30 children from a training camp on Buvuma Island in Lake Victoria.
