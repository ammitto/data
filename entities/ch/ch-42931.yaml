  justification: Secretary-General of the National Defence Council since 26 Jul 2019
    and Chief of the General Staff to the Commander-in-Chief since Sep 2020. Former
    commander of the National Capital Integral Strategic Defence Region (REDI Capital),
    former Chief of Staff and former Second-in-Command of the Operational and Strategic
    Command of the Bolivarian National Armed Forces of Venezuela (CEOFANB). In these
    roles he has supported and facilitated actions and policies of the Government
    of Venezuela which have undermined democracy and the rule of law in Venezuela.
    Responsible for serious human rights violations and the repression of civil society
    and democratic opposition in Venezuela, including obstructing the provision of
    humanitarian aid and the use of excessive force by officials of the Bolivarian
    Armed Forces (FANB), and by subordinate forces under his command, including the
    Integral Strategic Defence Region (REDI), the Integral Defence Operations Zone
    (ZODI) and the Bolivarian National Guard.
