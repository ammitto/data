  justification: Sergey Bezrukov is a Russian actor and politician. He is one of the
    public faces of the “United Russia” Party and chairman of its “Culture of the
    little homeland project”. He is also a member of the Supreme Council of the “United
    Russia” Party. He spread Russian propaganda in support of Russia’s war of aggression
    against Ukraine. He backed Russia’s invasion of Ukraine during performances given
    to Russian soldiers who took part in the war, and to children from the separatist
    so-called People’s Republics in the Donbas region. Furthermore, he publicly expressed
    his support for the illegal annexation of Crimea and Sevastopol by the Russian
    Federation.
