  justification: Alfa-Bank JSC is the largest private bank in the Russian Federation.
    The Central Bank of Russia has included Alfa-Bank on the list of the systemically-important
    credit institutions. Alfa-Bank operates in the Russian financial services sector
    and, more specifically, the banking sector. In 2023, the financial services sector
    was the seventh-largest sector of the Russian economy by share of GDP, accounting
    for 5,2 % of the GDP of the Russian Federation. This was an increase from 4,8
    % in 2022. Furthermore, the banking sector constitutes a substantial part of the
    Russian financial sector, as it accounts for around 87 % of the total assets in
    the financial sector. The banking sector performed well in 2023, with significant
    increases in total assets, corporate loans and retail loans, and a net profit
    of 3,3 trillion roubles in the first six months alone. Moreover, the banking sector
    supports other sectors of the economy, which in turn generate revenues for the
    Government of the Russian Federation.
