  justification: In her former position as assistant prosecutor at the Fruzensky District
    Court in Minsk, Alina Kasianchyk has represented the Lukashenka regime in politically
    motivated cases against journalists, activists and protesters. In particular,
    she has prosecuted journalists Katsiaryna Bakhvalava (Andreyeva) and Darya Chultsova
    for recording peaceful protests, based on the groundless charges of ‘conspiracy’
    and ‘violating public order’. She has also prosecuted members of Belarusian civil
    society e.g. for taking part in peaceful protests, and paying tribute to murdered
    protester Aliaksandr Taraikousky. She has continuously asked the judge for long-term
    prison sentences. She is therefore responsible for serious human rights violations
    and for seriously undermining the rule of law, as well as for the repression of
    civil society and democratic opposition. She remains active in the Lukashenka
    regime as a prosecutor at the Minsk City Prosecutor’s Office.
