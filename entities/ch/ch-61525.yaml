  justification: Vitaliy Tretyakov is a Russian journalist and political scientist,
    Dean of Higher School of Television at M. V. Lomonosov Moscow State University.
    Vitaliy Tretyakov systematically participates in pro-Kremlin propaganda programmes,
    including “Evening with Vladimir Solovyov” on the state TV channel “Russia-1”.
    His public statements on Ukraine correspond with the rhetoric of Russian officials
    and propagandists. Vitaliy Tretyakov continuously justifies the Russian war of
    aggression against Ukraine and calls for the destruction of Ukraine’s government,
    questions Ukraine’s statehood, insists on ultimate Russian victory without any
    compromises and states his opinion that all Ukraine’s territory must be occupied.
    He has expressed accusations that Ukraine is provoking Russia to use nuclear weapons.
