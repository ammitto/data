  justification: Iran Alumina Company (IAC) is Iran’s sole producer of aluminium oxide
    (Al2O3) or alumina powder, which is used in the fabrication of solid fuel propellant
    used to launch rockets and missiles. The facility operates on behalf of the Islamic
    Revolutionary Guard Corps (IRGC) in producing missile fuel from metal powder.
    IAC is a subsidiary of the state-owned mines and metal holding company Iranian
    Mines and Mining Industries Development and Renovation Organisation (IMIDRO),
    which is controlled by the Iranian Ministry of Industries and Mines.
