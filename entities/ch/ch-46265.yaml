  justification: Son of president Daniel Ortega and the First Lady and Vice President
    Rosario Murillo. Director of one of the main propaganda TV stations, Canal 8,
    and the leader of the 4th of May Sandinista Movement. In his position, he has
    contributed to restricting freedom of expression and freedom of the media. He
    has publicly threatened Nicaraguan businesspersons who oppose the Ortega regime.
    He is therefore responsible for undermining democracy and the repression of civil
