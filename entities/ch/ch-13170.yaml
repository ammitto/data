  justification: Head of the Welfare System from 2011 to 2013. Prosecutor General
    of Tehran until Aug 2009. As Prosecutor General of Tehran, he issued a blanket
    order used for the detention of hundreds of activists, journalists and students.
    In Jan 2010, a parliamentary investigation held him directly responsible for the
    detention of three prisoners who subsequently died in custody. He was suspended
    from office in Aug 2010 after an investigation by the Iranian judiciary into his
    role in the deaths of the three men detained on his orders following the election.
