  justification: In her position as Deputy Chairman and judge of the Court of the
    Leninsky District of Minsk, Marina Zapasnik is responsible for numerous politically
    motivated rulings against peaceful protesters, in particular the sentencing of
    activists Vladislav Zenevich, Olga Pavlova, Olga Klaskovskaya, Viktar Barushka,
    Sergey Ratkevich, Aleksey Charvinskiy, Andrey Khrenkov, student Viktor Aktistov,
    and minor Maksim Babich. All are recognized as political prisoners by Viasna,
    a Belarussian human rights organisation. She is therefore responsible for serious
    human rights violations and seriously undermining the rule of law, as well as
    for the repression of civil society and democratic opposition.
