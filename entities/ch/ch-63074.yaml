  justification: |-
    Sergey Muchkayev is a high-ranking official within the Russian Armed Forces. He is the head of the 106 Anti-Aircraft Missile Training Center of the Russian Federation, which is responsible for the training of Russian military personnel operating surface-to-air missile systems, including the 53rd Anti-Aircraft Missile Brigade. Importantly, the 106 Anti-Aircraft Missile Training Center, headed by Sergey Muchkayev, is the only training center in the Russian Federation that trains junior specialists in the use of medium-range anti-aircraft
    weapons. In addition to heading the 106 Anti-Aircraft Missile Training Center of the Russian Armed Forces, which is responsible for the pre-deployment training of Russia’s surface-to-air missile units that actively participate in Russia’s war of aggression against Ukraine, Sergey Muchkayev functioned as commander of the 53rd Anti-Aircraft Missile Brigade until 2020.
