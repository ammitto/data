  justification: William Yakutumba is the Secretary-General and Commander of the Coalition
    Nationale du Peuple pour la Souverainité du Congo (CNPSC), a coalition of the
    so-called Mai-Mai militias in South Kivu province of the DRC. He is the founder
    and leader of one of the largest militias of that coalition, the Mai-Mai Yakutumba.
    The Mai-Mai Yakutumba contributes to the armed conflict, instability and insecurity
    in the DRC, in particular through violence and serious human rights abuses, including
    massacres of village populations, attacks on civilians, rapes and other acts of
    sexual violence.
