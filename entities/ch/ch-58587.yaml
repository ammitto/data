  justification: Gadis Abdullaevich Gadzhiev is one of the Judges of the Constitutional
    Court of Russia who recognised as constitutional the ‘agreements’ on the admission
    of the Kherson and Zaporizhzhia regions, the so-called Luhansk People’s Republic
    and the self-proclaimed Donetsk People’s Republic to the Russian Federation. Those
    decisions artificially create the image of the legitimacy of Russia's invasion
    of Ukraine and are aimed at endowing those regions with features of actors of
    international legal relations. The Constitutional Court formally plays a decisive
    role in the process of accession of foreign territories to Russia. Therefore,
    Gadis Abdullaevich Gadzhiev is responsible for, supporting or implementing actions
    or policies which undermine or threaten the territorial integrity, sovereignty
    and independence of Ukraine, or stability or security in Ukraine, or which obstruct
    the work of international organisations in Ukraine.
