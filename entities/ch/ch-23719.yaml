  justification: Innocent Kaina is currently a Sector commander in the Mouvement du
    23 Mars (M23). He is responsible for and has committed serious violations of international
    law and human rights. In July 2007 the Garrison Military Tribunal of Kinshasa
    found Kaina responsible for crime against humanity committed in the District of
    Ituri, between May 2003 and December 2005. He was released in 2009 as part of
    the peace agreement between the Congolese government and the CNDP. Within the
    FARDC in 2009, he has been guilty of executions, abductions and maiming in Masisi
    territory. As Commander under the orders of General Ntaganda, he initiated the
    ex-CNDP mutiny in Rutshuru territory in April 2012. He ensured the security of
    the mutineers out of Masisi. Between May and August 2012, he oversaw the recruitment
    and training of over 150 children for the M23 rebellion, shooting the boys who
    had tried to escape. In July 2012 he travelled to Berunda and Degho for mobilization
    and recruitment activities for the M23.
