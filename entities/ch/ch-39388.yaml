  justification: Brigadier General Than Oo was the Commander of the 99th Light Infantry
    Division of the Myanmar Armed Forces (Tatmadaw) until May 2018. In that context,
    he is responsible for the atrocities and serious human rights violations committed
    against the Rohingya population in Rakhine State in the second half of 2017 by
    the 99th Light Infantry Division. These include unlawful killings, sexual violence
    and the systematic burning of Rohingya houses and buildings.
