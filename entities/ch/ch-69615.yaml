  justification: Aleksandr Rakhmanov is the Deputy Secretary of State of the Security
    Council of the Republic of Belarus. The Security Council of the Republic of Belarus
    is the constitutional, supreme collective coordinating and political body that
    enforces the powers of the President of the Republic of Belarus. In his position,
    Aleksandr Rakhmanov oversees the implementation of decisions of the Security Council
    and ensures activities of interdepartmental commissions under it, including military-technical
    cooperation with the Russian Federation and export control. The new Concept of
    National Security of the Security Council provides for the development of a regional
    grouping of forces of the Republic of Belarus and the Russian Federation, increasing
    the effectiveness of military command and control bodies. The militarytechnical
    cooperation contributes to strengthening the military capabilities of Russia,
    which is carrying out a war of aggression against Ukraine.
