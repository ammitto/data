  justification: Synesis LLC has provided the Belarusian authorities with a Kipod
    surveillance platform, which can search through and analyse video footage and
    employ facial recognition software, making the company responsible for the repression
    of civil society and democratic opposition by the state apparatus in Belarus.
    The Belarusian State Security Committee (KGB) and Ministry of Internal Affairs
    have been listed as users of a system created by Synesis. Synesis claims to have
    stopped providing the Belarusian authorities with the Kipod platform, but according
    to ByPOL reports Kipod is still used by the state securities agencies. Synesis
    is one of the residents of the Hi-Tech Park, created by a decree of Aliaksandr
    Lukashenka, and as such enjoys numerous benefits, including exemptions from income
    tax, VAT, offshore duty, customs duties and others. The company is therefore benefitting
    from its association with and supporting the Lukashenka regime.
