  justification: Camila Antonia Ortega Murillo is closely involved in actions supporting
    the presidential couple Daniel Ortega and Rosario Murillo, as an advisor to the
    Presidency, personal assistant to the Vice-President and Coordinator of the Creative
    Economy National Commission. She is also the Director of the platform Nicaragua
    Diseña and TV station Canal 13. She is responsible for using Nicaragua Diseña
    to support the fraudulent presidential and parliamentary elections, which took
    place on 7 Nov 2021, by creating fake accounts on different social media platforms.
    As the Director of Canal 13, she has contributed to disseminating the Ortega regime’s
    hate speech against the civic opposition, while restricting editorial plurality
    and persecuting independent journalists and media outlets in Nicaragua, eliminating
    freedom of expression and actual electoral competition. She has played a central
    role in the suppression of political pluralism and the definitive disarticulation
    of Nicaraguan democracy. She is therefore associated with persons responsible
    for undermining democracy and for serious human rights violations and she is supporting
    such repression and violations.
