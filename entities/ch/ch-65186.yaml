  justification: In his position as Senior Prosecutor at the Department of the Prosecutor
    General’s Office of Belarus, Aliaksandr Karol is responsible for numerous politically-motivated
    criminal cases against Belarusian human rights defenders. In particular, he is
    involved in the politically motivated prosecution of representatives from the
    Belarusian human rights organization Viasna, including Viasna chairperson Ales
    Bialiatski, deputy chairperson Valiantsin Stefanovic, lawyer Uladzimir Labkovich,
    coordinator of Viasna’s network of volunteers Marfa Rabkova, head of Viasna’s
    office in Gomel, Leanid Sudalenka, and volunteer Andrei Chapiuk, as well as volunteer
    Tatsiana Lasitsa who was released from Gomel penal colony on 24 Sep 2022. He is
    therefore responsible for serious violations of human rights and for seriously
    undermining the rule of law, as well as for the repression of civil society and
    democratic opposition in Belarus.
