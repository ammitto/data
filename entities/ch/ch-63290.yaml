  justification: OOKENIT JSC holds a license administered by the Russian Ministry
    of Industry and Trade, as well as a license administered by the FSB. This license
    administered by the Russian ministry of Industry and Trade serves for the “development,
    production, testing, installation, maintenance, disposal and sale of weapons and
    military equipment”. The FSB license, in turn, is issued to IT companies that
    develop encryption and cryptography technology, information systems, and telecommunication
    systems for the Russian intelligence services, as well as IT companies that develop
    “personal database management systems” for the Russian security services (i.e.
