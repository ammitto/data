  justification: Olga Volkova is Head of the non-governmental organisation “Delfini”.
    In this role, she has been responsible for the illegal deportation of Ukrainian
    children from the occupied territories of Ukraine to the Republic of Belarus.
    Olga Volkova is one of the key persons involved in the forcible deportation of
    Ukrainian children to Belarus and their subsequent illegal adoption by Russian
    and Belarusian families. Olga Volkova has organised and facilitated the movement
    of children from Ukraine to Belarus and has coordinated with members of Belarus’s
    regime to facilitate the movement of children from Ukraine to Russia prior to
    transporting them to Belarus. Under Volkova’s leadership, Ukrainian children are
    ideologically indoctrinated. Children are forced to attend educational programmes
    which are actively supporting Russian state propaganda and promoting the idea
    that Ukraine should be an integral part of Russia. Her actions violate the rights
    of Ukrainian children and infringe Ukrainian law and administrative order.
