  justification: Ludmila Vashchanka is a Belarussian judge who serves in Glubokoye
    District Court. She has issued politically-motivated rulings against the opponents
    of the Belarusian authorities. She has a documented history of having issued politically-motivated
    rulings against the opponents of the Belarusian authorities from 2007 to 2023.
