  justification: The State Museum-Preserve “Tauric Chersonese” is a museum operating
    in Sevastopol. Since the annexation of Crimea, the museum has actively undermined
    Ukrainian cultural heritage by promoting pro-Russian narratives regarding the
    cultural significance of the artefacts and excavation sites it administers. Following
    Russia’s full-scale invasion of Ukraine, the museum has used its platform to promote
    the invasion and the actors perpetrating it, including organising deliveries of
    supplies to the frontlines. Therefore, the State Museum-Preserve “Tauric Chersonese”
    is responsible for actions or policies which undermine or threaten the territorial
    integrity, sovereignty and independence of Ukraine, or stability or security in
    Ukraine.
