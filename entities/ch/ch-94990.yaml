  justification: Aleksandr Ushko is the Lead Marketing Manager of LLC “Open Systems
    Development Technology” (LLC TROS), a Russia-based entity that manufactures metalworking
    equipment and is a wholesaler of machine tools. He is the son of Sergey Ushko,
    the CEO of LLC TROS, who is subject to Union restrictive measures. Since the imposition
    of Union restrictive measures prohibiting the export of lathes to Russia, LLC
    TROS is actively involved in circumventing such restrictive measures by acting
    as the Russia-based recipient of illegally exported lathes. Aleksandr Ushko helped
    his father to participate in an import scheme in order to provide machine tools
    and other dual-use equipment to Russia.
