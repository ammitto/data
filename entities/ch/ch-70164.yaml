    Vyacheslav Rossolay is the Deputy Chairman of the State Military Industrial Committee of the Republic of Belarus. In his capacity as the Deputy Chairman of the State Military Industrial Committee of the Republic of Belarus, he increased the supply of military equipment to Russia against the backdrop of the war of aggression against Ukraine. Moreover, a military-technical cooperation program between Moscow and Minsk until 2025 will be put into effect, which provides for mutual deliveries of military products in the interests of the law enforcement agencies of Belarus and Russia. Therefore, Vyacheslav Rossolay is supporting materially the Government of the Russian Federation, which
