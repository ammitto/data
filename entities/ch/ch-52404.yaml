  justification: Vladimir Rashevsky is a member of the supervisory board of the Association
    Market Council and of the board of the Russian Union of Industrialists and Entrepreneurs
    (RSPP), chair of the RSPP Committee on Tax Policy and RSPP Commission on Mining,
    deputy chair of the Committee on Climate Policy and Carbon Regulation, and head
    of the Coordination Council for the Siberian District. He is also the former CEO
    and Director of EuroChem Group AG, one of the world’s largest producers of mineral
    fertilisers. Previously (between 2004 and 2020) he was the CEO of the coal company
    JSC SUEK.
