  justification: PJSC “Chelyabinsk Forge and Press Plant” (PJSC CHKPZ) is one of Russia’s
    leading enterprises in the machine-building and forging industries. PJSC CHKPZ’s
    activities are in economic sectors providing a substantial source of revenue to
    the Russian Federation. In 2012, PJSC CHKPZ entered the Association of Enterprises
    of the Military-Industrial Complex of the Chelyabinsk Region. Under the state
    defence order, the company produces shells for artillery ammunition intended for
    use in Russia’s war of aggression against Ukraine. PJSC CHKPZ is therefore supporting,
    materially and financially, and benefitting from the Government of the Russian
    Federation, which is responsible for the annexation of Crimea and the destabilisation
    of Ukraine.
