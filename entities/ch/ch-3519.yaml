  justification: Green Pine Associated Corporation («Green Pine») has taken over many
    of the activities of the Korea Mining Development Trading Corporation (KOMID).
    KOMID was designated by the Committee in April 2009 and is the DPRK’s primary
    arms dealer and main exporter of goods and equipment related to ballistic missiles
    and conventional weapons. Green Pine is also responsible for approximately half
    of the arms and related materiel exported by the DPRK. Green Pine has been identified
    for sanctions for exporting arms or related material from North Korea. Green Pine
    specializes in the production of maritime military craft and armaments, such as
    submarines, military boats and missile systems, and has exported torpedoes and
    technical assistance to Iranian defence-related firms.
