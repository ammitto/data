  justification: Grigory Gurov has been the Head of the Federal Agency for Youth Affairs
    (Rosmolodezh) since 14 September 2024. He was the Chairman of the Board of the
    “Movement of the First”, a state-led youth organisation in Russia, until 2024.
    The organisation was created at the initiative of President of the Russian Federation
    Vladimir Putin to provide educational activities, including of a militarised nature,
    for children between the ages of 6 to 18, based on “traditional Russian spiritual
    and moral goals”. During his tenure, the children who are members of the movement
    had meetings with soldiers who fought in Russia’s war of aggression against Ukraine,
    sent cards and letters of support to soldiers and also prepared equipment to be
    used on the battlefield, and learned how to handle drones. Additionally, the movement
    organised war games for the children, which replicated and simulated battle situations.
