  justification: Aleksey Talay is the Founder and Head of the Charitable Foundation
    Aleksey Talay. In this role, he has been responsible for the illegal deportation
    of Ukrainian children to the Republic of Belarus. Aleksey Talay is one of the
    key persons involved in the forcible deportation of Ukrainian children to Belarus
    and their subsequent illegal adoption by Russian and Belarusian families. Aleksey
    Talay and his foundation have organised and facilitated the movement of children
    from Ukraine to Belarus and have coordinated with members of Belarus’s regime
    to facilitate the movement of children from Ukraine to Russia prior to transporting
    them to Belarus. Under Talay’s leadership, Ukrainian children are ideologically
    indoctrinated. Children are forced to attend educational programmes which are
    actively supporting Russian state propaganda, publicly denying Ukraine’s right
    to statehood and calling for the “denazification” as well as the “de-Ukrainisation”
    of the country and promoting the idea that Ukraine should be an integral part
    of Russia. His actions violate the rights of Ukrainian children and infringe Ukrainian
    law and administrative order.
