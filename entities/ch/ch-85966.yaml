  justification: PJSC “Stavropol Radio Plant Signal” is one of the main manufacturers
    of radio-electronic devices for the Armed Forces of the Russian Federation. It
    belongs to the Rostec State Corporation. Armed Forces of the Russian Federation
    use devices produced by PJSC “Stavropol Radio Plant Signal” such as remote-control
    platforms for PKT tank machine guns in Russia’s war of aggression against Ukraine.
    PJSC “Stavropol Radio Plant Signal” upgraded the machine gun remote-control platform
    for the control of a 7,62 mm tank machine gun, designed in 2023, on direct request
    from the Russian military. In addition, PJSC “Stavropol Radio Plant Signal”, together
    with the Russian Engineering Union and the North Caucasus Federal University,
    runs a training centre for highly qualified specialists in the mechanical engineering
    industry.
