  justification: Alexander Sanchik is a Russian military leader, former Commander
    of the Eastern Military District (from May 2024 until November 2024) and is currently
    the acting Commander of the South Group of Forces (since November 2024), former
    First Deputy Commander of the Eastern Military District (from 2023 to 2024) and
    former Commander of the 35th Combined Arms Army. The 35th Combined Arms Army attacked
    Ukraine from the north. As Commander of the 35th Combined Arms Army, he was responsible
    for the actions of his unit. Alexander Sanchik is therefore responsible for supporting
    and implementing actions which undermine the territorial integrity, sovereignty
    and independence of Ukraine.
