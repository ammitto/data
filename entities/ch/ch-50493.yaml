  justification: Igor Viktorovich Demidenko is Major General and former Commander
    of the Western Operational Command of the Republic of Belarus. He was part of
    the Belarusian army, which has supported the Russia’s war of aggression against
    Ukraine of 24 Feb 2022. In this former commander position, he was responsible
    for the participation of the troops under his command in the joint Belarusian-Russian
    military exercises, which prepared and facilitated Russia’s war of aggression
    against Ukraine. He also took part and supervised the participation of his troops
    in those exercises.
