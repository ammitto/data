  justification: |-
    Aleksey Khersontsev is Deputy Minister of the Russian Ministry of Economic Development. During his administration, the Ministry of Economic Development has been involved in activities to undermine and threaten the territorial integrity of Ukraine, including measures to explore the economic potential of the annexed Ukrainian regions
    (Kherson, Zaporizhzhia, the so-called “Donetsk People’s Republic” and “Luhansk People’s Republic”) as well as activities to support war economy measures of the Russian government. Aleksey Khersontsev is therefore responsible for activities that undermine and threaten the territorial integrity of Ukraine, and he is a natural person supporting the Government of the Russian Federation, which is responsible for the annexation of Crimea and the destabilisation of Ukraine.
