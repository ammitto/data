  justification: Igor Sechin is CEO of Rosneft, Russian state oil company and one
    of the world's largest crude oil producers. He is one of Vladimir Putin’s most
    trusted and closest advisors, as well as his personal friend. He has been in contact
    with the Russian President on a daily basis. He is considered to be one of the
    most powerful members of the Russian political elite. His connections to Vladimir
    Putin are long and deep. He worked with the President in the St Petersburg mayor’s
    office in the 1990s and has proved his loyalty ever since. In 1999 Mr Sechin became
    Vladimir Putin’s deputy head of his administration, in 2008 deputy Prime Minister,
    and in 2012 Rosneft’s CEO. He is one of the Russian oligarchs operating in partnership
    with the Russian state.
