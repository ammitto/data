  justification: ACE Electronic HK Co., Limited (“ACE Electronic”) is an entity registered
    in Hong Kong that supplies electronic components to Russian industries, including
    the military industry. Some of the company’s partners are military-industrial
    companies themselves, such as CJSC “NPF ‘Micran’”, which produces combat control
    systems. Other of the company’s partners, such as LLC NPK Fotonika, act as intermediaries
    supplying components to military-industrial companies. Due to the high consumption
    of military products, Russia’s military industry is dependent on imports of semiconductors
    and other electronic components. Since the imposition of Union restrictive measures
    prohibiting the export of various electronic components to Russia, ACE Electronic
    is actively involved in providing Russia-based recipients with electronic components,
    including semiconductor devices.
