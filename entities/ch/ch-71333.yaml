  justification: "“Scutul Poporului” is a paramilitary organisation in the Republic
    of Moldova, including former military, police and law-enforcement personnel. It
    is led by Chiril Guzun and it attends protests, particularly to destabilise the
    Republic of Moldova, by using violence. During the attempts of February 2023 to
    destabilise the national government, groups of protesters affiliated to the subsequently-banned
    “Partidul ȘOR” and to the Building Europe at Home Party, “Partidul Acasă Construim
    Europa” (PACE) were supported and surrounded by members of the “Scutul Poporului”,
    who were involved in riots and violent demonstrations."
