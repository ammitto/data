  justification: President of the National Assembly of Nicaragua since Jan 2017 and
    member of the national direction of the Sandinista National Liberation Front (FSLN)
    since 1996. In his position as the President of the National Assembly of Nicaragua,
    he is responsible for promoting the adoption of several repressive legal acts,
