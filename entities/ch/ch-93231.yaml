  justification: Skywalker Technology Co. Ltd is a Chinese entity producing model
    aircraft. It has been one of the producers and developers of the “Gerbera” unmanned
    aerial vehicle (UAV), a mimic of the Shahed-36 UAV and ultimately produced in
    the Alabuga Special Economic Zone. The Alabuga Special Economic Zone hosts manufacturing
    facilities producing UAVs used by the Russian military in Ukraine. The “Gerbera”
    UAV has been used by the Russian military in Ukraine, in particular as a decoy
    UAV to overwhelm Ukrainian defence systems.
