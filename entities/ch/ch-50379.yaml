  justification: Oleg Eibatov is the Belarussian Head of the Mozyr border detachment.
    In this capacity, he is responsible for supervising the security of the border
    in the Mozyr area, including the border between Belarus and Ukraine, and the passage
    of individuals and goods through that border. Russian troops crossed the border
    between Belarus and Ukraine in the Mozyr area as part of Russia’s war of aggression
    against Ukraine on 24 February 2022. He is therefore responsible for and actively
    supporting actions undermining the territorial integrity, sovereignty and independence
    of Ukraine, as well as stability and security in Ukraine.
