  justification: Ihar Marshalau is the Deputy Chairman of the State Control Committee
    of Belarus and Director of the Financial Investigations Department of the State
    Control Committee. In that position, he is responsible for initiating the politically
    motivated tax evasion case against the media outlet TUT.by, allegedly based on
    Article 243 of the Criminal Code of the Republic of Belarus, which threatens the
    freedom of media in Belarus. He is also responsible for the searches conducted
    in May 2021 at the office of TUT.by in Minsk, at regional offices and at the homes
    of several TUT.by staff. He is also responsible for the detention of members of
    the Belarus Press Club in Dec 2020, a search and confiscation of items at the
    office of Rights of People with Disabilities including the violent interrogation
    of Aleh Hrableuski and Syarhei Drazdouski in Jan 2021, the detention of and tax
    evasion charges on member of the Coordination Council Liliya Ulasava, as well
    as the searches and detentions affecting employees of PandaDoc software company,
    who was running the initiative “Protect Belarus”, in Sep 2021. He is therefore
    responsible for serious human rights violations and the repression of civil society
    and democratic opposition as well as for seriously undermining the rule of law.
