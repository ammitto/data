  justification: Deputy Coordinator of the Islamic Revolutionary Guard Corps (IRGC).
    Former Deputy Chief of the IRGC for cultural and social affairs. Former Commander
    of the Basij (2009-2016). As commander of the IRGC's Basij Forces, Naqdi was responsible
    for or complicit in Basij abuses occurring in late 2009, including the violent
    response to the Dec 2009 Ashura Day protests, which resulted in up to 15 deaths
    and the arrests of hundreds of protesters. Prior to his appointment as commander
    of the Basij in Oct 2009, Naqdi was the head of the intelligence unit of the Basij
    responsible for interrogating those arrested during the post-election crackdown.
