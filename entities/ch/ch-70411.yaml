  justification: Boris Obnosov is the General Director of the JSC Tactical Missiles
    Corporation. Tactical Missiles Corporation develops, manufactures, modernises,
    repairs and maintains strategic and tactical aviation high-precision air-to-surface
    and air-to-air weapon systems and unified maritime weapon systems of the Russian
    Armed Forces. Weapons manufactured by Tactical Missiles Corporation are used in
    the war of aggression against Ukraine. Obnosov regularly meets with the President
    of the Russian Federation, Vladimir Putin, to inform him about the business status
    of Tactical Missiles Corporation. In 2021 he was awarded the highest honorary
    title “Hero of the Russian Federation”. In January 2022, a month before the war,
    Obnosov had a one-on-one meeting with President Vladimir Putin. In April 2022
    he received the award of “Marshal of the Soviet Union Georgy Zhukov” in the field
    of armaments and military equipment.
