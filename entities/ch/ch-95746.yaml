  justification: LLC Aeroscan is a Russian commercial operator that provides services
    in the areas of aerial photography, video and thermal imaging monitoring and laser
    scanning for unmanned aerial systems. It also is part of the Zala Aero group of
    companies which specialises in the development and production of unmanned aerial
    vehicles (UAVs), in particular Lancet loitering munitions and reconnaissance UAVs.
    Lancet loitering munitions and the Z-16 UAVs are actively used by the Russian
    army in its war of aggression against Ukraine. LLC Aeroscan also manufactures,
    in cooperation with Zala Aero Group, the new military reconnaissance, artillery
    fire and battlefield surveillance Zala Z-20 UAVs which are also used by the Russian
    army in its war of aggression against Ukraine.
