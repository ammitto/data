  justification: All-Russia “Young Army” Military Patriotic Social Movement (Yunarmiya)
    is a Russian paramilitary organization. The Yunarmiya and its members supported
    Russia’s war of aggression against Ukraine and spread the Russian propaganda concerning
    the war. Yunarmiya used the “Z” military symbol, which has been employed by Russian
    propaganda to promote Russia’s invasion of Ukraine. With the support of the Ministries
    of Defense and Education of the Russian Federation, the Yunarmiya organised a
    campaign during which the schoolchildren were asked to write letters to the Russian
    soldiers who took part in Russia’s invasion of Ukraine. Furthermore, it collected
    gifts for the troops who fought in the war. It also organised summer camps for
    children on the territory of the illegally annexed Crimean Peninsula. Therefore,
    it is responsible for, supporting or implementing actions or policies which undermine
    or threaten the territorial integrity, sovereignty and independence of Ukraine,
    or stability or security in Ukraine.
