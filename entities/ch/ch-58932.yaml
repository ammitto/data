  justification: The Russian Imperial Movement (RIM) is a white-supremacist group
    founded by Stanislav Vorobyov in 2002. The group promotes ethnic Russian nationalism
    and seeks to fuel white supremacy extremism in the West. It provides paramilitary
    training to Russian nationals and to members of like-minded organisations from
    other countries. Its armed wing, the Imperial Legion, is actively fighting on
    behalf of the Russian armed forces in Russia’s war against Ukraine. On its official
    webpage, the Movement identifies ‘fighting in Ukraine against the Uniates and
    Pagans, who are the backbone of the Ukrainian armed forces’ as one of its main
    endeavours.
