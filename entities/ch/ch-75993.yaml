  justification: JSC Scientific and Technical Center ‘Atlas’ (JSC STC Atlas) is a
    Russian enterprise that researches, develops and manufactures secure information
    and communication equipment and infrastructure used in the defence sector. JSC
    STC Atlas holds licences allowing it to develop and manufacture military equipment.
    JSC STC Atlas produces mobile phones that have the ability to protect and encrypt
    messages to ensure secure information transmission between Russian authorities.
    Those mobile devices are licensed by the Russian intelligence services – SVR and
    FSB. The Russian Ministry of Defence has purchased a significant amount of M-633S
    mobile phones with secure communication features that were designed and produced
    by JSC STC Atlas. In addition, JSC STC Atlas customers include the intelligence
    services FSB and SVR.
