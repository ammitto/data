  justification: Andrei Kazakov is the Acting General Director of Novorossiya Railways,
    a company created by a decree of the Government of the Russian Federation on 29
    May 2023 to consolidate the railways of the territories of Donetsk, Luhansk, Kherson
    and Zaporizhzhia not under the control of Ukraine’s government and to move them
    under the control of the Russian authorities. Novorossiya Railways is being financed
    from the Russian Federation’s federal budget. Its purpose is to create alternative
    transport links, which can then be used to transport, among others, military materiel
    for the purpose of using it in Russia’s war of aggression against Ukraine.
