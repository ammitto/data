  justification: Chaliy became “People’s Mayor of Sevastopol” by popular acclamation
    on 23 February 2014 and accepted this “vote”. He actively campaigned for Sevastopol
    to become a separate entity of the Russian Federation following a referendum on
    16 March 2014. He was one of the co-signatories of the “treaty on Crimea’s accession
    to the Russian Federation” of 18 March 2014. He was acting “governor” of Sevastopol
    from 1 to 14 April 2014 and is a former “elected” Chairman of the “Legislative
    Assembly” of the City of Sevastopol. Former member of the “Legislative Assembly”
    of the City of Sevastopol (until September 2019).
