  justification: Commander of the Second Division of FOCA/the Reserve Brigades (an
    FDLR armed branch). Military leader of a foreign armed group operating in the
    Democratic Republic of the Congo, impeding the disarmament and the voluntary repatriation
    and resettlement of combatants, per Security Council resolution 1857 (2008) OP
    4 (b). In evidence collated by the UNSC DRC Sanctions Committee Group of Experts,
    detailed in its report of 13 February 2008, girls recovered from FDLR-FOCA had
    previously been abducted and sexually abused. Since mid-2007, FDLR-FOCA, which
    previously recruited boys in their mid to late teens, has been forcefully recruiting
    youth from the age of 10 years. The youngest are then used as escorts, and older
    children are deployed as soldiers on the frontline, per Security Council resolution
    1857 (2008) OP4 (d) and (e).
