  justification: Mr. Kamaltynov is the Deputy Chairman of the State Council of the
    Republic of Tatarstan. Previously, he served as a Deputy Prime Minister of the
    Republic of Tatarstan and as plenipotentiary representative of the President of
    the Republic of Tatarstan in the State Council of the Republic of Tatarstan. Mr.
    Kamaltynov is a member of the Kremlin-aligned ruling party “United Russia”. In
    his statements on local and regional media platforms, Mr. Kamaltynov publicly
    supported and promoted the decision to invade Ukraine. Given his political influence,
    Mr. Kamaltynov is responsible for inciting hatred against Ukraine, spreading pro-Russian
    disinformation and propaganda in the context of the war, as well as seeking to
    garner domestic support in Russia for the war against Ukraine. Therefore, he is
    responsible for supporting actions or policies which undermine the territorial
    integrity, sovereignty and independence of Ukraine.
