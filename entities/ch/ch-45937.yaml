  justification: In his position as Deputy Head of the Leninsky District Police Department,
    Siarhei Dubavik is responsible for the inhumane and degrading treatment, including
    torture, inflicted on citizens detained on the premises of the Leninsky District
    Police Department in the wake of the 2020 presidential election. The detainees
    were denied medical help; paramedics who arrived at the Department were intimidated
    to prevent the provision of medical assistance to the detainees. He is also responsible
    for the actions of his subordinates, who took part in mass repressions against
    peaceful protesters, journalists, human rights activists, workers, representatives
    of the academic community and bystanders. He is therefore responsible for serious
    violations of human rights and the repression of civil society and democratic
    opposition.
