  justification: Jozef Hambálek is the President of the Europe chapter of the nationalist
    motorcycle club Nightwolves MC based in Slovakia. Hambálek, who can be connected
    to the Russian president, Vladimir Putin, and other representatives of the Russian
    government, is publicly known for building the Europe headquarters of the Nightwolves
    MC on a former military base in Slovakia for which he used discarded military
    equipment, including tanks. His ongoing activities, which allegedly include training
    Nightwolves members for active combat in Ukraine on his properties and actively
    promoting pro-Russian propaganda in Europe, can be deemed as a security threat
    for Ukraine and the EU. Jozef Hambálek is therefore a natural person supporting,
    materially or financially, actions which undermine or threaten the territorial
    integrity, sovereignty and independence of Ukraine.
