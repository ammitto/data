  justification: Yanina Okhota (Kozhemyako) is a judge of the Kyiv District Court
    of the city of Simferopol, Crimea. She has been appointed by the President of
    the Russian Federation Vladimir Putin. Okhota made politically motivated court
    decisions on charges against Ukrainian citizens who opposed the illegal annexation
    of Crimea and Sevastopol, as well as the repressive policies of the occupation
    authorities towards the Crimean Tatars. She arrested an activist from Sevastopol,
    Alexei Shestokovich, for an action of solidarity with political prisoners, and
    arrested three experts from the Nomos analytical center, detained by the Federal
    Security Service of the Russian Federation. Okhota arrested Crimean Tatars for
    alleged involvement with the Islamic party Hizb ut-Tahrir, abusing antiextremism
    and anti-terrorism legislation. She also prosecuted Crimean Tatars who were members
    of the human rights movement “Crimean Solidarity” for their journalistic activities.
    After the start of Russia’s war of aggression against Ukraine, Okhota prosecuted
    Crimeans for anti-war statements on social networks.
