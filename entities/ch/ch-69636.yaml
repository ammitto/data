  justification: The Lebedev Institute of Precision Mechanics and Computer Engineering
    is an entity that operates in the Russian IT sector, including in the field of
    computer and semiconductor development. The Lebedev Institute of Precision Mechanics
    and Computer Engineering holds a licence administered by the Russian Ministry
    of Industry and trade, as well as a licence administered by the Federal Security
    Service of the Russian Federation (FSB). The licence administered by the Russian
    Ministry of Industry and Trade covers the “development, production, testing, installation,
    maintenance, disposal and sale of weapons and military equipment”. The FSB licence
    is issued to IT companies that develop encryption and cryptography technology,
    information systems and telecommunication systems for the Russian intelligence
    services, as well as IT companies that develop personal database management systems
    for the Russian security services (i.e. tools specifically designed to store,
    retrieve, and manage large amounts of data obtained through, for example, social
    media scraping or other intelligence gathering practices). Therefore, the Lebedev
    Institute of Precision Mechanics and Computer Engineering constitutes an entity
    operating in the Russian IT sector with a licence administered by the FSB Center
    for Licensing, Certification and Protection of State Secrets and a “weapons and
    military equipment” licence administered by the Russian Ministry of Industry and
    Trade.
