  justification: Advisor to the Supreme Disciplinary Court of judges since 29 Apr
    2019. Former Prosecutor General of Tehran (Aug 2009 - Apr 2019). Dolatabadi's
    office indicted a large number of protesters, including individuals who took part
    in the Dec 2009 Ashura Day protests. He ordered the closure of Karroubi's office
    in Sep 2009 and the arrest of several reformist politicians, and he banned two
    reformist political parties in Jun 2010. His office charged protesters with “Muharebeh“,
    or “enmity against God“, which carries the death penalty, and denied due process
    to those facing the death penalty. His office also targeted and arrested reformists,
    human rights activists, and members of the media, as part of a broad crackdown
    on the political opposition.
