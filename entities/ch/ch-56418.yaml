  justification: Vladimir Mashkov is a Russian actor, director and screenwriter who
    actively supported Russia’s war of aggression against Ukraine. He officially endorsed
    President Vladimir Putin's bid for re-election in 2018 and served as his elections
    representative. He was nominated for the position of member of the Presidential
    Council for Culture and Art. He also backed the illegal annexation of Crimea and
    Sevastopol and the recognition of the so-called separatist People’s Republics
    in Donbas by Russia. He performed during the propaganda rally in support for the
    illegal annexation of Crimea and the war against Ukraine, which took place on
    18 Mar 2022 at Luzhniki Stadium in Moscow. Moreover, he installed the “Z” military
    symbol, which has been employed by Russian propaganda to promote Russia’s invasion
    of Ukraine, on the facade of the Oleg Tabakov theatre in Moscow. Therefore, he
    is responsible for actively supporting or implementing actions or policies which
    undermine or threaten the territorial integrity, sovereignty and independence
    of Ukraine, or stability or security in Ukraine.
