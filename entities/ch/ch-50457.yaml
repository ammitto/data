  justification: Sergei Simonenko is Major General, former Deputy Minister of Defence
    for Armament and Chief of Armament of the Republic of Belarus. He was part of
    the Belarusian army, which has supported and facilitated Russia’s war of aggression
    against Ukraine since 24 Feb 2022, in particular by hosting and participating
    in joint exercises of the armed forces of Belarus and Russia in the weeks preceding
    the armed aggression. In his former position as Major General and Deputy Minister
    of Defence for Armament of the Republic of Belarus, Sergei Simonenko was responsible
    for and actively supporting actions undermining the territorial integrity, sovereignty
    and independence of Ukraine, as well as stability and security in Ukraine.
