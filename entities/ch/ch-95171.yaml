  justification: JSC “Scientific Production Enterprise ‘Rubin’” is a leading company
    of the Russian defence industry which manufactures mobile automated control and
    communication systems designed for military applications. The company holds an
    active State licence in Russia for the maintenance and servicing of weapons and
    military equipment. It plays a significant role in the supply chain of the Russian
    Armed Forces, supplying them with specialised military equipment. Among the various
    systems produced for the Russian army is the air defence control system “Magistr-SV”,
    which has been deployed in the context of Russia’s war of aggression against Ukraine.
