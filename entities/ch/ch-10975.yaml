  justification: Bank Tejarat provides significant support to the Government of Iran
    by offering financial resources and financing services for oil and gas development
    projects. The oil and gas sector constitutes a significant source of funding for
    the Government of Iran and several projects financed by Bank Tejarat are carried
    out by subsidiaries of entities owned and controlled by the Government of Iran.
    In addition, Bank Tejarat remains partly owned by and closely linked to the Government
    of Iran which is therefore in a position to influence Bank Tejarat's decisions,
    including its involvement in the financing of projects regarded by the Iranian
    Government as a high priority. Furthermore, as Bank Tejarat provides financing
    to various crude oil productions and refining projects which necessarily require
    the acquisition of key equipment and technology for those sectors whose supply
    for use in Iran is prohibited, Bank Tejarat can be identified as being involved
    in the procurement of prohibited goods and technology.
