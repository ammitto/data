  justification: Member of the non-democratically elected National Assembly. As a
    member of the National Assembly elected in 2015, he staged his election as President
    of the National Assembly on 5 Jan 2020, thereby undermining democracy and the
    rule of law in Venezuela. The election took place while entry of several parliamentarians
    to the premises of the National Assembly was blocked by military police, and without
    a quorum being reached. Therefore, opposition members had to organise themselves
    outside of the premises of the National Assembly to re-elect Juan Guaidó as its
    President. Shortly after the staged election of Parra Rivero, supported by the
    regime’s political party (PSUV), Parra Rivero was welcomed by Maduro and the non-recognised
    National Constituent Assembly (ANC).
