  justification: Garantex is a crypto-currency exchange based in Russia. Funds can
    be deposited with Garantex and withdrawn from Garantex using the bank-cards of
    Sberbank, T-Bank (formerly Tinkoff Bank) and Alfa-Bank, which are all listed under
    Regulation (EU) No 269/2014. Clients of those banks can gain access to the global
    financial system via Garantex, as roubles from bank accounts are exchanged into
    cryptocurrency and subsequently cryptocurrency is exchanged into other currencies.
    Therefore, by offering deposit and withdrawal services to customers of those three
    banks, Garantex is associated with Sberbank, T-Bank and Alfa-Bank, which are listed
    under Regulation (EU) No 269/2014.
