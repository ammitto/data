  justification: Dzina Kuchuk is a Belarusian judge at the Supreme Court of Belarus.
    Until February 2024, Dzina Kuchuk served as a judge of the Judicial Collegium
    for Criminal Cases of the Minsk City Court. As a judge at Minsk City Court, Dzina
    Kuchuk issued politically motivated rulings concerning freedom of expression or
    freedom of assembly against Andrei Andreyeu, Aliaksandr Komar, Sviatlana Bychkouskaya,
    Maryna Dubrouskaya, Yury Hrabianiok, Valeryia Kastsiuhova, Tatsiana Kouzina, Aliaksei
    Khralovich, Uladzimir Lavor, Viachaslau Pantsiushenka, Dzianis Varozau, Volha
    Tserakh, and Katsiaryna Zaretskaya, among others. Dzina Kuchuk is therefore responsible
    for the repression of civil society in Belarus.
