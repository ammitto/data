  justification: Aiman Ahmad Al-Duwaik is an Algeria-based financier for Hamas who
    helps run the organisation’s overseas investment portfolio. In particular, he
    is the CEO and a shareholder of the Algerian company Sidar, the CEO of Turkish
    company Anda Turk, a shareholder of the Sudan-based company Al Rowad Real Estate
    Development, and a member of the board of directors of construction company Uzmanlar
    Co. These companies are part of Hamas’ international financing network. Thus,
    Aiman Ahmad Al-Duwaik participates in the financing of Hamas.
