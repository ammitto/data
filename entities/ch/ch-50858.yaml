  justification: Mr Tigran Keosayan is a film director and journalist who has spread
    anti-Ukrainian propaganda in the Russian media. In his state-funded TV show “International
    Sawmill with Tigran Keosayan”, he consistently portrayed Ukraine as a weak and
    corrupt country, which had been maintained solely thanks to Western help. He suggested
    that the Ukrainian authorities were not legitimate. He repeatedly stated that
    Crimea belonged to Russia, and that Donbas was not part of Ukraine. Mr Keosayan
    participated in the “Russian Donbas” forum which was organised by the authorities
    of the so-called “Donetsk People’s Republic” in Donetsk with an aim to spread
    the doctrine of “Russian Donbas”. He publicly accused Ukraine of escalating the
    conflict.
