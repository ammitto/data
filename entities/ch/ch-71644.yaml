  justification: The 924th Unmanned Aerial Vehicle Center (Military Unit 20924) is
    part of the Russian Ministry of Defence. Servicemen are being trained at the Center
    to complete the unmanned aerial vehicle (UAV) companies being formed in the Western
    and Central Military Districts. At the same time, the Center is engaged in the
    completion of military tests of complexes with UAVs (Zastava, Navodchik-2, Forpost
    and Orlan-10), which, upon completion of the tests, are transferred to UAV companies.
    The 924th Unmanned Aerial Vehicle Center of the Russian Ministry of Defence trains
    UAV operators for the Armed Forces of the Russian Federation. Many of them have
    taken part in combat operations in the North Caucasus, Syria, and are now in the
    zone of the Special Military Operation.
