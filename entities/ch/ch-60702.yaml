  justification: Dubnensky Machine-Building Plant JSC is an entity actively contributing
    to Russia’s military-industrial complex. The company develops Orion reconnaissance
    and strike drones, as well as maritime drones for the Russian armed forces. Drones
    manufactured by Dubnensky Machine-Building Plant JSC have been equipped with guided
    missiles. Those drones are deployed by the Russian armed forces in its war of
    aggression against Ukraine. Between February and April 2022, there were six confirmed
    kills in Ukraine by Russian Orion drones manufactured by Dubnensky Machine-Building
    Plant JSC.
