  justification: JSC “Aleksinsky Experimental Mechanical Plant” produces weapons in
    Tula in the Russian Federation. It was added to the list of strategic organisations
    of the Russian Government in 2022. The company is part of the Russian military
    and industrial complex and supports it materially, including by being involved
    in the development, production and supply of military technology and equipment.
    The Deputy Head of the Security Council of the Russian Federation visited JSC
    “Aleksinsky Experimental Mechanical Plant” to inspect weapons production, and
    the company hosted a meeting of the working group of the Military-Industrial Commission
    of the Russian Federation. The recognition of JSC “Aleksinsky Experimental Mechanical
    Plant” and the involvement of the Russian Government demonstrate its strategic
    importance in the Russian defence sector.
