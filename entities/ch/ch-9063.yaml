  justification: EIH has played a key role in assisting a number of Iranian banks
    with alternative options for completing transactions disrupted by EU sanctions
    targeting Iran. EIH has been noted acting as the advising bank and intermediary
    bank in transactions with designated Iranian entities. For example, EIH froze
    the accounts of EU-designated bank Saderat Iran and Bank Mellat located at EIH
    Hamburg in early August 2010. Shortly afterwards, EIH resumed Euro-denominated
    business with Bank Mellat and Bank Saderat Iran using EIH accounts with a nondesignated
    Iranian bank. In August 2010, EIH was setting up a system to enable routine payments
    to be made to Bank Saderat London and Future Bank Bahrain, in such a way as to
    avoid EU sanctions. As of October 2010, EIH was continuing to act as a conduit
    for payments by EU-sanctioned Iranian banks, including Bank Mellat and Bank Saderat.
    These sanctioned banks are to direct their payments to EIH via Iran’s Bank of
    Industry and Mine. In 2009, EIH was used by Post Bank in a sanctions evasion scheme
    which involved handling transactions on behalf of UN-designated Bank Sepah. Bank
    Mellat is one of EIH’s parent banks.
