  justification: Structura National Technologies is a Russian IT company closely linked
    to Russian political power, established and headed by Nikolai Aleksandrovich Tupikin.
    Since 2022, it has been involved in the Russian-led digital disinformation campaign
    “RRN” (Recent Reliable News) aiming at manipulating information and sharing disinformation
    in support of the Russian war of aggression against Ukraine. Structura National
    Technologies has been identified as a key actor of the campaign, responsible for
    the creation of fake websites impersonating government organisations and legitimate
    media in Europe (primarily Germany, France, Italy, Ukraine and the United Kingdom)
    and for boosting the pro-Russian “RRN” campaign on social media. Therefore, Structura
    National Technologies is materially supporting actions which undermine and threaten
    the territorial integrity, sovereignty and independence of Ukraine.
