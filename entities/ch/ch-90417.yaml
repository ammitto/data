  justification: |-
    The Myanma Oil and Gas Enterprise (MOGE), a State-owned enterprise (SOE), is the oil operator, service provider and regulator of the oil and gas sector. It oversees oil and gas exploration and production, domestic gas transmission and the distribution of petroleum products. The SOE is endowed with the responsibility to grant permits and collect part of the tax on profits made by private companies that are either in ‘production-sharing contracts’ or in joint venture with MOGE.
    On 1 February 2021the Myanmar Armed Forces (Tatmadaw), led by Commander-in-Chief Min Aung Hlaing, seized power from the legitimate civilian Government in a coup d’état and established the State Administration Council (SAC) to exercise legislative, executive and judicial powers of the State. On 2 February 2021the SAC appointed new ministers, including a minister of Electricity and Energy. The Ministry of Electricity and Energy (MEE) has oversight of MOGE. Through the SAC and the new cabinet, the military regime acquired control over and benefits from State-owned enterprises, including MOGE.
