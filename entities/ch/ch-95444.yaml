  justification: JSC Scientific and Production Enterprise “Military Technologies”
    is a Russian defence enterprise that develops and manufactures high-tech and high-quality
    complex military-technical equipment, automated control systems and open-source
    software and decision support systems. The company, on the orders of the Russian
    Ministry of Defence, has developed the 1A50 Komandor-VT tablet artillery system,
    which was presented at the Army-2023 military technical forum. For that development,
    JSC Scientific and Production Enterprise “Military Technologies” used experience
    gained by its hardware and software being implemented in the frontline of Russia’s
    war of aggression against Ukraine. In 2024, a batch of its portable tablets designed
    for preparation and control of artillery fire was sent to an artillery unit for
    testing in combat conditions.
