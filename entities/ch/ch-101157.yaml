  justification: Murtaza Lakhani is a businessperson with interests in the oil sector.
    Through his companies, he enables shipments and export of Russian oil, notably
    from the Russian state-owned oil company Rosneft. In particular, Murtaza Lakhani
    controls vessels transporting crude oil or petroleum products, originating in
    Russia or being exported from Russia, while practicing irregular and high-risk
    shipping practices. Such practices include not maintaining adequate liability
    insurance, carrying out unsafe operations, intentionally taking measures to avoid
    ship detection, such as switching off Automatic Identification Systems, or not
    operating under a transparent corporate governance policy. Furthermore, the energy
    sector, in particular the oil sector, is a sector providing a substantial source
    of revenue to the Russian Government.
