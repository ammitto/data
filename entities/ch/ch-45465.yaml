  justification: In her position as Deputy Chairwoman and judge at the Frunzensky
    District Court in Minsk, Yuliya Blizniuk is responsible for numerous politically
    motivated rulings against journalists, activists and protesters, in particular
    sentencing activists Artsiom Khvashcheuski, Artsiom Sauchuk, Maksim Pauliushchyk.
    These persons are considered as political prisoners by Viasna, a Belarusian human
    rights organization. She is therefore responsible for serious human rights violations
    and for seriously undermining the rule of law, as well as for the repression of
    civil society and democratic opposition.
