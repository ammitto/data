  justification: President of FDLR, and supreme commander of the FDLR armed forces
    exercising influence over policies, and maintaining command and control over the
    activities of FDLR forces, one of the armed groups and militias referred to in
    paragraph 20 of Res. 1493 (2003), involved in trafficking of arms, in violation
    of the arms embargo. In telephone communication with FDLR military field commanders
    (including during the Busurungi May 2009 massacre); gave military orders to the
    high command; involved in coordinating the transfer of arms and ammunition to
    FDLR units and relaying specific instructions for use; managing large sums of
    money raised through illicit sale of natural resources in areas of FDLR control.
    According to the Office of the SRSG on Children and Armed Conflict, he held command
    responsibility as President and military commander of FDLR for recruitment and
    use of children by the FDLR in Eastern Congo.
