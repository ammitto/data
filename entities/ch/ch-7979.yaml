  justification: Hassan Abdullah Hersi Al-Turki has been a senior leader of an armed
    militia group since the mid-1990s and had engaged in numerous arms embargo violations.
    In 2006, Al-Turki contributed forces to the Islamic Courts Union take-over of
    Mogadishu and emerged as a military leader in the group, aligned with Al-Shabaab.
    Since 2006, Al-Turki has made territory under his control available for training
    by various armed opposition groups including Al-Shabaab. In Sep 2007, Al-Turki
    appeared in an Al-Jazeera news video showing militia training under his leadership.
