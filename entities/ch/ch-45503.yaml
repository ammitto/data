  justification: In his position as judge of the Sovetsky District Court of Minsk,
    Aliaksandr Vouk is responsible for numerous politically motivated rulings against
    peaceful protesters, in particular the sentencing of sisters Anastasia and Victoria
    Mirontsev, considered as political prisoners by Viasna, a Belarussian human rights
    organisation. Violations of rights of defence and right to a fair trial were reported
    during trials conducted under his supervision. He is therefore responsible for
    serious human rights violations and for seriously undermining the rule of law,
    as well as for the repression of civil society and democratic opposition.
