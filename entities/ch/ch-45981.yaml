  justification: In his position as Minister of Defense of Belarus since 20 Jan 2020,
    Viktar Khrenin is responsible for the decision taken by the Command of the Air
    Forces and Air Defence Forces, on Lukashenka's instructions, to dispatch military
    aircraft to escort the forced landing of passenger flight FR4978 in Minsk airport
    without proper justification on 23 May 2021. This politically motivated decision
    was aimed at arresting and detaining opposition journalist Raman Pratasevich and
    Sofia Sapega and is a form of repression against civil society and democratic
    opposition in Belarus. He has made several public statements, declaring readiness
    to use the army against peaceful protesters in Aug 2020 and likening protesters'
    use of the historical white-red-white flag to Nazi collaborators. He is therefore
    responsible for the repression of civil society and democratic opposition in Belarus,
    and is supporting the Lukashenka regime.
