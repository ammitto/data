  justification: President of the Imam Khomeini Relief Foundation (since Jul 2019).
    Former deputy custodian of Imam Reza shrine. Former Official of the Special Clerical
    Tribunal. Former Minister of Justice from 2009 to 2013. During his time as Minister
    of Justice, prison conditions within Iran fell well below accepted international
    standards, and there was widespread mistreatment of prisoners. In addition, he
    played a key role in threatening and harassing the Iranian diaspora by announcing
    the establishment of a special court to deal specifically with Iranians who live
    outside the country. He also oversaw a sharp increase in the number of executions
    in Iran, including secret executions not announced by the government, and executions
    for drug-related offences.
