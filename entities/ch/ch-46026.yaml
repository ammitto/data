  justification: In his position as Minister of Transport and Communications of Belarus,
    Aliaksei Auramenka is responsible for the state management in the sphere of civil
    aviation and supervision of air traffic control. He therefore bears responsibility
    for diverting passenger flight FR4978 to Minsk airport without proper justification
    on 23 May 2021. This politically motivated decision was aimed at arresting and
    detaining opposition journalist Raman Pratasevich and Sofia Sapega and is a form
    of repression against civil society and democratic opposition in Belarus. He is
