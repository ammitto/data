  justification: Mikita Rachylouski holds senior positions in the government institution
    the Youth Council, the GONGO Moving Forward and the media (the “Senate” television
    programme). Using those positions, Mykyta Rachylouski has spoken out against Belarusian
    citizens for criticising the government, participating in protests in 2020 and
    having opposing views. He has been especially vocal in seeking punishment and
    persecution for the blogger Kokobay, as well as the music band Drozdy and others.
    His statements incite persecution and promote hatred towards critics of the regime.
    During one of his numerous television appearances, he advocated for the removal
    of history faculty staff at Belarusian universities.
