  justification: Aleksey Dubonosov is the General Director of the FSE Tambov Gunpowder
    Plant that produces pyroxylin powders, which is used in various types of ammunition
    used by the Russian Armed Forces. The plant produces pyroxylin powders for a wide
    range of ammunition, from 7.62 mm cartridges and grenades for Kalashnikov rifles
    to 125 mm tank rounds for T-90 main battle tank and artillery shells for 2S3 Akatsiya,
    2S19 Msta-S, Msta-B and 2S5 Hyacinth artillery and howitzer units. The FSE Tambov
    Gunpowder Plant is owned by the Russian defence conglomerate Rostec State Corporation.
    The plant operates in a strategically important sector of the military industry
    and was able to increase its production capacity during Russia’s war of aggression
    against Ukraine.
