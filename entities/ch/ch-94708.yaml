  justification: JSC Vistan is a Belarusian manufacturer of machine tools, including
    CNC machining centres, cylindrical grinders, centreless grinding machines, gear
    processing equipment, and lathes. These are dual-use technologies used in the
    production of military goods. JSC Vistan exports over 60 % of its products to
    Russia and supplies machine tools to Russian defence-related enterprises, including
    JSC “Krasny Oktyabr”. The company is part of a Belarus-Russia import-substitution
    program and is receiving US$15 000 000 in funding backed by Russian state financial
    support, to expand gear-processing machine production.
