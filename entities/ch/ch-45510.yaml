  justification: In her position as judge of the Oktyabrsky district court in Minsk,
    Volha Niaborskaya is responsible for numerous politically motivated rulings against
    peaceful protesters and journalists, in particular the sentencing of Sofia Malashevich
    and Tikhon Kliukach, considered as political prisoners by Viasna, a Belarussian
    human rights organisation. Violations of rights of defence were reported during
    trials conducted under her supervision. She is therefore responsible for serious
    human rights violations and seriously undermining the rule of law, as well as
    for the repression of civil society and democratic opposition.
