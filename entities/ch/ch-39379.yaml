  justification: Major General Maung Maung Soe was the Commander of the Western Command
    of the Myanmar Armed Forces (Tatmadaw) from Oct 2016 to 10 Nov 2017 and oversaw
    the military operations in Rakhine State. In that context, he is responsible for
    the atrocities and serious human rights violations committed against Rohingya
    population in Rakhine State by the Western Command during that period. These include
    unlawful killings, sexual violence and systematic burning of Rohingya houses and
    buildings.
