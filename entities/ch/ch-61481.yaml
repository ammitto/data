  justification: Yakov Kedmi (Kazakov) is a political commentator and regular participant
    on State TV and pro-Kremlin propaganda shows. His statements on Ukraine match
    the most controversial claims of Russian officials and propagandists. Yaakov Kedmi
    (Kazakov) has criticised Ukraine, accused the Ukrainian leadership of Nazism,
    and of being a military threat to the so-called Donetsk and Luhansk Peoples’ Republics
    and Russia. He has justified Russia’s war of aggression against Ukraine, saying
    it was inevitable. Yakov Kedmi (Kazakov) has stated that Russia needs to control
    Ukrainian territories and questioned Ukraine’s statehood. He has claimed that
    any territory of Ukraine remaining under Ukrainian control will be a threat to
    Russia, as it will turn into a military base to be used against Russia. He has
    not excluded the option that the Russian army would occupy all of Ukraine, completely
    destroying the Ukrainian army and completely liquidating the current Ukrainian
    leadership.
