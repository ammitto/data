  justification: Sovcomflot is Russia’s largest shipping company, specialising in
    the transportation of liquefied gas, crude oil, and petroleum products, as well
    as the servicing of offshore upstream energy production. Sovcomflot focuses its
    activities on domestic cargos and specialises in the tanker market segments that
    are particularly necessary for Russian foreign trade. Sovcomflot is a global leader
    in Aframax tankers (80 000-120 000 tonnes in deadweight tonnage) and product tankers.
    Since the start of Russia’s war of aggression against Ukraine, Sovcomflot has
    been operating as one of the key companies managing and operating the maritime
    transport of Russian oil. Sovcomflot is a Russian state shipping company, and
    therefore the Russian Federation is the ultimate beneficiary of its services.
    Such services provide a substantial source of revenue to the Government of the
    Russian Federation, accounting for more than 70 % of Russia’s energy revenue,
    thereby enabling the Kremlin to finance its war of aggression against Ukraine.
