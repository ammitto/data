  justification: PMC Potok is a Russian private military company that participates
    in Russian combat operations in Ukraine. Created and financed by Russian energy
    corporation Gazprom, the volunteer battalions of PMC Potok consist mostly of Gazprom
    employees, predominantly working in the security guard branch. The volunteer battalions
    of PMC Potok directly contribute to Russia’s war of aggression against Ukraine.
    The volunteer battalions of PMC Potok were trained and transferred to Rostov-on-Don,
    where they were assigned to various units of the Russian Armed Forces in order
    to participate in combat operations in Ukraine. Therefore, PMC Potok is supporting
    materially actions which undermine or threaten the territorial integrity, sovereignty
    and independence of Ukraine.
