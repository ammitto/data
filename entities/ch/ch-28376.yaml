  justification: 'The ownership of the entity was transferred contrary to Ukrainian
    law. On 17 March 2014 the “Parliament of Crimea” adopted Resolution No 1757-6/14
    “On nationalization of some companies belonging to the Ukrainian ministries of
    infrastructure or agriculture” declaring the appropriation of assets belonging
    to the state enterprise “Sevastopol commercial seaport” on behalf of the “Republic
    of Crimea”. The enterprise is thus effectively confiscated by the Crimean “authorities”.
    In 2023, it was announced that the ownership of the State Unitary Enterprise of
    the City of Sevastopol “Sevastopol seaport” would be transferred to the Russian
    Federation. In terms of volume of trade, it is the biggest commercial seaport
    in Crimea. Re-registered on 6 June 2014 as State Unitary Enterprise of the City
    of Sevastopol “Sevastopol seaport” (Государственное унитарное предприятие города
    Севастополя “Севастопольский морской порт”). Founder: The Government of Sevastopol
    (Правительство Севастополя).'
