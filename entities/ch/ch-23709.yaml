  justification: In April 2012, Ngaruye commanded the ex-CNDP mutiny, known as the
    Mouvement du 23 Mars (M23), under the orders of General Ntaganda. He is currently
    the third highest ranking military commander within the M23. The Group of experts
    on the DRC previously recommended him for designation in 2008 and 2009. He is
    responsible for and has committed severe violations of human rights and international
    law. He recruited and trained hundreds of children between 2008 and 2009 and then
    towards the end of 2010 for the M23. He has committed killing, maiming and abductions,
    often targeting women. He is responsible for executions and torture of deserters
    within the M23. In 2009 within the FARDC, he gave the orders to kill all men in
    Shalio village of Walikale. He also provided weapons, munitions and salaries in
    Masisi and Walikale under the direct orders from Ntaganda. In 2010 he orchestrated
    the forced displacement and expropriation of populations in the area of Lukopfu.
    He has also been extensively involved in criminal networks within the FARDC deriving
    profits from the mineral trade which led to tensions and violence with Colonel
    Innocent Zimurinda in 2011.
