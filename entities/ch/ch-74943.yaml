  justification: El Tahir Mohamed El Awad El Amin is a Lieutenant General in the SAF
    and Commander of the Sudanese Air Force since 1 September 2022. He is therefore
    in charge of the operations carried out by the Air Force of the SAF since the
    outbreak of the conflict between the SAF, the RSF and their allied militias on
    15 April 2023, as underscored by his participation in publicly disclosed high-level
    meetings of senior commanders of the SAF headed by the Commander-in-Chief Abdelfattah
    Al-Burhan in the General Command of the SAF in Khartoum in May and July 2023.
