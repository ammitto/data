  justification: Alexey Gorshkov is the General Director of JSC “Scientific Research
    Institute of Computing Complexes Named After M.A. Kartsev”, a research institute
    based in Russia and involved in the development and production of unmanned aerial
    vehicles (UAVs). It has produced several different types of UAVs, which have been
    or will be tested by Russian armed forces in the war of aggression against Ukraine.
    Therefore, as the General Director of JSC “Scientific Research Institute of Computing
    Complexes Named After M.A. Kartsev”, Alexey Gorshkov is supporting or implementing
    actions or policies which undermine or threaten the territorial integrity, sovereignty
    and independence of Ukraine. Furthermore, he is associated with JSC “Scientific
    Research Institute of Computing Complexes Named After M.A. Kartsev”.
