  justification: Andrei Parshyn is the Head of the Main Department for Combating Organised
    Crime and Corruption (GUBOPiK) in the Ministry of Internal Affairs since 2021.
    GUBOPiK is one of the main bodies responsible for political persecution in Belarus,
    including arbitrary and unlawful arrests and ill-treatment, including torture,
    of activists and members of civil society. GUBOPiK has published on its Telegram
    profile videos of forced confessions by Belarusian activists and ordinary citizens,
    exposing them to the Belarusian general public and using them as a tool for political
    pressure. GUBOPiK also detained Mark Bernstein, one of the top Russian-language
    Wikipedia editors, for publishing information on the Russian aggression against
    Ukraine, considered as anti-Russian “fake news”. Andrei Parshyn is therefore responsible
    for serious violations of human rights and for the repression of civil society
    in Belarus.
