  justification: Co-President of Nicaragua since February 2025, First Lady of Nicaragua
    and a leader of the Sandinista Youth. Vice President of Nicaragua from January
    2017 to February 2025. She played an instrumental role in encouraging and justifying
    the repression of opposition demonstrations by the Nicaraguan National Police
    in 2018. In June 2021, she publicly threatened the Nicaraguan opposition and discredited
    independent journalists. Those threats have been repeated since then. In February
    2023, Daniel Ortega revealed that Rosario María Murillo Zambrana is the instigator
    of new repressions, namely related to the expulsion and deprivation of citizenship
    of 222 political prisoners. She is therefore responsible for serious human rights
    violations, for the repression of civil society and democratic opposition, and
    for undermining democracy in Nicaragua.
