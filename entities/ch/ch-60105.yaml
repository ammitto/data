  justification: Aung Hlaing Oo has been the Chair of Myanmar Chemical and Machinery
    (MCM) Company Limited and other subsidiaries since he founded the company in 2001.
    He has used his commercial and personal position to provide support for violence
    perpetrated by the Myanmar Armed Forces (Tatmadaw) against their own population
    in his role as an importer and broker of arms and dual use goods. Through his
    chairmanship of MCM, he acts as a key source of weapons and commercial support
    for the junta, including through his close political/commercial ties with various
    companies in the military equipment sector, including in 2019 and 2020. He has
    also participated in delegations for arms procurement for the Myanmar military,
    including in June 2021. Such materials, including helicopters and spare parts
    for aircrafts, are used in the bombing of civilians in several States and regions.
