  justification: In his former position as Head of the Smorgon Border Group, Maksim
    Butranets was responsible for actions of border guards under his command. The
    deliberate failure of the Smorgon Border Group to carry out its duties properly
    facilitates attempts by migrants to cross the border with Union Member States.
