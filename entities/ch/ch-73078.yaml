  justification: |-
    JSC “Corporation ‘Moscow Institute of Thermal Technology’” (JSC Corporation MIT), by the orders from the Ministry of Defence of the Russian Federation, improves the effectiveness and technical level of missile armament. JSC Corporation MIT developed mobile ground-based missile systems with solidpropellant guided ballistic missiles Temp-S, Temp-2S, Pioneer, Topol, Topol-M, Yars and others. Mobile ground-based complexes with ballistic missiles, developed by the corporation, are on combat duty in the Russian Armed Forces. In addition, JSC Corporation MIT ran an aid collection campaign entitled
    “MIT Helps!” to help soldiers and militias of the so-called Donetsk and Lugansk People’s Republics”.
