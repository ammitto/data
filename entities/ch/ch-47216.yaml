  justification: The Nicaraguan Institute of Telecommunications and Postal Services
    (TELCOR) is the regulatory entity for telecommunications and postal services.
    It has been used by the Nicaraguan authorities to silence independent media, including
    three news organisations since 2018, during the repression of 2018 and after the
    general elections of 2021. During the general elections campaign, TELCOR was implementing
    a disinformation campaign on a large scale. As the institution in charge of the
    implementation of the “cybersecurity law”, TELCOR has been commanding and operating
    surveillance actions regarding civil society and democratic opposition. In addition,
    TELCOR continues its campaign of tight media control by shutting down radio stations
    close to the democratic opposition. TELCOR is therefore responsible for serious
    violations of human rights, and the repression of civil society and democratic
    opposition.
