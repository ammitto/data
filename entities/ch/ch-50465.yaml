  justification: Andrei Burdyko is Major General, Deputy Minister of Defence for Logistics,
    Chief of Logistics, of the Republic of Belarus. He is part of the Belarusian army,
    which has supported and facilitated the Russian military aggression against Ukraine
    since 24 February 2022, in particular by hosting and participating in joint exercises
    of the armed forces of Belarus and Russia in the weeks preceding the military
    aggression. In his position as Major General and Deputy Minister of Defence for
    Logistics of the Republic of Belarus, Andrei Burdyko is therefore responsible
    for and actively supporting actions undermining the territorial integrity, sovereignty
    and independence of Ukraine, as well as stability and security in Ukraine.
