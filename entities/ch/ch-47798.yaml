  justification: No. 1 Mining Enterprise (ME 1) is a State-owned enterprise (SOE)
    operating under the Ministry of Natural Resources and Environmental Conservation
    (MONREC) that also acts as the regulator for the sector of non-ferrous metal production
    and marketing. As such, the SOE is endowed with the responsibility to grant permits
    and collect part of the tax on profits made by private companies that are either
    in ‘production-sharing contracts’ or in joint venture with ME 1. On 1 Feb 2021
    the Myanmar Armed Forces (Tatmadaw), led by Commander-in-Chief Min Aung Hlaing,
    seized power from the legitimate civilian Government in a coup d’état and established
    the State Administration Council (SAC) to exercise legislative, executive and
    judicial powers of the State. On 2 Feb 2021 the military regime appointed a new
    cabinet, including a new minister for Natural Resources and Environmental Conservation
    (MONREC). Through the SAC and the new cabinet, the military regime acquired control
    over and benefits from SOEs, including No. 1 Mining Enterprise. No. 1 Mining Enterprise
    is thus controlled by and generates revenue for the Tatmadaw, therefore contributing
    to its capabilities to carry out activities undermining democracy and the rule
    of law. Moreover, No. 1 Mining Enterprise has taken part and/or overseen various
    projects linked to violence by the Tatmadaw against civilian populations and violation
    of their most basic rights, including through land confiscation and forced relocation.
    No. 1 Mining Enterprise is therefore responsible for supporting actions that threaten
    the peace, security and stability of Myanmar/Burma.
