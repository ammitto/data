  justification: JSC GTLK is a Russian state-owned enterprise overseen by the Russian
    Ministry of Transportation. GTLK operates in air, sea and rail transport, passenger
    transport, automotive and special equipment for domestic companies in the transport
    industry, and carries out investment activities to develop Russia’s transport
    infrastructure. It is the largest transportation leasing company in Russia. In
    2020, GTLK’s lease portfolio was valued at RUB 1.3 billion, and it has subsidiary
    companies in the Middle East, Asia and Europe. GTLK has set itself the goal of
    creating a fleet of drones, imported from China, to carry out aerial surveillance
    missions. GTLK is a legal entity, financially supporting and benefitting from
    the Government of the Russian Federation, which is responsible for the annexation
    of Crimea and the destabilisation of Ukraine.
