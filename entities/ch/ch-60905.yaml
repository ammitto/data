  justification: Vyacheslav Dukhin is the deputy head of the Moscow Oblast Duma. In
    that capacity, Vyacheslav Dukhin directly contributes to the illegal deportation
    and adoption of Ukrainian children. He facilitates the illegal adoption of Ukrainian
    children into families living in his region and has sought to arrange Russian
    citizenship for those illegally deported Ukrainian children. The activities pursued
    by Vyacheslav Dukhin are part of a broader strategy of the Russian Federation
    to illegally deport Ukrainian citizens. Since its war of aggression against Ukraine,
    Russia has transferred many Ukrainian civilians to Russian-occupied areas or to
    Russia itself while often preventing or impeding those civilians from having safe
    passage to non-occupied parts of Ukraine. Vyacheslav Dukhin is one of the key
    persons involved in the forcible deportation of Ukrainian children to Russia and
    their subsequent illegal adoption into Russian families. Vyacheslav Dukhin’s actions
    violate the rights of Ukrainian children and infringe Ukrainian law and administrative
    order.
