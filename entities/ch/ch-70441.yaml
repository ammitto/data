  justification: PMC Tsarskie Volki is a Russian private military company that directly
    participates in Russian combat operations in Ukraine. Combatants of PMC Tsarskie
    Volki actively participate in Russian operations in the so-called “Donetsk People’s
    Republic” and the so-called “Luhansk People’s Republic”. The organisation predominantly
    consists of military-technical experts who work on the development of weapons
    and explosive materials on behalf of the Russian Armed Forces. PMC Tsarskie Volki
    has provided military-technical assistance to units of the so-called “Donetsk
    People’s Republic” and “Luhansk People’s Republic” and has trained them in reconnaissance
    and assault activities. Furthermore, PMC Tsarskie Volki has designed and tested
    hundreds of weapons and explosives within the context of Russia’s war of aggression
    against Ukraine. For example, PMC Tsarskie Volki has developed the so-called “Marker”
    robotic tank which has served to destroy Ukrainian armoured vehicles.
