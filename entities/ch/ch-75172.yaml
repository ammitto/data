  justification: Maria Kiselyova is a Deputy of the Moscow City Duma. She is actively
    involved in the propaganda actions of the movement All-Russia People’s Front.
    She has publicly advocated for a campaign of the People’s Front to deliver equipment
    to the Russian military for use in its war of aggression against Ukraine. In the
    Oryol region, she presented awards to citizens who provided support for the Russian
    military for use in that war. In her public statements, she has consistently justified
    the Russian war of aggression against Ukraine and called for victory. She has
    also visited the occupied territories of Ukraine. As a Deputy of the Moscow City
    Duma, she has supported expanding social support to families of Russian soldiers
    involved in the war of aggression. Therefore, Maria Kiselyova is supporting and
    implementing actions and policies which undermine and threaten the territorial
    integrity, sovereignty and independence of Ukraine. Furthermore, she is associated
    with the All-Russia People’s Front.
