  justification: Andrey Bobrowskiy is a member of the nationalist motorcycle club
    Nightwolves MC and leader of the “Roads for Victory” branch of Nightwolves MC.
    In his position as leader of the “Roads for Victory” branch, Bobrowskiy has organised
    several Nightwolves rallies in Berlin, Poland and Russia. Since the Russian attack
    on Ukraine in Feb 2022, the purpose of the rallies has been to actively support
    the Russian war on Ukraine and to publicly deny Ukraine’s right to statehood and
    calling for the ‘denazification’ of the country and promoting the idea that Ukraine
    should be an integral part of Russia. Bobrowskiy has therefore actively and publicly
    supported Russian state propaganda. Andrey Bobrowskiy is a member of the Nightwolves
    MC, which is responsible for materially supporting actions which undermine or
    threaten the territorial integrity, sovereignty and independence of Ukraine. Furthermore,
    he is a natural person responsible for, supporting and implementing actions or
    policies which undermine or threaten the territorial integrity, sovereignty and
    independence of Ukraine, as well as the stability and security in Ukraine.
