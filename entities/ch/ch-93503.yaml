  justification: Viktor Novikov is the General Director of JSC UAP “Gidravlika”. UAP
    “Gidravlika” is part of JSC “Technodinamika” and is a Russian military industry
    company. The company is a developer, manufacturer and repairer of components (including
    engines and filters) for aviation and military equipment. JSC UAP “Gidravlika”
    provides material support (including camouflage nets made by workers of the company)
    to Russian soldiers at the front in Ukraine. As General Director of JSC UAP “Gidravlika”,
    Viktor Novikov is therefore supporting actions which undermine and threaten the
    territorial integrity, sovereignty and independence of Ukraine, and supporting
    materially and benefitting from the Government of the Russian Federation, which
    is responsible for the annexation of Crimea and the destabilisation of Ukraine.
