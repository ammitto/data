  justification: Design Bureau Mikrob is a Russian entity which produces first-person
    view (FPV) unmanned aerial vehicles (UAVs) for the Russian army. In 2024, the
    company announced plans to deliver 3 000 UAVs equipped with AI autopilot to the
    frontline in Ukraine. In August 2024, the Microb-10 UAV was successfully deployed
    by operators from the 35th Motorised Rifle Guards Aleyskaya Brigade of the 41st
    Army against a Ukrainian tank. Citizens of Novosibirsk, part of the All-Russia
    People’s Front organisation, successfully sent 40 combat FPV UAVs to the Russian
    troops involved in Russia’s war of aggression against Ukraine.
