  justification: Rosoboronexport is Russia’s only official state intermediary for
    the export and import of military and dual-use products, technologies and services.
    Rosoboronexport is a subsidiary company of Rostec, a state owned corporation that
    oversees the research and development of military technologies, and owns several
    production facilities which play an instrumental role in the deployment of those
    technologies into operation on the battlefield. Arms sales provide an important
    source of hard currency to the Russian government. They are also used to advance
    Russia’s economic and strategic objectives. From 2000 to 2020 Rosoboronexport
    sold USD 180 billion worth of arms to foreign customers.
