  justification: In his former position as Deputy Head of the Penal Correction Department
    of the Ministry of Internal Affairs that has authority over detention facilities,
    Andrei Dailida was responsible for the inhumane and degrading treatment, including
    torture, inflicted on citizens who participated in peaceful protests and were
    detained in those detention facilities in the wake of the 2020 presidential election,
    in line with the address of Lukashenka to officers of the Interior Ministry. In
    his position, he bears responsibility for detention conditions in Belarusian prisons,
    including the categorization of prisoners, corresponding to different kinds of
    ill-treatment and torture the detainees are subject to, such as verbal abuse,
    punitive isolation, deprivation of calls and visits, mutilation, beatings and
    brutal torture. For his work as Deputy head of the Penal Correction Department
    of the Ministry of Internal Affairs, he received, in Dec 2020, the Presidential
    Order for service to the Motherland and has therefore benefitted from the Lukashenka
    regime. He is therefore responsible for serious human rights violations and for
    the repression of civil society and democratic opposition. He remains active in
    the Lukashenka regime as Head of the Rear Support Department at the Ministry of
    Internal Affairs of Belarus.
