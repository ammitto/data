  justification: As Vice Speaker of the Verkhovna Rada of Crimea, Sergey Tsekov initiated,
    together with Sergey Aksyonov, the unlawful dismissal of the government of the
    Autonomous “Republic of Crimea” (ARC). He drew Vladimir Konstantinov into this
    endeavour, threatening him with dismissal. He publicly recognised that the MPs
    from Crimea were the initiators of inviting Russian soldiers to take over the
    Verkhovna Rada of Crimea. He was one of the first Crimean Leaders to ask in public
    for the annexation of Crimea to Russia.
