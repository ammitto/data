  justification: In his position as Deputy Head of the Akrestina Temporary Detention
    Centre, Uladzimir Lapyr is responsible for appalling conditions and for the inhumane
    and degrading treatment, including beatings and torture, inflicted on citizens
    detained in this detention facility in the wake of the 2020 presidential election.
    According to the testimony of multiple women included in the report of the Centre
    for Promotion of Women’s Rights, "Her Rights," the most inhumane treatment took
    place in the detention centre at Akrestina in Minsk, where the OMON policemen
    were especially cruel and used torture. He is therefore responsible for serious
    violations of human rights and for the repression of civil society and democratic
    opposition.
