  justification: Sergei Semyonovich Sobyanine is the mayor of Moscow and has close
    ties with Vladimir Putin. He was head of the presidential administration from
    2005 to 2008 and served as Deputy Prime Minister of Russia from 2008 to 2010 in
    Vladimir Putin’s Second Cabinet. He is a member of the Security Council. On 1
    Mar 2022, Sobyanine warned that all attempts and calls by “provocateurs” to hold
    street protests in Moscow would be prevented. At the 18 Mar 2022 political rally
    “for a world without Nazism”, he explicitly expressed support for the “special
    military operation” in Ukraine. He is therefore supporting or implementing actions
    or policies which undermine or threaten the territorial integrity, sovereignty
    and independence of Ukraine, or stability or security in Ukraine.
