  justification: Anar Madatli is a shareholder in and director of 2Rivers Group, a
    UAE based oil-trading company previously known as “Coral Energy”. Since 2024,
    the company’s shares have been held by three company managers – Talat Safarov,
    Ahmed Kerimov and Anar Madatli. 2Rivers Group enables shipments and exports of
    Russian oil, notably from the Russian state owned oil-company Rosneft, by concealing
    the actual origin of the oil. In particular, 2Rivers Group controls a large proportion
    of the vessels in Russia’s so-called “shadow fleet”. Regardless of its change
    in name and ownership, 2Rivers Group continues to operate the same network as
    Coral Energy, which includes associated entities such as Nord Axis and Bellatrix,
    as demonstrated by the connection between the previous owners and the new management.
    Furthermore, the energy sector, in particular the oil sector, is a sector providing
    substantial revenue to the Russian Government.
