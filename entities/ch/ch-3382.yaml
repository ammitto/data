  justification: Born in Rwanda, he moved to Nyamitaba, Masisi territory, North Kivu,
    when he was a child. Nominated FARDC Brigadier-General by Presidential Decree
    on 11 Dec 2004, following Ituri peace agreements. Formerly Chief of Staff in CNDP
    and became CNDP military commander since the arrest of Laurent Nkunda in Jan 2009.
    Since Jan 2009, de facto Deputy Commander of consecutive anti-FDLR operations
    ‘Umoja Wetu’, ‘Kimia II’, and ‘Amani Leo’ in North and South Kivu. Entered Rwanda
    in Mar 2013, and voluntarily surrendered to ICC officials in Kigali on Mar 22.
    Transferred to the ICC in The Hague, Netherlands. On 9 Jun 2014, ICC confirmed
    13 charges of war crimes and five charges of crimes against humanity against him;
    the trial started in Sep 2015. On 8 Jul 2019, the ICC found him guilty of 18 counts
    of war crimes and crimes against humanity, committed in Ituri in 2002-2003. On
    7 Nov 2019, he was sentenced to a total of 30 years imprisonment. He has appealed
    both his conviction and sentence. On 30 Mar 2021, the ICC Appeals Chamber confirmed
    his conviction and sentence. On 14 Dec 2022, he was transferred to the territory
    of Belgium for enforcement of sentence.
