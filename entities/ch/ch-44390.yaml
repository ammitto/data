  justification: Member of the non-democratically elected National Assembly and illegitimate
    leader of opposition party Acción Democrática. José Bernabé Gutiérrez Parra gained
    illegitimate control over opposition party Acción Democrática in Jun 2020 via
    a ruling of the Supreme Court. In contravention of the party’s position prior
    to his take over, Gutiérrez Parra participated with Acción Democrática in the
    non-democratic elections of the National Assembly which took place on 6 Dec 2020.
    Gutiérrez Parra changed the position of the party, used its symbols and participated
    in the elections and public events such as televised debates. Gutiérrez Parra
    was expelled from the party by legitimate Acción Democrática members who called
    his actions conspiracy and betrayal. His actions have therefore undermined democracy
    and the rule of law in Venezuela.
