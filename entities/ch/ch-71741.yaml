  justification: Sovfracht JSC is a Russian shipping company providing logistical
    support to the Ministry of Defence of the Russian Federation. In particular, Sovfracht
    JSC functions as a key node in military transportation networks of Russian cargo
    vessels shipping North Korean armaments from Pyongyang to military facilities
    in the Russian port of Dunai. Subsequently, North Korean munitions transported
    by Sovfracht JSC are transferred to weapons depots on Russia’s western border
    to be deployed in Russia’s war of aggression against Ukraine.
