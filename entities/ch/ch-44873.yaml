  justification: General Maung Maung Kyaw is a former member of the Myanmar Armed
    Forces (Tatmadaw). He retired in Jan 2022. He was a member of the State Administration
    Council (SAC) until Feb2023. He previously served as Commander-in-Chief of the
    Myanmar Air Force between 2018 and Jan 2022. On 1 Feb 2021, the Myanmar Armed
    Forces (Tatmadaw), led by Commander-in-Chief Min Aung Hlaing, staged a coup in
    Myanmar by setting aside the results of the elections held on 8 Nov 2020 and overthrowing
    the democratically elected government. As part of the coup, Vice-President Myint
    Swe, functioning as Acting President, declared a state of emergency on 1 Feb 2021
    and transferred the legislative, executive and judicial powers of the state to
    the Commander-in-Chief of Defence Services Senior General Min Aung Hlaing. On
    2 Feb 2021, the SAC was established to exercise those powers, preventing the democratically
    elected government from fulfilling its mandate. As member of the SAC, General
    Maung Maung Kyaw has been directly involved in and responsible for decision-making
    concerning state functions and is therefore responsible for undermining democracy
    and the rule of law in Myanmar/Burma.
