  justification: In his position as Head of Separate Service for Active Measures (ASAM)
    of the Special Forces of the State Border Committee, Ihar Kruchkou is responsible
    for actions of forces under his command, who are involved in the physical transportation
    of migrants inside Belarus to the border between Belarus and Union Member States.
    ASAM charges the transported migrants for the border crossing. Those actions are
    implemented as part of operation “Gate”. He is therefore contributing to activities
    by the Lukashenka regime that facilitate the illegal crossing of the external
    borders of the Union.
