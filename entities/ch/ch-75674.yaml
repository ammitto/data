  justification: Aram Gabrelyanov is a Russian propagandist close to the Kremlin.
    He is spreading aggressive propaganda, by disseminating fake news and misinformation
    in support of Russia’s war of aggression against Ukraine. He is the founder and
    editorial director of Life news portal, which has become one of the symbols of
    unscrupulous propaganda. He himself has spoken aggressively and in a biased manner
    against the democratically elected authorities of Ukraine and has always emphasised
    his full support for Russia’s aggressive policy towards Ukraine. He has been actively
    involved in multiple projects conducted in occupied Ukrainian territories for
    media specialists, such as the “Academy of Emotions” funded by the Presidential
    Fund for Cultural Initiatives and established to promote the war. His company
    Mash manages regional publications of the Mash propaganda project. He is also
    a sponsor of the WarGonzo Z-military project, whose correspondents have been conducting
    anti-Ukrainian propaganda since the beginning of the war. Therefore, Aram Gabrelyanov
    is supporting and implementing actions and policies which undermine and threaten
    the territorial integrity, sovereignty and independence of Ukraine.
