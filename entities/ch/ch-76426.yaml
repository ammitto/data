  justification: Ali Morshed Shirazi is a senior Islamic Revolutionary Guard Corps
    – Quds Force (IRGC-QF) official serving as Bureau Chief of the Palestine Branch,
    operating out of Lebanon. The IRGC-QF provides financial support, as well as training,
    intelligence, and other forms of assistance to Hamas and the Palestinian Islamic
    Jihad (PIJ). Within his organisation, Shirazi is in charge of the monitoring and
    control unit responsible for executing military operations. Together with IRGC-QF
    Palestine Branch leader Sa’id Izadi, he also operates the Cyber Unit, which aides
    Hamas’ operations by extracting information from the phones of Israeli soldiers.
    Moreover, he has requested the assistance of the technical unit of IRGC-QF (Unit
    340) to support PIJ.
