  justification: Nikolai Medunitsin is the Director of JSC NIIP (a.k.a. Tikhomirov
    Scientific Research Institute of Instrument Design). JSC NIIP is a Russian military-industrial
    state enterprise. JSC NIIP produces medium-range anti-aircraft missile systems
    for the Russian ground forces, including the Buk-M1, Buk-M2E and Buk-M1-2 missile
    systems, as well as weapons control systems and aviation radar systems for fighter
    aircraft, including the MiG-31, Su-27, Su-33, Su-30MKK, Su-30MK2, Su-30MKI, Su-27SM
    and Su-35 aircraft, deployed by the Russian Armed Forces. Moreover, JSC NIIP is
    part of the Almaz-Antey concern, a Russian state-owned arms manufacturer that
    develops anti-aircraft defence and cruise missile systems for the Russian military.
