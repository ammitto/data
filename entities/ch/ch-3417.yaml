  justification: Congomet trading House was owned by Kisoni Kambale (deceased on 5
    July 2007 and subsequently delisted on 24 April 2008 by the Security Council Committee
    established pursuant to resolution 1533 (2004)). Kambale acquired almost all the
    gold production in the Mongbwalu district, which was controlled by the FNI. The
    FNI derived substantial income from taxes imposed on this production. This constitutes
    «provision of assistance» to illegal armed groups in breach of the arms embargo
    of resolutions 1493 (2003) and 1596 (2005).
