  justification: In his former position as head of correctional colony No 1 in Novopolotsk,
    Andrei Palchik has been responsible for and participated in the systematic practice
    of torture, ill-treatment and abusive punishments, including prolonged and repeated
    use of solitary confinement, against the political prisoners and other citizens
    detained in that penal colony, notably in the wake of the 2020 presidential election
    and the ensuing peaceful protests. As head of that penal colony, Andrei Palchik
    is not only responsible for ordering and supervising these abuses, but has a documented
    track record of personal involvement in acts of torture and violence against prisoners.
    During Andrei Palchik’s administration from 2017 until Mar 2023, correctional
    colony No 1 in Novopolotsk has become ill-famed for its extremely harsh detention
    conditions and the ill-treatment applied to the prisoners, many of them leading
    political activists and civil society representatives, detained for their opposition
    to President Lukashenka’s regime. After his transfer from Penal Colony No 1, Palchik
    continues to hold an active high-ranking position at another detention facility
    and therefore he continues to serve the repressive system. He is therefore responsible
    for serious violations of human rights and for the repression of the civil society
    in Belarus.
