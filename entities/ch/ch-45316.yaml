  justification: Win Shein is the Deputy Prime Minister, since 1 Feb 2023, and the
    Minister for Planning and Finance in the Union Government, since 1 Feb 2021, appointed
    by Commander-in-Chief Min Aung Hlaing. On 1 Feb 2021, the Myanmar Armed Forces
    (Tatmadaw), led by Commander-in-Chief Min Aung Hlaing, staged a coup in Myanmar
    by setting aside the results of the elections held on 8 Nov 2020 and by overthrowing
    the democratically elected government. As part of the coup, Vice-President Myint
    Swe, functioning as Acting President, declared a state of emergency and transferred
    the legislative, executive and judicial powers of the state to Min Aung Hlaing.
