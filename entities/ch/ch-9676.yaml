  justification: Iran’s Islamic Revolutionary Guard Corps (IRGC) Qods Force is responsible
    for operations outside Iran and is Tehran’s principal foreign policy tool for
    special operations and support to terrorists and Islamic militants abroad. Hizballah
    used Qods Force-supplied rockets, anti-ship cruise missiles (ASCMs), man-portable
    air defense systems (MANPADS), and unmanned aerial vehicles (UAVs) in the 2006
    conflict with Israel and benefited from Qods Force training on these systems,
    according to press reporting. According to a variety of reports, the Qods Force
    continues to re-supply and train Hizballah on advanced weaponry, anti-aircraft
    missiles, and long-range rockets. The Qods Force continues to provide limited
    lethal support, training, and funding to Taliban fighters in southern and western
    Afghanistan including small arms, ammunition, mortars, and short-range battlefield
    rockets.
