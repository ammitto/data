  justification: Iryna Pradun is a Belarusian judge and chairperson of the court of
    the Rogachev district of the Gomel region. She was appointed by Aliaksandr Lukashenka.
    She issued sentences against a large number of citizens of Belarus who voiced
    their opinions against the President. She also issued sentences against a number
    of individuals for their alleged participation in protests and for resisting the
    brutality of the Belarusian law enforcement authorities, e.g. in the case against
    Evgeny Kokhanovsky, who according to human rights defenders was coerced into pleading
    guilty to having taken part in protests.
