  justification: Maroun Oil & Gas Company is a subsidiary of the National Iranian
    South Oil Company (NISOC), which is in turn a subsidiary of the National Iranian
    Oil Company (NIOC). Maroun Oil & Gas Company is responsible for the production,
    processing and transfer of oil, gas and condensates from larger oil fields. Oil
    production and sales play a crucial role in the financing of Iran’s military as
    well as the IRGC. Therefore, Maroun Oil & Gas Company is owned or controlled by
    an entity providing support to the Government of Iran. Furthermore, it provides
    essential services to the IRGC and supports the Government of Iran.
