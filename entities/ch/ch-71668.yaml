  justification: "“Movement of the First” is a state-led youth organisation in the
    Russian Federation, which was created in December 2022 at the initiative of President
    of the Russian Federation Vladimir Putin to provide educational activities, including
    of militarised nature, for children between the ages of 6 to 18, based on “traditional
    Russian spiritual and moral goals”. The children who are members of the movement
    have meetings with the soldiers who have fought in Russia’s war of aggression
    against Ukraine, send cards and letters of support to soldiers and also prepare
    equipment to be used on the battlefield, and learn how to handle drones. Additionally,
    the movement has organised war games for the children, which replicate and simulate
    battle situations."
