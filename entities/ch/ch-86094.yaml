  justification: Andrey Kalyuzhny is the acting Chairman of the Board of State Corporation
    “Donbass Development Corporation”, which is an entity founded by the so-called
    “Donetsk People’s Republic” to ensure the economic development of the Ukrainian
    region occupied by Russia. The corporation is also facilitating international
    investment into the region and is responsible for implementing projects related
    to building infrastructure in the occupied region, with the goal of further integration
    of the region into Russia. As the acting Chairman of the Board of State Corporation
    “Donbass Development Corporation”, Andrey Kalyuzhny is therefore responsible for,
    supporting or implementing actions or policies which undermine or threaten the
    territorial integrity, sovereignty and independence of Ukraine. In addition, he
    is associated with State Corporation “Donbass Development Corporation”.
