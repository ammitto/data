  justification: Colonel Oleksandr Fedorko is the Head of the 924th Unmanned Aerial
    Vehicle Center (Military Unit 20924), which is part of the Russian Ministry of
    Defence. Servicemen are being trained at the Center to complete the unmanned aerial
    vehicle (UAV) companies being formed in the Western and Central Military Districts.
    At the same time, the Center is engaged in the completion of military tests of
    complexes with UAVs (Zastava, Navodchik 2, Forpost and Orlan-10) which, upon completion
    of the tests, are transferred to UAV companies. The 924th Unmanned Aerial Vehicle
    Center trains UAV operators for the Armed Forces of the Russian Federation.
