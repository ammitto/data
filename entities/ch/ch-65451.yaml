  justification: Uladzimir Davydau is a Belarussian judge who serves in the Supreme
    Court of Belarus. He was appointed by Aliaksandr Lukashenka indefinitely in 2014.
    Judge Davydau has mainly ruled on appeals regarding prison sentences for political
    activists and journalists. He has left those sentenced unchanged. Such a decision
    was made in the case of the Belsat journalist, Pavel Vinahradau. He is therefore
    responsible for serious violations of human rights and the repression of civil
    society and democratic opposition in Belarus.
