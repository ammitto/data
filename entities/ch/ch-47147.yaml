  justification: Laureano Facundo Ortega Murillo is closely involved in actions supporting
    the presidential couple Daniel Ortega and Rosario Murillo, as an advisor to the
    Presidency. He has justified and supported the arbitrary and illegal imprisonment
    of Nicaraguan political opposition leaders and presidential pre-candidates, student
    and rural leaders or independent journalists, all of whom he has referred to as
    “terrorists”. By contributing to the elimination of actual electoral competition,
    he has played a central role in the suppression of political pluralism and the
    definitive disarticulation of Nicaraguan democracy. He has acted as an economic
    advisor to his father Daniel Ortega and the Ortega regime through the governmental
    agency ProNicaragua. Additionally, he is responsible for operating BanCorp – an
    entity whose main purpose is to assist, sponsor and financially support the repressive
    activities of his mother, Vice-President Rosario Murillo. He is therefore associated
    with persons responsible for the repression of civil society and for serious human
    rights violations, and he is supporting such repression and violations.
