  justification: Sergey Tolmachev is the former so-called Deputy Head of the Military-Civil
    Administration of the “Zaporizhzhia region”. He is also a former so-called “Deputy
    Governor of the Zaporizhzhia region” and a former Deputy Governor of the illegally
    annexed City of Sevastopol. In those roles, Sergey Tolmachev was involved in preparing
    the organisation of local and parliamentary “elections” in an illegally annexed
    region of Ukraine. Sergey Tolmachev was also involved in organising the illegal
    referendums held in September 2022 in the illegally annexed Zaporizhzhia region
    of Ukraine. In those roles, Sergey Tolmachev has been responsible for implementing
    state policies, including the illegal recognition of the “Zaporizhzhia region”
    as part of Russia. In that capacity, and through his actions, he is therefore
    responsible for supporting and implementing actions and policies which undermine
    and threaten the territorial integrity, sovereignty and independence of Ukraine.
