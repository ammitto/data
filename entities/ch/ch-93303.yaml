  justification: The company Prominent Shipmanagement Ltd, which is based in Hong
    Kong, was one of the biggest exporters of Russian oil in December 2024. It manages
    several ships that have engaged in dangerous practices at sea while transporting
    oil originating in Russia or exported from Russia, such as AIS gaps, high-risk
    ship-to-ship transfers and AIS spoofings. Therefore, Prominent Shipmanagement
    Ltd is managing vessels that transport crude oil or petroleum products, originating
    in Russia or exported from Russia, while practicing irregular and high-risk shipping
    practices as set out in the International Maritime Organisation General Assembly
    resolution A.1192(33).
