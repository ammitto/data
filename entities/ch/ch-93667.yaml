  justification: JSC Soedinitel is an enterprise engaged in the development and manufacture
    of connectors, as well as special-purpose cable assemblies designed to operate
    in aggressive and corrosive environments, and which can be subjected to high pressures
    and significant temperature changes. JSC Soedinitel carries out research and development
    in the interest of the Ministry of Defence and the Ministry of Industry and Trade
    of the Russian Federation and has a licence for the development, production and
    sale of military equipment and a licence to access classified information. JSC
    Soedinitel uses (raw) materials and components of Russian manufacture, actively
    implementing the Russian import substitution programme, and it manufactures products
    for the military and industrial complex of the Russian Federation. Therefore,
    JSC Soedinitel is supporting and benefitting from Russia’s military and industrial
    complex, including by being involved in the development, production and supply
    of military technology and equipment, and is also supporting the Government of
    the Russian Federation, which is responsible for the destabilisation of Ukraine.
