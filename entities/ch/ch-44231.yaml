  justification: In his former position as chairman of the Moskovski district court
    in Minsk, he was responsible for numerous politically motivated rulings against
    journalists, opposition leaders, activists and protesters. Violations of rights
    of defence and reliance on statements from false witnesses were reported during
    trials conducted under his supervision. He was instrumental in fining and detaining
    protesters, journalists and opposition leaders in the wake of the 2020 presidential
    election. He is therefore responsible for human rights violations and undermining
    the rule of law, as well as for contributing to the repression of civil society
    and democratic opposition. He remains active in the Lukashenka regime as chairman
    of the Tsentralny District Court in Minsk.
