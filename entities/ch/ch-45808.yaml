  justification: In his position as Deputy Head of the Temporary Detention Centre,
    Hleb Dryl is responsible for the appalling conditions and for the inhumane and
    degrading treatment, including beatings and torture, inflicted on citizens detained
    in this detention facility in the wake of the 2020 presidential election. According
    to witness testimonies, some of the women detained on 9-12 Aug 2020 were heavily
    beaten in the detention centres. According to the testimony of multiple women,
    included in the report of the Centre for Promotion of Women’s Rights “Her Rights”,
    the most inhumane treatment took place in the detention centre at Akrestina in
    Minsk, where the OMON policemen were especially cruel and used torture. He is
    therefore responsible for serious human rights violations and for the repression
    of civil society and democratic opposition.
