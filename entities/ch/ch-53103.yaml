    are closely associated with the President of the Russian Federation, Vladimir
    Putin. Due to his past and current positions in leading Russian enterprises, which
    have been receiving large state contracts, and his close ties with the President
    of the Russian Federation, Vladimir Putin, Igor Rotenberg continues to benefit
    from Russian decision-makers and the Government of the Russian Federation, both
    responsible for the annexation of Crimea and the destabilisation of Ukraine. Furthermore,
