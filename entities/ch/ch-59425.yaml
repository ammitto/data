  justification: Yan Petrovskiy is the leader and commander of the Russian paramilitary
    group “Task Force ‘Rusich’”, which maintains links to Russian private military
    company Wagner Group, possibly operating as a sub-unit of Wagner. Task Force “Rusich”
    is participating in combat alongside Russia’s military in the war of aggression
    against Ukraine. “Rusich” has a long history of fighting alongside Russia-backed
    proxies in the Donbas region of Ukraine. In 2015, “Rusich” mercenaries were accused
    of, and were filmed, committing atrocities against deceased and captured Ukrainian
    soldiers.
