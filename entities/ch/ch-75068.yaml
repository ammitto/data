  justification: Aleksandr Lukyanov is the First Secretary of the Central Committee
    of the Belarusian Republican Youth Union. In this capacity, Lukyanov is contributing
    to the illegal deportation and re-education of Ukrainian children. He is facilitating
    the unlawful re-education of Ukrainian children on the territory of Belarus. The
    activities pursued by Lukyanov are part of a broader strategy of the Russian Federation
    to illegally deport Ukrainian citizens, in which the Republic of Belarus is complicit.
    Since its war of aggression against Ukraine, Russia has transferred many Ukrainian
    civilians to Russian-occupied areas or to Russia itself, while often denying or
    impeding those civilians from having safe passage to government-held parts of
    Ukraine. Lukyanov’s actions violate the rights of Ukrainian children and infringe
    Ukrainian law and administrative order.
