  justification: Denis Didenko is a judge of the Kyiv District Court of the city of
    Simferopol, Crimea. He has been appointed by the President of the Russian Federation
    Vladimir Putin. Didenko made politically motivated court decisions on charges
    against Ukrainian citizens, such as Oleg Prikhodko, who opposed the illegal annexation
    of Crimea and Sevastopol and the repressive policies of the occupation authorities
    towards the Crimean Tatars, and journalists, such as Gulsum Khalilova, who were
    covering protests of Ukrainian activists and Crimean Tatars in the Kherson region.
    He repeatedly arrested Crimean Tatars, such as Riza Reshetov, for participating
    in meetings dedicated to the detainees.
