  justification: Swe Swe Aung is the Director-General of the Prosecution Department
    in the Ministry of Legal Affairs, appointed by the State Administrative Council
    (SAC) on 31 March 2022. The Prosecution Department, under Swe Swe Aung’s leadership,
    has been involved in several judicial cases against democratically elected leaders
    and opposition figures that were conducted in violation of rights of defense and
    right to a fair trial, including the proceedings leading to the execution of four
    pro-democracy figures. Therefore, in her capacity as Director-General of the Prosecution
    Department, Swe Swe Aung is engaged in activities that undermine democracy and
    the rule of law in Myanmar/Burma.
