  justification: Cham Wings Airlines is an operator of charter flights from Syria
    to Belarus. The company increased the number of flights from Damascus to Minsk
    since the summer of 2021 in order to transport migrants to Belarus who intended
    to illegally cross the external borders of the Union. In autumn 2021, Cham Wings
    also opened two new offices in Minsk in order to be able to organise the flights
    between Damascus and Minsk. Cham Wings Airlines therefore contributes to activities
    by the Lukashenka regime that facilitate the illegal crossing of the external
    borders of the Union.
