  justification: Design and Production Enterprise “Iris” JSC is a Russian military-industrial
    enterprise that develops electric motors, “launch vehicles”, and rocket systems
    for the Russian Armed Forces. Iris JSC has, inter alia, developed submarine engines
    for the Russian Federation Navy. The entity holds at least three licenses and
    certificates administered by the Government of the Russian Federation, including
    a certificate administered to Russian entities operating in the Russian defense
    industry, a license administered by the Russian state space corporation and a
    license administered by the Russian Federal Service for Defense Affairs for the
    “development of weapons and military technology”. Additionally, the official website
    of the entity contains propagandistic pro-war imagery, through which Iris JSC
    openly expresses support for Russia’s war of aggression against Ukraine.
