  justification: Forest Products Joint Venture Corporation Limited (FPJVC) operates
    in the timber industry in Myanmar processing teak and hard wood. Despite being
    a public company, FPJVC is controlled by the State, which (i) holds the majority
    of FPJVC’s shares through the Ministry of Natural Resources and Environmental
    Conservation (MONREC) (10 %) and the state-owned Myanma Timber Enterprise (MTE)
    (45 %), and (ii) has the right to appoint the majority of the members of the Board
    of Directors of FPJVC (with three members appointed by each of MONREC and MTE,
    respectively, out of 11 members). On 1 Feb 2021, the Myanmar Armed Forces (Tatmadaw),
    led by Commander-in-Chief Min Aung Hlaing, seized power from the civilian legitimate
    Government in a coup d’état and established the State Administration Council (SAC)
    to exercise the legislative, executive and judicial powers of the State. On 2
    Feb 2021, the military regime appointed a new cabinet, including a new minister
    for Natural Resources and Environmental Conservation (MONREC). Through the SAC
    and the new cabinet, the military regime acquired control over and benefits from
    state-owned enterprises, including FPJVC. FPJVC is thus controlled by and generates
    revenue for the Tatmadaw, therefore contributing to its capabilities to carry
    out activities undermining democracy and the rule of law.
