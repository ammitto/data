  justification: In his former position as Head of the Department of Internal Affairs
    of the Pervomaysky District Administration in Minsk, Andrei Bakach was responsible
    for the actions of police forces belonging to that police precinct and for the
    actions occurring in the police station. During his time as Head, peaceful protesters
    in Minsk were subjected to cruel, inhumane and degrading treatment inside the
    police station under his control. He is therefore responsible for serious violations
    of human rights and the repression of civil society and democratic opposition.
    He remains active in the Lukashenka regime as the First Deputy Head of the Internal
    Affairs Directorate of the Grodno/Hrodna Regional Executive Committee.
