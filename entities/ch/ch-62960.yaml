  justification: Artem Chaika is the eldest son of Yury Chaika, the ex-Prosecutor
    General and the Plenipotentiary Representative of the President of the Russian
    Federation in the North Caucasus Federal District. He has built his businesses
    mainly on state contracts during the time his father was the Prosecutor General.
    Artem Chaika’s companies have repeatedly won public procurement tenders due to
    the removal of competitors by law enforcement agencies. Artem Chaika is the owner
    of the company PNK-Ural, the largest supplier of crushed stone for Russian Railways.
