  justification: Mikalai Dolia is a judge at the Gomel Regional Court. ln that position,
    he is responsible for sentencing Siarhei Tsikhanouski, Artsiom Sakau, Dzmitry
    Papou, lhar Losik, Uladzimir Tsyhanovich and Mikalai Statkevich to disproportionally
    lengthy prison terms. He contributed to the arbitrary detention of Siarhei Tsikhanouski,
    as presented in the report by the Human Rights Council’s Working Group on Arbitrary
    Detention. He is therefore responsible for serious violations of human rights
    and for undermining the rule of law, as well as for the repression of civil society
    and democratic opposition.
