  justification: Vektor JSC holds two licenses administered by the Russian Ministry
    of Industry and trade, as well as a license administered by the FSB. The two licenses
    administered by the Russian Ministry of Industry and Trade serve for the “development,
    production, testing, installation, maintenance, disposal and sale of weapons and
    military equipment”. The FSB license, in turn, is issued to IT companies that
    develop encryption and cryptography technology, information systems, and telecommunication
    systems for the Russian intelligence services, as well as IT companies that develop
    “personal database management systems” for the Russian security services (i.e.
    tools specifically designed to store, retrieve, and manage large amounts of data
    obtained through, for example, social media scraping or other intelligence gathering
    practices).
