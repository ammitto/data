  justification: Zaw Min is the Director-General of the Prisons Department in the
    Ministry of Home Affairs, appointed by the State Administrative Council (SAC)
    on 4 February 2021. In that capacity, he is responsible for the management of
    prisons in Myanmar/Burma. The Prisons Department, under Zaw Min’s leadership,
    has been involved in several cases of mismanagement of prisons and detainees have
    been subject to violence, beating, torture and other inhuman treatment in prisons.
    Additionally, prison authorities violated the rights of defense of detained persons.
    Therefore, in his capacity as Director-General of the Prisons Department, Zaw
    Min is engaged in activities that undermine democracy and the rule of law in Myanmar/Burma.
