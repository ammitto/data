  justification: U Zaw Lin Aung is a former military officer and the Deputy Director
    of the Prison Department of the Yangon Region since late 2021. Additionally, U
    Zaw Lin Aung is in charge of the Insein Prison. Under his leadership, political
    prisoners detained in the Insein Prison have been subject to violence, beating,
    torture and other inhuman treatment committed by the prison personnel. Therefore,
    in his capacity as Deputy Director of the Prison Department of the Yangon Region
    and being in charge of the Insein Prison, U Zaw Lin Aung is engaged in activities
    that undermine democracy and the rule of law in Myanmar/Burma.
