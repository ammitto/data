  justification: Marina Gartung is the majority shareholder of Public Joint Stock
    Company “Chelyabinsk Forge and Press Plant” (PJSC CHKPZ), one of Russia’s leading
    enterprises in the machine-building and forging industries. PJSC CHKPZ’s activities
    are in economic sectors providing a substantial source of revenue to the Russian
    Federation. In 2012, PJSC CHKPZ entered the Association of Enterprises of the
    Military-Industrial Complex of the Chelyabinsk Region. Under the state defence
    order, the company produces shells for artillery ammunition intended for use in
    Russia’s war of aggression against Ukraine. By being the majority shareholder
    of PJSC CHKPZ, Marina Gartung is responsible for its actions and therefore she
    is supporting, materially and financially, the Government of the Russian Federation,
    which is responsible for the annexation of Crimea and the destabilisation of Ukraine.
    Furthermore, she is associated with her husband Valery Karlovich Gartung and with
    her son Andrey Valerievich Gartung.
