  justification: Major General Aung Lin Tun is a member of the Myanmar Armed Forces
    (Tatmadaw) and serves as Deputy Minister of Defence. On 1 Feb 2021, the Myanmar
    Armed Forces (Tatmadaw), led by Commander-in-Chief Min Aung Hlaing, staged a coup
    in Myanmar by setting aside the results of the elections held on 8 Nov 2020 and
    by overthrowing the democratically elected government. As part of the coup, Vice-President
    Myint Swe, functioning as Acting President, declared a state of emergency on 1
    Feb and transferred the legislative, executive and judicial powers of the state
    to the Commander-in-Chief of Defence Services Senior General Min Aung Hlaing.
    On 2 Feb, the SAC was established to exercise those powers, preventing the democratically
    elected government from fulfilling its mandate. Major General Aung Lin Tun was
    appointed Deputy Minister of Defence on 11 May 2021 by the State Administrative
    Council (SAC), led by Commander-in-Chief Min Aung Hlaing. Before his promotion,
    he was part of the Office of the Chief Commander of the Army and was involved
    in all repressive actions taken by SAC and Tatmadaw since the coup. As Deputy
    Minister of Defence, Major General Aung Lin Tun is engaged in policies and activities
    undermining democracy and the rule of law in Myanmar/Burma as well as actions
    that threaten the peace, security and stability of the country. Additionally,
    being a member of the military regime, Major General Aung Lin Tun is directly
    responsible for serious human rights violations committed by the security forces
    against peaceful protesters.
