  justification: Mikhail Hryb was Head of the Department of Internal Affairs in the
    Vitebsk Regional Executive Committee from Mar 2019 to Oct 2020, afterwards being
    appointed Head of the Main Department of Internal Affairs of the Minsk city Executive
    Committee and assigned the title of major general of militia (police forces).
    In this capacity, he is responsible for the actions of police forces, respectively
    in the Vitebsk region until Oct 2020 and in Minsk since after Oct 2020, including
    violent repression of peaceful protesters and breaches of right to peaceful assembly
    and free speech, committed by police forces in Vitebsk and Minsk, in the aftermath
    of the 2020 Belarussian presidential elections. He is therefore responsible for
    serious violations of human rights and the repression of civil society and democratic
    opposition.
