  justification: Thant Zin Oo was the Commander of the 8th Security Police Battalion.
    In that context, he is responsible for the atrocities and serious human rights
    violations committed against the Rohingya population in Rakhine State in the second
    half of 2017 by the 8th Security Police Battalion. The serious human rights violations
    include unlawful killings and systematic burning of Rohingya houses and buildings.
    Those violations were conducted in conjunction with and in direct support of the
    33rd Light Infantry Division of the Myanmar Armed Forces (Tatmadaw) led by Lieutenant
    (formerly Brigadier) General Aung Aung. Thant Zin Oo is therefore associated with
    listed person, Lieutenant General Aung Aung.
