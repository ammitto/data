  justification: Division General of the Venezuelan Bolivarian National Armed Forces
    since 2022. Director of the Special Directorate of Criminal and Criminalistics
    Investigations (DEIPC) at the Directorate-General of Military Counter-Intelligence
    (Dirección General de Contrainteligencia Militar (DGCIM)) from Aug 2019 to Feb
    2021. In previous functions, Brigadier General Terán Hurtado served as head of
    the police in Falcón state and head of DGCIM in Táchira state. Responsible for
    the serious human rights violations, including cruel and inhuman treatment of
    detainees, committed by DGCIM officials under his command. In the detailed findings
    of the Independent International Fact-Finding Mission on the Bolivarian Republic
    of Venezuela, Brigadier General Terán Hurtado is specifically pointed out as one
    of the responsible actors, and is linked to the Captain de la Sotta case.
