  justification: LLC SPA “Izhevsk Unmanned Systems” is a Russian company which develops,
    produces, repairs and maintains unmanned aerial vehicles (UAV), special equipment
    and scientific and technical products. The company is actively involved in the
    Russian UAV sector (for example, it develops technologies and tests and also conducts
    specialist training) and therefore materially supports the Government of the Russian
    Federation, which is responsible for the illegal annexation of Crimea and the
    destabilisation of Ukraine. LLC SPA “Izhevsk Unmanned Systems” has created military
    drones of the type “Granat”, “Tachyon” and “Kub”, which are used by the Russian
    Armed Forces in Russia’s war of aggression against Ukraine. Therefore, the company
    is materially supporting actions which undermine and threaten the territorial
    integrity, sovereignty and independence of Ukraine.
