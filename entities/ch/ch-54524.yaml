  justification: Ihar Tur is an employee of the state-owned television channel “ONT”
    and one of the main propagandists of the Lukashenka regime. He is the host of
    the “Propaganda” programme, in which he calls for violence, discredits opposition
    activists and promotes videos with forced confessions from political prisoners.
    He is the author of a number of false reports on protests by the Belarusian opposition,
    and of disinformation regarding events in the Union and regarding attacks on civil
    society. He is also responsible for spreading disinformation and violence-inciting
    messages online. He was awarded a medal by Aliaksandr Lukashenka for his work
    in the media. He is therefore benefitting from and supporting the Lukashenka regime.
