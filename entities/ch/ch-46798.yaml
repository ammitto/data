  justification: ASAM (Separate Service for Active Measures) is a Belarusian special
    border guard unit controlled by Viktar Lukashenka and headed by Ihar Kruchkou.
    ASAM forces under special operation “Gate” organise illegal border crossings through
    Belarus to Union Member States and are directly involved in the physical transportation
    of migrants to the other side of the border. ASAM additionally charges the transported
    migrants for the border crossing. ASAM is therefore contributing to activities
    by the Lukashenka regime that facilitate the illegal crossing of the external
    borders of the Union.
