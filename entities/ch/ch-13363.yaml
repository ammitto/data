  justification: Representative of the Ideological-Political Bureau of the Commander
    in Chief of Iran's Armed Forces (since 2018). Former advisor of Supreme Jurisprudence
    in the IRGC. Head of the organisation for publications on the role of the clergy
    at war. Former Minister of Intelligence (2009-2013). Under his leadership, the
    Ministry of Intelligence continued the practices of widespread arbitrary detention
    and persecution of protesters and dissidents. The Ministry of Intelligence runs
    Ward 209 of Evin Prison, where many activists have been held on account of their
    peaceful activities in opposition to the government in power. Interrogators from
    the Ministry of Intelligence have subjected prisoners in Ward 209 to beatings
    and mental and sexual abuse.
