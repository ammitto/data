  justification: Ilya Torosov was First Deputy Minister of the Russian Ministry of
    Economic Development until October 2024. Previously, from March 2018 to March
    2022, Ilya Torosov had been Deputy Minister of the Russian Ministry of Economic
    Development. During his administration, the Ministry of Economic Development was
    involved in activities to undermine and threaten the territorial integrity of
    Ukraine, including measures to explore the economic potential of the annexed Ukrainian
    regions (Kherson, Zaporizhzhia, the so-called “Donetsk People’s Republic” and
    “Luhansk People’s Republic”) as well as activities to support war economy measures
    of the Russian government. Ilya Torosov was therefore responsible for activities
    that undermine and threaten the territorial integrity of Ukraine, and he is a
    natural person supporting the Government of the Russian Federation, which is responsible
    for the annexation of Crimea and the destabilisation of Ukraine.
