  justification: Judge at the Minsk City court, former judge at the Moskovski District
    Court of the city of Minsk. She was directly involved in the judicial repression
    of the peaceful demonstrators on 19 Dec 2010. On 20, 24 and 30 Dec 2010, she sentenced
    civil society activists, respectively Ihar Shershan (12 days in jail), Zmitser
    Shurkhai (10 days in jail) and Franak Viachorka (12 days in jail). On 24 January
    2012, she rejected the appeal of Ales Byalyatski regarding the sentence imposed
    on him by the Pervomaiski District Court of Minsk even though Byalyatski's trial
    was conducted in a way that was a clear violation of the Code of Criminal Procedure.
    Byalyatski was active in defending and providing assistance to those who suffered
    from repression in relation to the 19 Dec 2010 elections and the crackdown on
    civil society and democratic opposition. Her way of conducting the trials is a
    clear violation of the Code of Criminal Procedure. She sustained the use of evidence
    and testimonies irrelevant to the accused.
