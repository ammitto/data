  justification: Nikita Stasishin is the Deputy Minister of Construction, Housing
    and Utilities of the Russian Federation, in charge of the Department of Housing
    Policy and the Department of Integrated Development of Territories. He is in charge
    of implementing the policy of the Ministry of Construction in the annexed regions
