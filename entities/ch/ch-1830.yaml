  justification: A. Ties to Senior Members of the Former Iraqi Regime. Information
    available also indicates that after Operation Iraqi Freedom, Omar Sabawi Ibrahim
    Hasan Al-Tikriti provided support to elements of the former regime and to groups
    carrying out attacks against Iraqi and Coalition forces, as well as against Iraqi
    civilians. B. Support to Member of the Former Iraqi Regime. Information available
    indicates that Omar Sabawi Ibrahim Hasan Al-Tikriti supported former Iraqi Ba’ath
    Party members after Operation Iraqi Freedom. C. Activities Against the New Iraqi
    Government, Coalition Forces, and Iraqi Civilians. According to available information,
    Omar Sabawi Ibrahim Hasan Al-Tikriti directed a number of anti-Coalition activities
    in Iraq, and maintained communication with several insurgent groups throughout
    northern and central Iraq. Information indicates that Omar Sabawi Ibrahim Hasan
    Al-Tikriti provided financial support and operational direction to anti-Iraqi
    activities, including several attacks in Mosul, Iraq. D. Immediate Family Members
    of Senior Former Iraqi Regime Official. Omar Sabawi Ibrahim Hasan Al-Tikriti falls
    under the requirements of Security Council resolution 1483 (2003) by virtue of
    him being an «immediate family member» of a senior former Iraqi regime official.
    His father, Sabawi Ibrahim Hasan Al-Tikriti, was former Presidential Advisor to
    Saddam Hussein.
