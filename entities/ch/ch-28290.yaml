        value: So-called "Luhansk People's Republic"
  justification: The so-called “Luhansk People’s Republic” was established on 27 April
    2014. Responsible for organising the illegal referendum on 11 May 2014. Declaration
    of independence on 12 May 2014. On 22 May 2014, the so-called “People’s Republics”
    of Donetsk and Luhansk created the so-called “Federal State of Novorossiya”. This
    is in breach of Ukrainian constitutional law, and, as a consequence, of international
    law, thus undermining the territorial integrity, sovereignty and independence
    of Ukraine. In October 2022, the so-called “Luhansk People’s Republic” was annexed
    by the Russian Federation, constituting a further violation of the territorial
    integrity of Ukraine and hence of international law.
