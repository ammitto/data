  justification: Lenara Ivanova is the Deputy Prime Minister of the Government of
    the Republic of Bashkortostan, and the Minister of Family, Labour and Social Protection
    of the Republic of Bashkortostan. In those roles, she has been responsible for
    the illegal deportation of Ukrainian children to the Russian Federation. Since
    its war of aggression against Ukraine, Russia has transferred many Ukrainian civilians
    to Russian-occupied areas or to Russia itself, while often preventing or impeding
    these civilians from having safe passage to the non-occupied parts of Ukraine.
    Lenara Ivanova is one of the key persons involved in the forcible deportation
    of Ukrainian children to Russia and their subsequent illegal adoption by Russian
    families. Lenara Ivanova’s actions violate the rights of Ukrainian children and
    infringe Ukrainian law and administrative order.
