  justification: Al-Tayyib Al-Imam Joda is the Emir of the Nafeidiya clan of the Kawahla
    tribe from the Sarhan area west of Gezirah State. He was among the community leaders
    who assisted the Sudanese Armed Forces (SAF) and allied militias, in particular
    the Sudan Shield Forces, in recruiting and organising the campaign of systematic
    targeting of Kanabi farming communities in Gezirah and Sennar States, which included
    mass arrests, mass killings, mass graves and burned villages, notably before and
    after the recapture of Wad Madani by the SAF and their allies in January 2025.
