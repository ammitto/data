  justification: Yulia Klymenko is the leader of the “Yug Molodoy” movement and chairperson
    of the regional wing of the “Young Guard” of President Putin’s “United Russia”
    party. In her capacity as the leader of the “Yug Molodoy” movement, she collaborates
    with the occupying Russian authorities, promotes pro-Russian narratives, and aims
    to impose Russian culture on children and youth by actively engaging and leading
    projects that portray the occupied areas of Ukraine as part of the Russian Federation.
    She also supported the referendum on annexation of the Zaporizhzhia region by
    the Russian Federation. Therefore, she is supporting and implementing actions
    and policies which undermine and threaten the territorial integrity, sovereignty
    and independence of Ukraine.
