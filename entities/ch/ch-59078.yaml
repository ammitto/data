  justification: Boris Vyacheslavovich Korchevnikov is a well-known Russian TV presenter
    on the state TV channel ‘Russia-1’, and the general director of the ultraconservative
    TV channel ‘Spas’, which belongs to the Russian Orthodox Church. In 2017-2020,
    he was a member of the Public Chamber of Russia. In the 2018 presidential elections,
    he was a trusted representative of President Vladimir Putin. He spreads Russian
    propaganda through his show ‘The Fate of a Man’ on the state TV channel ‘Russia-1’,
    and he has a large audience on social networks, where he distributes official
    Russian propaganda. In his posts on social networks, he calls the occupied territories
    of Ukraine Russian. His comments associate the West and Ukraine with godlessness
    and the devil, which is in line with official Russian propaganda claiming that
    one of the goals of the war of aggression against Ukraine is the ‘fight against
    godlessness’. Furthermore, he spreads propaganda through his show.
