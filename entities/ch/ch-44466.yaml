  justification: Former Deputy Minister of the Interior and Justice. Within the Venezuelan
    Ministry of the Interior and Justice, Brigadier General Manuel Eduardo Pérez Urdaneta
    ranked as one of five Deputy Ministers. His portfolio encompassed Preventive Security
    and Public Safety (Viceministro de prevención y Seguridad Ciudadana). Before that,
    Brigadier General Pérez served as Director of the Bolivarian National Police.
    In that role he was responsible for serious human rights violations, including
    the use of severe physical force against peaceful protesters, committed by officials
    of the Bolivarian National Police under his authority.
