  justification: |-
    Design Bureau Ametist JSC is a leading developer of artillery systems for the Russian Federation Navy. The Russian Ministry of Defense describes Design Bureau Ametist as “the main design engineering firm of shipboard ammunition complexes, radar and optical-electronic fire control systems, and seacoast artillery developed for the Russian Federation Navy”. Notably, Design Bureau Ametist develops and manufactures weapons systems that are actively used in Russia’s war of aggression against Ukraine. The OSA-M missile system was developed by Design Bureau Ametist and has been deployed on various Russian
    warships, including Russia’s combat flagship Moskva, which was directly engaged in Russia’s war of aggression against Ukraine.
