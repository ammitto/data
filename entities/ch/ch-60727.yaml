  justification: Morinformsystem Agat JSC is a leading company in the Russian shipbuilding
    industry. The company is specialised in the development, production and maintenance
    of combat information and control systems as well as integrated systems, integrated
    control automation systems for marine formations, sea-based cruise and ballistic
    missile fire control systems, ship-based and coastal missile and radar systems,
    and sonar systems. It has been described as an umbrella organisation in the Russian
    shipbuilding industry specialising in the domains of information systems and technologies,
    system engineering in the sphere of marine data computing equipment, electromagnetic
    compatibility of radio-electronic facilities, degaussing systems, fire control
    systems of sea-based cruise and ballistic missiles, combat information and control
    systems and integrated management systems for surface ships and submarines. In
    that capacity, Morinformsystem Agat JSC constitutes a key entity providing material
    support to the Russian naval forces during Russia’s war of aggression against
    Ukraine.
