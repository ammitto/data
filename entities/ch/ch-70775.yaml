  justification: |-
    Radiy Khabirov is the Head of Bashkortostan, a Republic of the Russian Federation. In his role as the Head of the Republic of Bashkortostan, he has supported, encouraged and publicly approved of the war of aggression against Ukraine. In the context of the war, he has invited everyone around the President of the Russian Federation Vladimir Putin
    to “stand up for him” and was one of the first governors to visit occupied Ukrainian territories. Furthermore, he has made advanced military capability a priority as Head of the Republic of Bashkortostan by supporting a large number of defence enterprises and encouraged service members to participate in the war of aggression by forming volunteer battalions. He was also responsible for establishing a logistics warehouse in the occupied Ukrainian territory and has acted against anti-war political opposition in Russia. Therefore, Radiy Khabirov is supporting and implementing actions and policies which undermine and threaten the territorial integrity, sovereignty and independence of
    Ukraine.
