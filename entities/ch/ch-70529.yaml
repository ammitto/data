  justification: JSC Reshetnev is a Russian military-industrial enterprise that is
    responsible for designing and operating the GLONASS satellite navigation system,
    which is deployed by the Russian Armed Forces to conduct high-precision strikes
    on Ukrainian civilian and military infrastructure. The Russian Armed Forces rely
    on services provided by JSC Reshetnev for the positioning, navigation and timing
    of cruise missile strikes on targets in Ukraine. The GLONASS system developed
    by JSC Reshetnev is primarily used by the Russian military to target Ukrainian
    cities. GLONASS-enabled weapons systems used in Russia’s war of aggression against
    Ukraine include Orlan-10 and Shahed-136 drones, Tornado-S and Smerch Multiple
    Launch Rocket Systems, Iskander, Kalibr, and Kinzhal missiles, as well as Kh-101,
    Kh-555, Kh-38, Kh-59MK and Kh-31 aviation and cruise missiles.
