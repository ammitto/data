  justification: Murat Kumpilov is the head of the Republic of Adygea of the Russian
    Federation and secretary of the Adygea regional branch of the United Russia Party.
    In this capacity, Murat Kumpilov is contributing to the illegal deportation and
    adoption of Ukrainian children. He is facilitating the illegal deportation and
    abduction of Ukrainian children to so-called “health camps” and reeducation facilities
    located in his region. Murat Kumpilov is one of the senior Russian (regional)
    leaders involved in the illegal deportation and abduction of Ukrainian children
    to Russia. Murat Kumpilov’s actions violate the rights of Ukrainian children and
    infringe Ukraine’s law and administrative order.
