  justification: Major-General Mohammad Hossein Bagheri is the Chief of Staff of Iran’s
    Armed Forces. He supervises the military Unmanned Aerial Vehicle (UAV) programme
    and plays a fundamental role in Iran’s defence cooperation with the Russian Federation.
    He is also involved in the expansion of Iranian-made UAVs abroad; in this capacity,
    he inaugurated an assembly line in Tajikistan destined for the export of Ababil-2
    drones. He also participated in the development of Mohajer-6 drones and their
    supply to the Russian Federation for their use in the war of aggression against
    Ukraine. Therefore, Major-General Mohammad Hossein Bagheri is responsible for
    supporting actions which undermine or threaten the territorial integrity, sovereignty
    and independence of Ukraine.
