  justification: Ilya Gambachidze is the founder of Structura National Technologies
    and Social Design Agency, two Russian entities involved in the Russian-led digital
    disinformation campaign “RRN” (Recent Reliable News) aiming at manipulating information
    and sharing disinformation in support of the Russian war of aggression against
    Ukraine. Ilya Gambachidze formerly worked as a counsellor to the Vice-President
    of the Duma, Piotr Tolstoi. Structura National Technologies and Social Design
    Agency has been identified as the key actor of the campaign, responsible for the
    creation of fake websites impersonating government organisations and legitimate
    media in Europe (primarily Germany, France, Italy, Ukraine and the United Kingdom)
    and for boosting the pro-Russian “RRN” campaign on social media. Therefore, Ilya
    Gambachidze is responsible for supporting and implementing actions and policies
    which undermine and threaten the territorial integrity, sovereignty and independence
    of Ukraine.
