  justification: Lieutenant General Aung Soe is the Commander of Bureau Special Operation
    4 (BSO 4) of the Myanmar Armed Forces (Tatmadaw) since January 2021. Previously,
    he was the Deputy Minister of Home Affairs until March 2018, then the Chief of
    Bureau Special Operation 6. As commander of BSO 4, Aung Soe commands and controls
    military forces of the Coastal Command in Tanintharyi Division and the South Eastern
    Command in Mon and Karen State. Military forces under his command committed serious
    human rights violations, crimes and atrocities, including killings, ground and
    aerial attacks against civilians, illegitimate arrests and the use of artillery
    fire. Kayin/Karen state, one of the regions under Aung Soe’s command, recorded
    3993 violent incidents from the coup until July 2022.
