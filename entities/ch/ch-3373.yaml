  justification: Ntabo Ntaberi Sheka, Commander-in-Chief of the political branch of
    the Mayi Mayi Sheka, is the political leader of a Congolese armed group that impedes
    the   disarmament, demobilization, or reintegration of combatants. The Mayi Mayi
    Sheka is a Congo-based militia group that operates from bases in Walikale territory
    in eastern DRC. The Mayi Mayi Sheka group has carried out attacks on mines in
    eastern DRC, including taking over the Bisiye mines and extorting from locals.
    Ntabo Ntaberi Sheka has also committed serious violations of international law
    involving the targeting of children. Ntabo Ntaberi Sheka planned and ordered a
    series of attacks in Walikale territory from 30 Jul to 2 Aug, 2010, to punish
    local populations accused of collaborating with Congolese Government forces. In
    the course of the attacks, children were raped and were abducted, subjected to
    forced labor and subjected to cruel, inhumane or degrading treatment. The Mayi
    Mayi Sheka militia group also forcibly recruits boys and holds children in their
    ranks from recruitment drives.
