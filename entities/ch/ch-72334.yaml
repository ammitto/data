  justification: The Aleksey Talay Foundation is a charitable foundation in the Republic
    of Belarus founded by Aleksey Talay, who is one of the main actors involved in
    the deportation of Ukrainian children to Belarus. Aleksey Talay and his foundation
    have organised and facilitated the movement of children from Ukraine to Belarus
    and have coordinated with members of Belarus’s regime to facilitate the movement
    of children from Ukraine to Russia prior to transporting them to Belarus. Under
    Talay’s leadership, Ukrainian children are ideologically indoctrinated. Children
    are forced to attend educational programs which are actively supporting the Russian
    state propaganda, publicly denying Ukraine’s right to statehood and calling for
    the “denazification” as well as the “de-Ukrainisation” of the country and promoting
    the idea that Ukraine should be an integral part of Russia.
