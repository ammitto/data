  justification: Ahmed Abdi Aw-Mohamed is a senior leader of Al-Shabaab and was publicly
    named emir of the organization in Dec 2007. He exercises command responsibility
    for Al-Shabaab operations across Somalia. Aw-Mohamed has denounced the Djibouti
    peace process as a foreign conspiracy, and in a May 2009 audio recording to Somali
    media, he acknowledged that his forces were engaged in recent fighting in Mogadishu.
