  justification: Kyaw Chay is a Corporal in the Border Guard Police (BGP). He was
    formerly based in Zay Di Pyin and was the Commanding Officer of the BGP base in
    Zay Di Pyin in the period around 25 Aug 2017 when a series of human rights violations
    were committed by the BGP under his command. In that context, he is responsible
    for the atrocities and serious human rights violations by the BGP against the
    Rohingya population in Rakhine State in that period. He also participated in serious
    human rights violations. These violations include the ill-treatment of detainees
    and torture.
