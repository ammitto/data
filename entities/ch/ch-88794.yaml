  justification: Vladimir Yevtushenkov has been a shareholder in Sistema since the
    company was founded in 1993. Sistema is a conglomerate with business interests
    in various sectors of the Russian economy in which it is represented by the ownership
    or control of companies including Agroholding Steppe (agriculture), BESK (energy),
    Binnofarm (pharmaceutics), Cosmos Hotel Group (tourism), Element (electronics),
    Intourist (tourism), Medsi (healthcare), Ozon (e-commerce), Region AO (military
    industry) and Segezha (forest, woodworking, pulp and paper industry). Sistema
    is also involved in the information, communications and digital technologies sectors,
    including through its share in the Mobile TeleSystems (MTS) Public Joint Stock
    Company, as well as in banking, as MTS-Bank is owned by the MTS Public Joint Stock
    Company via Mobile TeleSystems B.V. Through BESK and its subsidiaries Bashkirenergo,
    BSK and BESK Engineering, Sistema is involved in the energy sector which provides
    substantial revenues to the Government of the Russian Federation. Vladimir Yevtushenkov
    was a majority owner in Sistema until April 2022 when he transferred part of his
    share to his son, Felix Vladimirovich Yevtushenkov. Therefore, Vladimir Yevtushenkov
    is a businessperson involved in an economic sector providing a substantial source
    of revenue to the Government of the Russian Federation.
