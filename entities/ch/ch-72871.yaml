  justification: Dzmitry Shautsou is the General Secretary of the Belarus Red Cross.
    In this role, he has been responsible for the illegal deportation of Ukrainian
    children to the Republic of Belarus. Dzmitry Shautsou is one of the key persons
    involved in the forcible deportation of Ukrainian children to Belarus and their
    subsequent illegal adoption by Russian and Belarusian families. He visited children
