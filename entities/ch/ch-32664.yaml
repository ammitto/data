  justification: Minister of the Interior, Community Development and Public Security
    as of Jun 2020. Former head of Cabinet of the Presidential Administration (Présidence)
    responsible for matters relating to the National Police between May 2013 and Nov
    2019, and former Director-General of the National Intelligence Service between
    Nov 2019 and Jun 2020. Responsible for obstructing the search for a political
    solution in Burundi by issuing instructions that led to a disproportionate use
    of force, acts of violence, acts of repression and violations of international
    human rights law against protestors demonstrating from 26 Apr 2015 onwards, following
    the announcement of the presidential candidacy of President Nkurunziza, including
    on 26, 27 and 28 Apr 2015 in the Nyakabiga and Musaga districts of Bujumbura.
