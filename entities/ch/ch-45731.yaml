  justification: Aliaksandr Zaitsau is the former assistant of Viktar Lukashenka,
    son of and former Adviser on National Security to Aliaksandr Lukashenka. Through
    access to the Lukashenka family, Zaitsau obtains lucrative contracts for his businesses.
    He has had close ties with the Sohra Group that is granted the right to export
    state-owned enterprises' production (tractors and trucks) to the Gulf and African
    countries. He is also the co-owner and chairman of the Council of participants
    of Bremino Group. The company has received state support for developing the Bremino-Orsha
    zone, as well as a number of financial and tax advantages and other benefits.
    Zaitsau and other owners of Bremino Group received support from Viktar Lukashenka.
    He therefore benefits from and supports the Lukashenka regime.
