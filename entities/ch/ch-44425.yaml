  justification: Former President of the Electoral Chamber of the Supreme Court (Tribunal
    Supremo de Justicia (TSJ)). Former chairwoman of the National Electoral Council
    (Consejo Nacional Electoral (CNE)), appointed on 13 Jun 2020. Former member of
    the Electoral Chamber and Plenary Chamber of the Supreme Court, Second Vice-Chairwoman
    of the Supreme Court from 2015 until 24 Feb 2017, Vice-Chairwoman of the Supreme
    Court from 24 Feb 2017 until 12 Jun 2020. As a member of the Electoral Chamber
    of the Supreme Court, Indira Maira Alfonzo Izaguirre is responsible for the actions
    taken against the then newly elected National Assembly in Dec 2015, resulting
    in the impossibility for the National Assembly to exert its legislative power.
    Moreover, she accepted her appointment as the chairwoman of the CNE in Jun 2020
    by the Supreme Court although this prerogative belongs to the National Assembly.
    In that role she prepared and supervised the non-democratic elections of the National
    Assembly held on 6 Dec 2020 and participated in the change of 30 Jun 2020 to the
    electoral norms for those elections, without formally leaving the Supreme Court
    (temporary permit to integrate the CNE). After the renewal of the CNE in May 2021,
    she returned to the Supreme Court. Her actions have therefore undermined democracy
    and the rule of law in Venezuela.
