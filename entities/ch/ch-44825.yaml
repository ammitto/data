  justification: Lieutenant General Myint Swe is a member of the Myanmar Armed Forces
    (Tatmadaw) and was the Tatmadaw-appointed Vice-President until 1 February 2021.
    On that date, Myint Swe participated in a National Defence and Security Council
    (NDSC) meeting with other Tatmadaw members. The NDSC meeting was unconstitutional
    as it did not include its civilian members. During that meeting, Myint Swe was
    declared Acting President. Myint Swe then declared a state of emergency and handed
    over legislative, executive and judicial powers of the State to the Commander-in-Chief
    of Defence Services Senior General Min Aung Hlaing. The procedure for declaring
    the state of emergency was breached as, under the Constitution, only the President
    has the authority to declare a state of emergency. On 31 January 2022, Myint Swe
    approved the extension of the state of emergency until 31 July 2022.
