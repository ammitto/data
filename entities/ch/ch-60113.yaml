  justification: Sit Taing Aung was the Director of Yatanarpon Aviation Support Company
    and Suntac Group of Companies between the establishment of these companies and
    their disbanding in Nov 2021. Sit Taing Aung continued his activities after the
    2021 coup. He has used his commercial and personal position as well as his role
    as an importer and broker of arms and dual use goods to provide support for violence
    perpetrated by the Myanmar Armed Forces (Tatmadaw) against civilians, including
    the bombing of schools. Through his position as a director of now-disbanded Yatanarpon
    Aviation Support Company, he has represented a key source of weapons and commercial
    support for the junta, including through his close political/commercial ties with
    various companies in the military equipment sector.
