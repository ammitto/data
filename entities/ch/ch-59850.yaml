  justification: Avrora JSC is a leading enterprise in Russia’s maritime defence sector.
    Avrora JSC holds a licence from the Russian Ministry of Industry and Trade to
    develop weapons and military equipment, as well as a licence from the State Atomic
    Energy Corporation (Rosatom) to “work on the use of atomic energy for defence
    purposes, including the development of nuclear weapons and nuclear power plants
    for military purposes”. Avrora JSC is most widely known for its activities in
    the fields of development, production, and supply of automated control systems
    for surface ships and submarines of the Russian Federation Navy. Specifically,
    Avrora JSC develops, manufactures, supplies, and ensures warranty maintenance
    and servicing of on-board hardware automated control systems for submarines and
    naval surface ships of the Russian armed forces.
