  justification: Major General Nyi Nyi Swe is the former Commander of the Northern
    Command of the Myanmar Armed Forces (Tatmadaw). In that capacity, he is responsible
    for the atrocities and serious human rights violations committed in Kachin State
    from May 2016 to Apr 2018 (until his appointment as Commander of the South-western
    Command) by the Northern Command, including ill-treatment of civilians. He is
    also responsible for obstructing the provision of humanitarian assistance to civilians
    in need in Kachin State in that period, in particular the blocking of food transports.
