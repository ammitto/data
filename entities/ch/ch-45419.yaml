  justification: In her former position as judge at the Fruzensky district court in
    Minsk, Natallia Buhuk was responsible for numerous politically motivated rulings
    against journalists and protesters, in particular the sentencing of Katsiaryna
    Bakhvalava (Andreyeva) and Darya Chultsova. Violations of rights of defence and
    of right to a fair trial were reported during trials conducted under her supervision.
    She is therefore responsible for serious human rights violations and for seriously
    undermining the rule of law, as well as for the repression of civil society and
    democratic opposition. She remains active in the Lukashenka regime as a judge
    of the Minsk City Court.
