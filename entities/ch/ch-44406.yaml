  justification: Judge of the Constitutional Chamber of the Supreme Court (Tribunal
    Supremo de Justicia (TSJ)). As a member of the Constitutional Chamber of the Supreme
    Court, he is responsible for actions, statements and rulings that have usurped
    the constitutional powers of the National Assembly and undermined the opposition’s
    electoral rights including the unilateral appointment by the Supreme Court of
    the National Electoral Council (Consejo Nacional Electoral (CNE)) in Jun 2020
