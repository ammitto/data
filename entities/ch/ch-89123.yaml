  justification: Enutek Makina Sanayi Ve Ticaret is a Turkish company involved in
    a circumvention scheme centred around the Russian holding company Promtech JSC.
    Promtech JSC repeatedly imported goods of European origin while those products
    were subject to European export restrictions. In particular, Promtech JSC imported
    those goods through a network of Russian subsidiaries and via Enutek Makina Sanayi
    Ve Ticaret. Enutek Makina Sanayi Ve Ticaret thus facilitated infringements of
    the prohibition against circumvention of the Union’s restrictive measures regime
    imposed on the Russian Federation.
