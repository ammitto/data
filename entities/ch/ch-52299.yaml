  justification: Alexander Mikheev is the CEO of Rosoboronexport, Russia’s only official
    State intermediary for the export and import of military and dual-use products,
    technologies and services. Rosoboronexport is a subsidiary company of Rostec,
    a state-owned corporation that oversees the research and development of military
    technologies, and owns several production facilities which play an instrumental
    role in the deployment of those technologies into operation on the battlefield.
