  justification: Lieutenant General Aung Aung has been the Commander of the Bureau
    of Special Operations 2 since Oct 2022. He is the former Commander of the South
    Western Command of the Myanmar Armed Forces (Tatmadaw) and the former Commander
    of the 33rd Light Infantry Division of the Myanmar Armed Forces (Tatmadaw). In
    that context, he is responsible for the atrocities and serious human rights violations
    committed against the Rohingya population in Rakhine State in the second half
    of 2017 by the 33rd Light Infantry Division. Those include unlawful killings,
    sexual violence and the systematic burning of Rohingya houses and buildings.
