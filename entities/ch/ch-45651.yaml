  justification: In his former position as the Rector of the Brest State Technical
    University, whose appointment was approved by Alexander Lukashenka, Aliaksandr
    Bakhanovich was responsible for the decision of the university administration
    to expel students for taking part in peaceful protests. The expulsion orders were
