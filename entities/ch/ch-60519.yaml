  justification: JSC “State Space Research and Production Center named after M.V.
    Khrunichev” is a part of the State Corporation “Roscosmos” and is the leading
    enterprise of the Russian rocket and space industry. It is a developer and a serial
    manufacturer of “Proton-M” heavy-lift launch vehicles, of “Angara” launch vehicles,
    and of “Rokot” light launch vehicles. The military department of the Ministry
    of Defense orders Angara rockets for launching military satellites. “Roscosmos”
    transmits satellite images of Ukraine to the Russian Ministry of Defense, providing
    information and intelligence support to the Russian military. JSC “State Space
    Research and Production Center named after M.V. Khrunichev” manufactures and supplies
    products used by the Russian military during Russia’s war of aggression against
    Ukraine. Therefore, JSC “State Space Research and Production Center named after
    M.V. Khrunichev” is responsible for supporting materially actions which undermine
    and threaten the territorial integrity, sovereignty and independence of Ukraine.
