  justification: Santa Cruz Imperial has been identified by various sources as being
    owned or controlled by Viktor Bout and/or Sanjivan Ruprah (also already listed
    by the Liberian Sanctions Committee). However, there has been some disagreement
    as to whether Viktor Bout actually owned this company. Nevertheless, Santa Cruz
    aircraft have operated interchangeably with aircraft from Viktor Bout’s network.
    For example, Viktor Bout has used Santa Cruz aircraft to sell arms to UNITA in
    Angola and to sell aircraft to the Taliban in Afghanistan. Accordingly, Bout has
    at least indirect control over Santa Cruz.
