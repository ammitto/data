  justification: Substitute judge of the Constitutional Chamber of the Supreme Court
    (Tribunal Supremo de Justicia (TSJ)) since Apr 2022. Former judge of the Constitutional
    Chamber of the Supreme Court. As a member of the Constitutional Chamber of the
    Supreme Court, he has been responsible for actions, statements and rulings that
    have usurped the constitutional powers of the National Assembly and undermined
    the opposition’s electoral rights including the unilateral appointment by the
    Supreme Court of the National Electoral Council (Consejo Nacional Electoral (CNE))
    in Jun 2020 and the suspension and unilateral replacement of the leadership of
    three of the main democratic opposition parties in Jun and Jul 2020, as well as
    the extension of the ruling on Acción Democrática for one more year in May 2021.
    His actions have therefore undermined democracy and the rule of law in Venezuela,
    and he has supported and facilitated the undermining of democracy and the rule
    of law by the executive branch.
