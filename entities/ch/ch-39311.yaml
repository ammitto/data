  justification: President of the Defence and Security Committee of the non-democratically
    elected National Assembly since Jan 2021. Former Chief of the General Staff of
    the Commander-in-Chief of the Armed Forces (between Jul 2019 and Sep 2020). Former
    Commander in Chief of the Venezuelan Bolivarian National Army (until Jul 2019).
    Former General Commander of the Venezuelan Bolivarian National Army and former
    Commander of Venezuela’s Comprehensive Defence Region of the Central Zone (REDI
    Central). Responsible for serious human rights violations by forces under his
    command during his tenure as General Commander of the Venezuelan Bolivarian National
    Army, including the use of excessive force and the mistreatment of detainees.
    He has targeted the democratic opposition and supported the use of military courts
    to try civilian protestors.
