  justification: Anastasia Benedzisiuk is one of the leading propagandists of the
    Lukashenka regime and the Head of the Reporters Department at the TV News Agency,
    preparing reportages for the Belarus 1 TV channel. She hosts the information program
    “Plan B” at the state-owned “Belarus 1” TV channel. In her programme and reports
    for the Belarus 1 TV channel, she spreads Russian propaganda narratives about
    a “nazi regime in Ukraine”, the Ukrainian armed forces, as well as President Lukashenka’s
    propaganda against the Belarusian opposition and Kalinousky regiment. She also
    spreads propaganda against Western sanctions. In 2023, Anastasia Benedzisiuk was
    given an official award with gratitude from Lukashenka for her “significant contribution
    to the implementation of state information policy, high professionalism, objective
    and comprehensive coverage of the events of the socio-political and socio-cultural
    life of the country”. She is therefore benefiting from and supporting the Lukashenka
    regime.
