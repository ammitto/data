  justification: MZKT (a.k.a. VOLAT) is part of the Belarusian State Authority for
    Military Industry of the Republic of Belarus (a.k.a. SAMI or State Military Industrial
    Committee), which is responsible for implementing the military-technical policy
    of the State and a subordinate to the Council of Ministers and the President of
    Belarus. MZKT (a.k.a. VOLAT) is therefore benefitting from its association with
    and supporting the Lukashenka regime. Employees of MZKT who protested during the
    visit of Aliaksandr Lukashenka to the factory and went on strike in the wake of
    the 2020 presidential elections in Belarus were fired, which makes the company
    responsible for violation of human rights.
