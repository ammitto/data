  justification: Dominique Kamanzi Ndarurutse is a Commander of the “Collectif des
    Mouvements pour le Changement-Forces de Défense du Peuple” (CMC-FDP), an armed
    group active in Eastern DRC and part of the so-called “Wazalendo” or “Volontaires
    pour la Défense de la Patrie” (VDP) coalition consisting of the Congolese armed
    forces (FARDC) and several other armed groups. This coalition fights against the
    coalition of the March 23 Movement / Congolese Revolutionary Army (M23/RDF) and
    the “Alliance Fleuve Congo” (AFC) in Eastern DRC and has been involved in human
    rights violations.
