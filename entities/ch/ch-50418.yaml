    Commander of the Belarusian Western Operational Command. He is part of the Belarusian
    army, which has supported Russia’s war of aggression against Ukraine. In this
    position he is responsible for the participation of the troops under his command
    in the joint Belarusian-Russian military exercises preceding the military build-up
    at the Ukrainian border which prepared and facilitated the Russian military aggression
    against Ukraine of 24 February 2022.
