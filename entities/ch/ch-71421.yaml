  justification: JSC VMP Avitek (a.k.a. Vyatka Machine-Building Enterprise Avitek)
    is a Russian military-industrial state enterprise that develops and produces surface-to-air
    anti-aircraft guided missiles deployed by the Russian Armed Forces. Additionally,
    JSC VMP Avitek develops and produces ejection seats for fighter jets deployed
