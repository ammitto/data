  justification: |-
    JSC “Murom Instrument-Making Plant” specialises in the production of the means of initiation and ignition of ammunition for all types of the armed force’s weapons. It provides initiating and igniting ammunition of all branches of the Russian Armed Forces, the Ministry of Internal Affairs, the FSB and other law enforcement agencies. JSC Murom Instrument-Making Plant” is included in the list of strategic organisations that ensure the implementation of a unified state policy in the sectors of the economy in which they operate. The CEO of the company, Dmitry Fadeev has pledged “to do everything to provide today's defenders of the Fatherland with everything they need in order to liberate
    Donbas from the Nazi regime”. Moreover, he is the head of the weapon-producing League of Defense Enterprises of the Vladimir Region.
