  justification: Ruslan Shambazov is a police officer of the Center for Countering
    Extremism of the Ministry of Internal Affairs for Crimea. Shambazov participated
    in and led politically motivated persecutions of Ukrainian citizens in Crimea,
    including those whose activities are of a human rights nature, namely lawyers,
    journalists and human rights activists. He initiated and supervised the arrests
    of lawyers Emil Kurbedinov and Edem Semedlyaev. Ruslan Shambazov organised the
    persecution of human rights activists and journalists for their professional activities
    and anti-war statements. He initiated the administrative prosecution of Abdureshit
    Dzhepparov, Remzi Bekirov and Rolan Osmanov on far-fetched politically motivated
    grounds. Shambazov repeatedly initiated and led mass unfounded and illegal detention
    of Crimean Tatars, who gathered near the courts to support their arrested compatriots.
