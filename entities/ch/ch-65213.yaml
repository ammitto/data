  justification: In the position of judge at the Minsk City Court, Piotr Arlou has
    represented the Lukashenka regime in numerous politically motivated trials and
    is responsible for the lengthy verdicts in absentia against several members of
    the democratic opposition; Sviatlana Tsikhanouskaya (15 years), Pavel Latushka
    (18 years), and Volha Kavalkova, Maryia Maroz and Siarhei Dyleuski (12 years each).
    Piotr Arlou is also responsible for the politically motivated conduct of trial
    and verdicts against blogger Eduard Palchys (13 years of imprisonment) and journalist
    Katsiaryna Andreyeva (two years). These verdicts are part a systematic denial
    of, and punishment for, the exercise of freedom of expression by the Belarusian
    authorities. Piotr Arlou’s verdicts are examples of the systemic repression of
    dissent. He is therefore responsible for serious violations of human rights, the
    repression of civil society and democratic opposition, and activities that seriously
    undermine democracy and the rule of law in Belarus.
