  justification: Stanislav Vorobyov is the head of the Russian Imperial Movement,
    a white supremacist paramilitary organisation that is actively fighting in Ukraine
    on behalf of the Russian government. The Russian Imperial Movement (RIM) was founded
    by Stanislav Vorobyov in 2002. Under the leadership of Stanislav Vorobyov, the
    Russian Imperial Movement is promoting ethnic Russian nationalism while seeking
    to fuel white supremacist extremism in the West. It provides paramilitary training
    to Russian nationals and to members of likeminded organisations from other countries.
    Its armed wing, the Imperial Legion, is actively fighting on behalf of the Russian
    armed forces in Russia’s war against Ukraine. On its official webpage, the Movement
    identifies ‘fighting in Ukraine against the Uniates and Pagans, who are the backbone
    of the Ukrainian armed forces’ as one of its main endeavors. Stanislav Vorobyov
    has personally recruited volunteers to fight alongside the Russian armed forces
    in Russia’s war against Ukraine.
