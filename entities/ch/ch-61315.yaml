  justification: "Vasiliy Osmakov was Deputy Minister of Industry and Trade of the
    Russian Federation from 2016 to 2021. He has been the First Deputy Minister of
    the Ministry of Industry and Trade since 2021. The Ministry of Industry and Trade
    is the federal executive body responsible for the development of state policy
    and legal regulation in the field of, inter alia, the military-industrial complex,
    space activities and the development of aviation technology. The Ministry supervises
    Russia’s weapons and defence industry and plays a crucial role in procuring military
    equipment used in Russia’s war of aggression against Ukraine. In his capacity
    as Deputy Minister of the Ministry of Industry and Trade, he is \nresponsible
    for actions and activities of the Ministry that undermine and threaten the territorial
    integrity, sovereignty and independence of Ukraine, and he is a natural person
    supporting the Government of the Russian Federation, which is responsible for
    the annexation of Crimea and the destabilisation of Ukraine."
