  justification: Vladimir Zaitsev is the Director of Joint Stock Company (JSC) VNIIRT
    (a.k.a. All-Russian Research Institute of Radio Engineering). JSC VNIIRT is a
    Russian military-industrial state enterprise that develops radar systems deployed
