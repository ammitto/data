  justification: Alexei Weitz is a member and spiritual leader of the nationalist
    motorcycle club Nightwolves MC, with close personal links to the Nightwolves MC
    leader Alexander Zaldostanov. He is responsible for linking the Nightwolves MC
    with the Russian Orthodox Church and shaping its leaders’ worldview. He has previously
    acted as press secretary of the Nightwolves MC and performs representative tasks,
    among others, giving talks to University students and speaking at Nightwolves
    rallies. He is also an expert of the Council for Interethnic Relations under the
    President of Russia, which has publicly supported the Russian war on Ukraine and
    breaches of international law and is responsible for formulating an official concept
    of the “Russian nation”. Due to his activities for the Nightwolves MC and the
    Council for Interethnic Relations under the President of Russia, Weitz is a key
    figure of Russian state propaganda. Alexei Weitz is a member of the Nightwolves
    MC, which is responsible for materially supporting actions which undermine or
    threaten the territorial integrity, sovereignty and independence of Ukraine. Furthermore,
    he is a natural person responsible for, supporting and implementing actions or
    policies which undermine or threaten the territorial integrity, sovereignty and
    independence of Ukraine, as well as the stability and security in Ukraine.
