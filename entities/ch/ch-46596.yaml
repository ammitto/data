  justification: OJSC Belavia Belarusian Airlines is the state-owned national flag
    carrier airline. Belavia also owns and operates Belarusian governmental airplanes
    used by President Aliaksandr Lukashenka. Aliaksandr Lukashenka promised that his
    administration would provide all possible support to Belavia after the Union decided
    to introduce a prohibition on the overflight of Union airspace and on access to
    Union airports by all Belarusian air carriers. To that end, he agreed with the
    Russian President Vladimir Putin on planning the opening of new airline routes
    for Belavia. In 2021, Belavia’s CEO confirmed receiving government support in
    the restoration of flights to the Russian Federation. The flag carrier airline
    has also been exempted from paying added value tax by the Belarusian government
    in respect of aircraft and components imported into the territory of the Republic
    of Belarus. Furthermore, in 2014, Belavia received loans for the acquisition of
    new aircraft from a state-owned bank. Belavia’s management also told its employees
    not to protest against election irregularities and mass detentions in Belarus,
    in view of the fact that Belavia is a state-owned enterprise. Belavia is therefore
    benefitting from and supporting the Lukashenka regime.
