  justification: The 53rd Anti-Aircraft Missile Brigade is a surface-to-air missile
    brigade of the Russian Ground Forces and is part of the 20th Guards Army of the
    Russian Federation. Since September 2010, the 53rd Anti-Aircraft Missile Brigade
    has performed combat missions as part of the Western Military District and has
    been recognized as one of the key air defense brigades of the Russian land forces.
    Since February 2022, the 53rd Anti-Aircraft Missile Brigade has actively contributed
    to Russia’s war of aggression against Ukraine. The 53rd Anti-Aircraft Missile
    Brigade has been deployed to the Kharkiv region of Ukraine during Russia’s full-scale
    invasion, firing anti-aircraft missiles from a warehouse in Izium while the Ukrainian
    city was under Russian occupation. In February 2023, the 53rd Anti-Aircraft Missile
    Brigade was awarded a new honorary designation by President Putin for “mass heroism
    and valour, endurance, and courage shown by the personnel of the brigade in combat
    actions to defend the Fatherland”, likely in relation to the brigade’s contributions
    to Russia’s war of aggression against of Ukraine.
