  justification: In her position as Attorney General of Guatemala, the highest civil
    servant in the Public Ministry (Ministerio Público) of Guatemala (equivalent to
    Head of the Public Prosecutor’s Office or Chief Prosecutor), María Consuelo Porras
    Argueta De Porres (a.k.a. “Porras”) is involved in efforts to overturn the results
    of the first and second rounds of elections held in June and August 2023, including
    through spurious criminal investigations targeting the Supreme Electoral Tribunal,
    the political party Movimiento Semilla and President Arévalo. Furthermore, under
    her leadership the Public Ministry has brought arbitrary proceedings against independent
    journalists, prosecutors, judges, and civil society activists including indigenous
    leaders and students.
