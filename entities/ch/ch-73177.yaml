  justification: |-
    Galina Khulapova is a judge of the Kyiv District Court of the city of Simferopol, Crimea. She has been appointed by the President of the Russian Federation Vladimir Putin. She systematically prosecutes Ukrainian citizens for political reasons, abusing antiextremism
    and anti-terrorism legislation. She has repeatedly arrested Crimean Tatars on charges of belonging to organisations banned in Russia that are not banned in Ukraine. Khulapova fined journalist Rolan Osmanov for his professional activities, as well as participants in spontaneous gatherings of Crimean Tatars protesting repression by Russian security services. Those whom she arrested and sentenced were repeatedly recognised as political prisoners.
