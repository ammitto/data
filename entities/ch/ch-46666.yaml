  justification: Anatol Glaz has been Head of the Department of Information and Digital
    Diplomacy and Spokesperson of the Ministry of Foreign Affairs of Belarus since
    11 Jun 2018. In this capacity, he made a number of public statements, supporting
    the policy of the Lukashenka regime in its latest attempts to facilitate the illegal
    crossings of the external borders of Union Member States. He also publicly defended
    the forced landing of passenger flight FR4978 in Minsk airport without proper
    justification on 23 May 2021. This politically motivated decision had the aim
    of the arrest and detention of opposition journalist Raman Pratasevich and Sofia
    Sapega and is a form of repression against civil society and democratic opposition
    in Belarus. He is therefore supporting the Lukashenka regime.
