  justification: Olga Koludarova is the Minister of Education and Science of the so-called
    “Donetsk People’s Republic”. She is one of the persons involved in the deportation
    of children from Ukraine to re-educate them in the Russian Federation. In her
    re-education programmes, she cooperates with Ramsan Kadyrov and the “Movement
    of the First”, a state-led youth organisation in the Russian Federation, which
    was created in December 2022 at the initiative of President of the Russian Federation
    Vladimir Putin to provide educational activities, including of a militarised nature,
    for children between the ages of 6 to 18, based on “traditional Russian spiritual
    and moral goals”.
