  justification: JSC “ODK-Star” is a developer and a serial producer of fuel-supply
    and control systems for air, ground and marine gas turbine engines. JSC “ODK-Star”
    is involved in the most important programmes of Russian engine building, including
    in the creation of D30-KP and PD-8 engines. D30-KP engines are installed on the
    military transport aircraft Il-76, used by the Russian Armed Forces in Russia’s
    war of aggression against Ukraine. United Aircraft Corporation has started to
    develop the technical design in order to use PD-8 engines in military transport
    aircraft (IL-212). JSC “ODK-Star” therefore supports and benefits from the Government
    of the Russian Federation, which is responsible for the illegal annexation of
    Crimea and the destabilisation of Ukraine.
