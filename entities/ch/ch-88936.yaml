  justification: Physics and Technology Institute Named After A.F. Ioffe (“Ioffe Institute”)
    is a Russian state-financed institution developing and manufacturing in the fields
    of microelectronics, optics and technical physics. The Ioffe Institute carries
    out critical tasks of developing a domestic component base in the field of optoelectronics,
    in particular lasers for various applications. The Ioffe Institute receives financial
    and institutional state support for those projects. In addition, technologies
    developed by the Ioffe Institute are used to replace imported technologies in
    important Russian industries, including in the military industry. The Ioffe Institute
    therefore supports and benefits from the Government of the Russian Federation,
    which is responsible for the annexation of Crimea and the destabilisation of Ukraine.
