  justification: 2Rivers PTE Ltd is a Singapore-based oil-trading company. Along with
    2Rivers DMCC, also owned by Vetus Investments, it forms the 2Rivers Group, previously
    known as Coral Energy. The 2Rivers Group enables shipments and export of Russian
    oil, notably from Rosneft, by concealing the actual origin of the oil. In particular,
    the 2Rivers Group controls a large proportion of the vessels in Russia’s so-called
    “shadow fleet”. The 2Rivers Group continues to operate the same network as Coral
    Energy, which includes associated entities such as Nord Axis and Bellatrix Energy,
    regardless of its change in name and ownership, as demonstrated by the connection
    between the previous owner and the new management. Furthermore, the energy sector,
    in particular the oil sector, is a sector providing substantial revenue to the
    Russian Government.
