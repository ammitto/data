  justification: In his position as the former head and former majority shareholder
    of Synesis LLC, Alexander Shatrov was responsible for that company’s decision
    to provide Belarusian authorities with a surveillance platform, Kipod, which can
    search through and analyse video footage and employ facial recognition software.
    He is therefore contributing to the repression of civil society and democratic
    opposition by the state apparatus. Synesis claims to have stopped providing the
    Belarusian authorities with the Kipod platform, but according to ByPOL reports
    Kipod is still used by the state securities agencies. Synesis is one of the residents
    of the Hi-Tech Park, created by a decree of Aliaksandr Lukashenka, and as such
    enjoys numerous benefits, including exemptions from income tax, VAT, offshore
    duty, customs duties and others. Synesis LLC and its subsidiary Panoptes have
    benefitted from their participation in the Republican Safety Monitoring System.
    Other companies which have been owned or co-owned by Shatrov, such as BelBet and
    Synesis Sport, also benefit from government contracts. He made public statements
    in which he criticised those protesting against the Lukashenka regime and put
    into perspective the lack of democracy in Belarus. He therefore benefits from
    and supports the Lukashenka regime. He remains a shareholder of Synesis LLC.
