  justification: Yauhen Pustavy is a Belarussian propagandist working for Stolichnoye
    Televideniye, one of the three national television channels in Belarus, and for
    Minskaya Prauda, a state newspaper. He is responsible for disseminating propaganda
    in support of Lukashenka’s policies and which justifies Russia’ war of aggression
    against Ukraine. He was awarded by Lukashenka for his merits in the development
    of the State information policy. Moreover, he is member of the State Commission
    aimed at verifying political refugees who wish to return to Belarus. This commission
    was created by Lukashenka with the political aim of portraying the refugees returning
    to Belarus as persons regretting their actions against the Lukashenka regime.
    He is therefore benefiting from and supporting the Lukashenka regime.
