  justification: |-
    Vyacheslav Smirnov was appointed to supervise local elections in the occupied areas in Ukraine and to organise voting. He is also employed in the Presidential Directorate for Supporting the State Council’s Activities of the Russian Federation, which is responsible
    for ensuring the interaction of the President of the Russian Federation with expert organisations, and for monitoring and analysing social processes. The Directorate is deeply involved in the election processes. In that role, he is responsible for implementing Russian state policies, including the illegal incorporation of Ukrainian regions into Russian state structures. In that capacity, and through his actions, he is therefore responsible for supporting and implementing actions and policies which undermine and threaten the territorial integrity, sovereignty and independence of Ukraine.
