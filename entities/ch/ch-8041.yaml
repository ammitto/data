  justification: Mohamed Sa'id "Atom" has engaged in acts that threaten the peace,
    security or stability of Somalia. Atom has directly or indirectly supplied, sold,
    or transferred to Somalia arms or related materiel or advice, training, or assistance,
    including financing and financial assistance, related to military activities in
    violation of the arms embargo. Atom has been identified as one of the principal
    suppliers of arms and ammunition for Al-Shabaab operations in the Puntland region.
    He is described as the leader of a militia that emerged in 2006 in the eastern
    Sanaag region of northern Somalia. The militia comprises as many as 250 fighters
    and has been implicated in incidents of kidnapping, piracy and terrorism, and
    imports its own weapons, in violation of the arms embargo. Atom has established
    his force as the principal military presence in the area, with a primary base
    near Galgala and a secondary base near Badhan. According to some information,
    Atom is aligned with Al-Shabaab and may receive instructions from al-Shabaab leader
    Fu'aad Mohamed Khalaf.
