  justification: As First Instance Criminal Judge of the Seventh Court, Fredy Orellana
    Letona is responsible for supervising and authorising the actions of the Special
    Prosecutor’s Office Against Impunity (FECI), which operates under the Public Ministry
    (Ministerio Público) of Guatemala (equivalent to the Public Prosecutor’s Office),
    investigating alleged irregularities in the creation of the political party Movimiento
    Semilla, whose candidate won the second round of the presidential elections in
    Guatemala in August 2023. As supervising judge, Fredy Orellana Letona authorised
    raids at the headquarters of Movimiento Semilla in July 2023 and the premises
    of the Supreme Electoral Tribunal in July and September 2023. He also ordered
    the provisional suspension of the legal personality of Movimiento Semilla and
    denied access to the case file for the defence. He has enabled FECI’s actions
    to prosecute elected authorities and the magistrates of the Supreme Electoral
    Tribunal.
