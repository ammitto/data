  justification: Pavel Tochilin is the General Director of JSC SPE “Aerosila”. JSC
    SPE “Aerosila” is a Russian developer and manufacturer of various aircraft parts,
    such as engines, propellers and fans. JSC SPE “Aerosila” provides its products
    to domestic aviation manufacturers. The company’s products are used to create
    military aircraft that Russian Aerospace Forces use in Russia’s war of aggression
    against Ukraine. For example, unmanned aerial vehicle Orion’s power unit APD-115T
    is equipped with an AV-115 propeller manufactured by JSC SPE “Aerosila”. In addition,
    the Russian Federation has a special right (“golden share”) of participation in
    the control of JSC SPE “Aerosila”, which would allow the Russian Federation a
    decisive voting right over the other shareholders when adopting major decisions.
