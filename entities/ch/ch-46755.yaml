  justification: In his position as judge at the Central District of the City of Minsk
    Court, Dzmitriy Karsiuk is responsible for numerous politically motivated rulings
    against peaceful protesters, in particular the sentencing of Yahor Viarshynin,
    Pavel Lukoyanov, Artsiom Sakovich and Mikalai Shemetau, who are recognised as
    political prisoners by Belarusian Human rights organisation Viasna. He has sentenced
    people to penal colony, prison and house arrest for taking part in peaceful protests,
    posts on social media, use of the white-red-white flag of Belarus and other exercises
    of civil freedoms. He is therefore responsible for serious human rights violations
    and for seriously undermining the rule of law, as well as for the repression of
    civil society and democratic opposition.
