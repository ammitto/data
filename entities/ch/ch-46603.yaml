  justification: In his former position as Chairman of the State Border Committee,
    Anatol Lapo was responsible for actions of border control bodies under his command,
    whose border guards were documented as directing, guiding or forcing migrants
    to illegally cross the border between Belarus and Union Member States, and whose
    deliberate failure to carry out their duties properly facilitates attempts by
    migrants to cross that border. He is therefore responsible for organising activities
    by the Lukashenka regime that facilitate the illegal crossing of the external
    borders of the Union. He was passed to the military reserve in May 2023.
