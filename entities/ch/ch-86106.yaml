  justification: Vyacheslav Petushenko is the Chairman of the Board of State Company
    “Avtodor”, which is the Russian state infrastructure and highway service company.
    “Avtodor” has signed an agreement to provide the right to free travel on toll
    roads for vehicles transporting aid to the zone of Russia’s illegal war of aggression
    against Ukraine. In addition, “Avtodor” is actively involved in reconstructing
    many roads in Ukrainian territories which have been occupied by Russia. President
    Putin has taken note of the work of “Avtodor” specialists, who are involved in
    the restoration of infrastructure in occupied areas. The aim of such actions is
    to integrate the occupied territories into Russia by building infrastructural
    objects. As the Chairman of the Board of State Company “Avtodor”, Vyacheslav Petushenko
    is implementing actions or policies which undermine the territorial integrity,
    sovereignty and independence of Ukraine.
