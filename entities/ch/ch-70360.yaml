  justification: PMC Andreevsky Krest (a.k.a. St. Andrew’s Cross) is a Russian private
    military company that participates in Russian combat operations in Ukraine. PMC
    Andreevsky Krest was created by the Russian Orthodox Church in 2017. Since then,
    it has offered tactical training to Russian combatants participating in Russia’s
    war of aggression against Ukraine. After combatants finish the tactical training
    offered by PMC Andreevsky Krest, they sign contracts with the Russian Ministry
    of Defence or Wagner Group. Moreover, PMC Andreevsky Krest has created its own
    volunteer battalions which actively contribute to Russia’s war of aggression against
    Ukraine.
