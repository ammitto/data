  justification: In his position as Head of Division of the KGB Investigation Department,
    Kanstantin Bychak has supervised politically motivated investigation of presidential
    candidate Viktar Babarika. Babarika’s candidacy was rejected by the Central Election
    Commission. This decision was based on a report from the KGB and official TV statements
    of Bychak declaring Babarika guilty of money laundering while investigations were
    still ongoing. On Oct 26, 2020, Bychak threatened peaceful protestors on the governmental
    TV by stating that their actions would be classified as acts of terrorism. He
    is therefore responsible for the repression of the democratic opposition and civil
    society.
