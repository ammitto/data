  justification: Larisa Dolina is a Russian singer and actress. Since the beginning
    of the Russian war of aggression against Ukraine, Dolina has frequently supported
    Russia’s actions which threaten the territorial integrity, sovereignty and independence
    of Ukraine. To that end, Dolina has worked with the Russian Ministry of Defence
    and led entertainment campaigns on behalf of the Russian Government to reward
    Russian military personnel for their participation in the Russian war of aggression
    against Ukraine. She moreover gave public concerts in the Russian occupied Donbass
    region in coordination with the Russian Government.
