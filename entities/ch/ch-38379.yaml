  justification: President of Petróleos de Venezuela (PDVSA). General Director of
    the Bolivarian National Intelligence Service (SEBIN) between April 2019 and October
    2024. Security and Intelligence Adviser to President Maduro since January 2019,
    and General Director of SEBIN from February 2014 to October 2018. During the times
    he has served as SEBIN director, officials under his ultimate authority committed
    acts of arbitrary detention, torture and cruel and inhuman treatment, including
    sexual violence, in El Helicoide detention centre. As General Director of SEBIN,
    he is responsible for serious human rights violations, including arbitrary detention,
    inhuman and degrading treatment, and torture, and the repression of civil society
    and the democratic opposition in Venezuela.
