  justification: In her position as judge at the Moskovsky District Court in Minsk,
    Tatsiana Matyl is responsible for numerous politically motivated rulings against
    journalists, opposition leaders, activists and protesters, in particular the sentencing
    of opposition politician Mikalai Statkevich and journalist Alexander Borozenko.
    Violations of rights of defence and right to a fair trial were reported during
    trials conducted under her supervision. She is therefore responsible for serious
    human rights violations and for seriously undermining the rule of law, as well
    as for the repression of civil society and democratic opposition.
