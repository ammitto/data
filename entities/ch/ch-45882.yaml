  justification: In his former position as the Deputy Head of the Frunzensky District
    Police Department of Minsk supervising criminal police, Siarhei Ushakou was responsible
    for the actions of his subordinates, especially inhumane and degrading treatment,
    including torture, inflicted on citizens detained in the Frunzensky District in
    the wake of the 2020 presidential election and for the general brutal crackdown
    on peaceful protesters. Officers under Ushakou’s direct supervision used torture
    against detainees. He is therefore responsible for serious violations of human
    rights and the repression of civil society and democratic opposition. He is currently
    the head of the Fruzensky District Police Department of Minsk.
