  justification: Valery Shadrin is General Director of Promtech JSC. Promtech JSC
    is a Russian holding company that repeatedly imported goods of European origin
    while those products were subject to European export restrictions. In particular,
    Promtech JSC imported those goods through a network of Russian subsidiaries and
    via the Turkish company Enutek Makina Sanayi Ve Ticaret. Valery Shadrin therefore
    facilitated infringements of the prohibition against circumvention of the Union’s
    restrictive measures regime imposed on the Russian Federation.
