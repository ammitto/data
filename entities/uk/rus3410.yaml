uk_statement_of_reasons: "\nThe Secretary of State considers that there are reasonable
  grounds to suspect that Grant Arshavirovich AKOPOV is and has been involved in destabilising
  Ukraine or undermining or threatening the territorial integrity, sovereignty or
  independence of Ukraine by working as a director or other manager or equivalent
  of entities providing economic resources, goods or technology that could contribute
  to destabilising Ukraine or undermining or threatening the territorial integrity,
  sovereignty or independence of Ukraine. Namely, AKOPOV is president of LIMITED LIABILITY
  COMPANY UNIMATIC and supervisor of DALIAN UNIMATIC TRADING CO., LTD. which are involved
  persons. \n \nThe Secretary of State considers that there are reasonable grounds
  to suspect that Grant Arshavirovich AKOPOV is and has been involved in obtaining
  a benefit from or supporting the Government of Russia by working as a director or
  equivalent of a person carrying on business in a sector of strategic significance
  to the Government of Russia, namely he is president of LIMITED LIABILITY COMPANY
  UNIMATIC which is carrying on business in the Russian defence sector.    \n"
