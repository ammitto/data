comments1: Ship and commercial manager of the ASIA BRIDGE 1. Hong Kong-owned vessel,
  the probable “ASIA BRIDGE 1” was instructed on 19 October 2017 by Huaxin Shipping
  to make preparations for entry into Nampo, DPRK to receive a shipment of coal bound
  for Vietnam.  The “ASIA BRIDGE 1” was instructed by an unidentified employee of
  Huaxin Shipping Ltd. to make preparations to receive 8,000 metric tons of coal and
  then sail to Cam Pha, Vietnam.  The master of the vessel was instructed to cover
  the ship’s name and other markings using canvas while in port at Nampo.
