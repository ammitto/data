comments1: Khatiba al-Tawhid wal-Jihad (formerly known as Jannat Oshiklari) is a terrorist
  organization operating under the umbrella of the international terrorist organization
  Al-Nusrah Front for the People of the Levant (QDe.137). The group mainly operates
  in the provinces of Hama, Idlib and Ladhiqiyah, in the Syrian Arab Republic, and
  also conduct operations in Turkey, Kyrgyzstan, Uzbekistan, Russian Federation, Tajikistan,
  Kazakhstan, Egypt, Afghanistan, Ukraine.  The number of fighters of KTJ is about
  500. KTJ also cooperates with such terrorist organizations as Khatiba Imam al-Bukhari
  (QDe.158) and the Islamic Jihad Group (QDe.119).  INTERPOL-UN Security Council Special
  Notice web link:https://www.interpol.int/en/How-we-work/Notices/View-UN-Notices-Individuals
