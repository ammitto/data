comments1: |-
  Appointed General in the FARDC in December 2004. Handed over by the
  Government of the DRC to the International Criminal Court on 18 October 2007.  Initially convicted on 23 May 2014 by the ICC to 12 years in prison for war crimes and crimes against humanity, the ICC Appeals Chamber reduced his sentence and determined that Katanga’s sentence should be completed on 18 January 2016.  Although he was detained in the Netherlands for the duration of his trial, Katanga was transferred to a DRC prison in December 2015 and charged for other crimes previously committed in Ituri.
