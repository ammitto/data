  justification: Member of Parliament for the province of Yazd and Chairman of the
    Internal Affairs Commission and Parliamentary Councils. General of the Islamic
    Revolutionary Guard Corps (IRGC) and former Deputy for Parliamentary Affairs of
    the IRGC. From 2011 to 2016, Member of Parliament for the province of Yazd and
    Member of the Parliamentary Committee for National Security and Foreign Policy.
    Former Commander of Student Basij Forces. In that role, he was actively involved
    in suppressing protests and indoctrinating children and young people with a view
    to continuing suppression of free speech and dissent. As a Member of the Parliamentary
    Committee for National Security and Foreign Policy, he publicly supported the
    suppression of opposition to the government and its repressive policies. After
    the death of Mahsa Amini in 2022, he played a central role in proposing amendments
    to the parliamentary election law designed to empower hardliners in parliamentary
    elections and shut down the demands of protestors.
