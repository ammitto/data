  justification: 'JSC “Central Research Institute of Materials Named After D.I. Mendeleev”
    (JSC CNIIM) is an advanced enterprise, which specialises in the research and development
    of new materials and technologies. JSC CNIIM is part of the largest Russian defence
    conglomerate Rostec. JSC CNIIM develops and produces materials that are widely
    used in military industry: silicon carbide is used in military vests and armoured
    vehicles protection; high-strength steel is used to produce artillery barrels;
    and rubber products are used to coat military equipment to conceal it from hostile
    radars. The activities of JSC CNIIM expand and enhance the Russian military’s
    technological capabilities by introducing new materials or upgrading existing
    ones.'
