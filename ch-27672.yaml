  justification: 'Engaging in or providing support for acts that undermine the peace,
    stability or security of CAR: On 17 Dec 2013, Yakete became the political coordinator
    of the newly formed People’s Resistance Movement for Reforming of the Central
    African Republic anti-Balaka rebel group. He has been directly involved in decisions
    of a rebel group that has been involved in acts that have undermined peace, stability
    and security in the CAR, in particular on and since 5 Dec 2013. In addition, this
    group has been explicitly singled out by resolutions 2127, 2134 and 2149 for such
    acts. Yakete has been accused of ordering the arrest of people connected to the
    Séléka, calling for attacks on people who do not support President Bozizé, and
    recruiting young militiamen to attack those hostile to the regime with machetes.
    Having remained in the entourage of François Bozizé after March 2013, he joined
    the Front for the Return to Constitutional Order in CAR (Front pour le Retour
    à l’Ordre Constitutionnel en CentrAfrique — FROCCA), which aimed to return the
    deposed president to power by whatever means necessary. In late summer 2013, he
    travelled to Cameroon and Benin, where he attempted to recruit people to fight
    against the Séléka. In September 2013, he tried to regain control over operations
    led by pro-Bozizé fighters in towns and villages near to Bossangoa. Yakete is
    also suspected of promoting the distribution of machetes to young unemployed Christians
    to facilitate their attacks on Muslims.'
