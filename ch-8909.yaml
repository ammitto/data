    It has facilitated numerous purchases of sensitive materials for Iran’s nuclear
    and missile programmes. It has provided a range of financial services on behalf
    of entities linked to Iran’s nuclear and missile industries, including opening
    letters of credit and maintaining accounts. Many of the above companies have been
    designated by UNSCRs 1737 (2006) and 1747 (2007). Bank Melli continues in this
    role, by engaging in a pattern of conduct which supports and facilitates Iran’s
    sensitive activities. Using its banking relationships, it continues to provide
    support for, and financial services to, UN and EU listed entities in relation
    to such activities. It also acts on behalf of, and at the direction of such entities,
    including Bank Sepah, often operating through their subsidiaries and associates.
