  justification: In her former position as judge of the Moskovsky district of Minsk,
    Sviatlana Bandarenka was responsible for numerous politically-motivated rulings.
    She sentenced several Belarusian citizens for participating in protests and publishing
    anti-government comments on Telegram. She also sentenced the journalist Ekaterina
    Borisevich and the emergency hospital doctor Artyom Sorokin for disclosing medical
    secrets about Roman Bondarenko, who was beaten to death by the security forces.
    She is therefore responsible for serious human rights violations and for seriously
    undermining the rule of law, as well as for the repression of civil society and
    democratic opposition in Belarus. She was appointed by Lukashenka as judge of
    the Supreme Court of Belarus.
