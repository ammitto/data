  justification: Director of the Directorate of Strategic and Tactical Actions (DAET)
    since July 2022 and Assistant Director of the Bolivarian National Police (PNB)
    since July 2023. Former Director of the Special Action Forces (Fuerzas de Acciones
    Especiales (FAES)). Former Chief Commissioner of the FAES in Táchira State. Additionally,
    José Miguel Domínguez Ramírez was the Director of Operations of the FAES, which
    fall within Venezuela’s Bolivarian National Police. Responsible for serious human
    rights violations and repressing of civil society and democratic opposition in
    Venezuela committed by FAES officials under his authority. The FAES are known
    for extrajudicial killings and their violent role in suppressing dissent from
    Maduro’s political opponents, the opposition, and protesters, which is why the
    United Nations High Commissioner for Human Rights, Michelle Bachelet, has demanded
    the dissolution of the FAES. Moreover, previously, Domínguez Ramírez was a member
    of the Venezuelan security team that opened fire on unarmed student protestors
    on 12 February 2014, resulting in the death of at least one of the students, Bassil
    Da Costa.
