  justification: Alexey Besprozvannykh is a member of ruling United Russia party and
    has been the acting governor of the Kaliningrad region since 9 September 2024.
    He was previously Deputy Minister of the Ministry of Industry and Trade from 2017
    to 2024. The Ministry supervises Russia’s weapons and defence industry and plays
    a crucial role in procuring military equipment used in Russia’s war of aggression
    against Ukraine. In his capacity as Deputy Minister of the Ministry of Industry
    and Trade, Alexey Besprozvannykh was responsible for actions and activities of
    the Ministry that undermine and threaten the territorial integrity, sovereignty
    and independence of Ukraine. He is also a natural person supporting the Government
    of the Russian Federation, which is responsible for the annexation of Crimea and
    the destabilisation of Ukraine.
