  justification: Fund for the Development of Weapons Technologies and Production “Lobaev
    Foundation” (Lobaev Foundation) is a unit of the Lobaev Group of entities and
    collects funds to finance the projects of LLC Trading House Lobaev Arms. Lobaev
    Arms rifles are used by the Russian Armed Forces in Russia’s war of aggression
    against Ukraine. Popular use has made Lobaev Arms rifles one of the symbols of
    Russia’s war of aggression. Lobaev Foundation is financing new developments in
    the weapons sector and production of unmanned aerial vehicles, is shipping weapons
    and ammunition to the special services and military units, and is fundraising
    money to finance those activities. The Lobaev Foundation provides assistance to
    the servicemen of the Ministry of Defence of the Russian Federation and the Federal
    Security Service of the Russian Federation. The Lobaev Foundation therefore supports
    actions which undermine and threaten the territorial integrity, sovereignty and
    independence of Ukraine, and supports and benefits from the Government of the
    Russian Federation, which is responsible for the annexation of Crimea and the
    destabilisation of Ukraine.
