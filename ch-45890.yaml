  justification: In his position as the Deputy Head of the Pervomaisky Police District
    in Minsk, supervising public security police, Siarhei Artemenko is responsible
    for the inhumane and degrading treatment, including torture, inflicted, by his
    subordinates on citizens detained at the Pervomaiskiy District Police Department
    of Minsk that occurred in the wake of the 2020 presidential election and for the
    general brutal crackdown on peaceful protesters. One example is the mistreatment
    of Maxim Haroshin, a floral shop owner, who was arrested after he gave flowers
    to the participants of the Women's March on 13 Oct 2020. Artemenko exerted pressure
    on citizens not to participate in peaceful demonstrations. He is therefore responsible
    for serious violations of human rights and the repression of civil society and
    democratic opposition.
