  justification: Evgenii Dronov is the General Director of JSC Tula Machine Building
    Plant (a.k.a. Tulamashzavod). JSC Tula Machine Building Plant is a Russian defence
    manufacturer with a specialisation in the production of advanced military equipment,
    particularly in the domain of anti-aircraft weaponry and artillery systems. The
    company is responsible for the development and manufacturing of several key defence
    systems, including the KASHTAN anti-aircraft missile and artillery system, the
    PALMA anti-aircraft artillery system, and a range of 30 mm automatic cannons and
    machine guns such as the Gryazev-Shipunov GSh-6-30 and the 2A72. Those systems
    are integrated into various military platforms, including infantry fighting vehicles
    such as the BMP-3 and BTR-80A, and are also mounted on strategic assets such as
    the Kuznetsov class aircraft carrier.
