  justification: |-
    Atomflot is a Russian company that maintains Russia’s icebreaker fleet. The icebreaker fleet managed by Atomflot is designed specifically to meet Russia’s maritime transportation objectives along the Northern Sea Route – the Arctic shortcut between Europe and Asia. The Northern Sea Route has emerged as a new strategic opportunity for unlocking and monetising Russia’s vast oil and gas reserves in the Arctic, thereby providing a substantial source of revenue to the government of the Russian Federation. With oil and gas exports shifting from Europe to Asia as a result of Russia’s war of aggression against Ukraine and subsequent Westerns sanctions, Russia’s icebreaker fleet is key to the country’s Arctic hydrocarbon strategy. In order to escort oil and gas
    tankers on the much longer and more challenging voyage from the Yamal and Gydan peninsulas to Asia, rather than the much shorter and less iceinfested route to Europe, Russia relies on Atomflot’s fleet of nuclear icebreakers.
