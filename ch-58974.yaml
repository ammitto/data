  justification: Task Force ‘Rusich’ is a Russian paramilitary group which maintains
    links to Russian private military company Wagner Group, possibly operating as
    a sub-unit of Wagner. Task Force ‘Rusich’ is participating in combat alongside
    Russia’s military in the war of aggression against Ukraine. ‘Rusich’ has a long
    history of fighting alongside Russia-backed proxies in the Donbas region of Ukraine,
    and in 2015, ‘Rusich’ mercenaries were accused of, and filmed, committing atrocities
    against deceased and captured Ukrainian soldiers.
