  justification: In the position of prosecutor at the Minsk Municipal Court, Raman
    Biziuk has represented the Lukashenka regime in numerous politically-motivated
    cases, in particular against Marfa Rabkova and Andrei Chapiuk, who receiving exceptionally
    lengthy verdicts of 15 and six years in prison, respectively, and their eight
    co-defendants who received prison verdicts of between five and 17 years. Marfa
    Rabkova was imprisoned on politically-motivated charges of ‘training people to
    participate in mass riots or financing such activities’ for coordinating the volunteer
    service at the internationally recognized human rights group Viasna and organising
    the monitoring of the election in Aug 2020. She also documented cases of torture
    and other ill-treatment against detained protesters. Marfa Rabkova was one of
    the first members of Viasna to be targeted by the authorities with politically-motivated
    criminal charges after the protests in Aug 2020. Andrei Chapiuk was charged for
    participation in a criminal organisation and the incitement of hatred, among other
    things, for his engagement in Viasna as a volunteer. Their trial was held behind
    closed doors by request of prosecutor Raman Biziuk and approval by judge Siarhei
    Khrypach due to the alleged existence of ‘materials of extremist nature’ in the
    case. Raman Biziuk is also responsible for the politically-motivated prosecution
    against the co-defendants in the same trial, namely Akihiro Haeuski-Hanada, Alyaksandr
    Frantaskevich, Alykaksei Galauko, Alyaksandr Kazlyanka, Pavel Shpteny, Mikita
    Dranets, Andrei Marach and Daniil Chul. He is also responsible for the politically-motivated
    charges against Andrei Linnik and Anton Bialenski as well as against Dzmitry Kanapelka,
    Vitalii Kavalenka, Tsimur Pipiya, Dzianis Boltuts, Vital Shyshlou and Emil Huseinau.
    Raman Biziuk is therefore responsible for serious violations of human rights,
    the repression of civil society and democratic opposition, and activities that
    seriously undermine democracy or the rule of law in Belarus.
