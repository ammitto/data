  justification: In his position as Deputy Chairman and judge of the Oktyabrsky District
    Court in Minsk, Aliaksandr Rudzenka is responsible for numerous politically motivated
    rulings against journalists, activists and protesters, in particular fining an
    elderly and disabled protester, as well as the sentencing of Lyudmila Kazak –
    the lawyer of Mariya Kalesnikava, Belarussian opposition leader. Violations of
    rights of defence and right to a fair trial were reported during trials conducted
    under his supervision. He is therefore responsible for serious human rights violations
    and for seriously undermining the rule of law, as well as for the repression of
    civil society and democratic opposition.
