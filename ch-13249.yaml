  justification: Chief Justice of Isfahan, former Attorney General of Isfahan, former
    Deputy Prosecutor of Isfahan and former Head of the Ministry of Justice office
    in Yazd. In his various roles in the judiciaries of Isfahan and Yazd, including
    in his current role as Chief Justice of Isfahan, he has directly participated
    in and is responsible for the violation of citizens’ rights, in particular the
    right to freedom of speech, the right to protest, the right to life, and the violation
    of the prohibition on torture. Mohammad Reza Habibi also played a direct role
    in the suppression and gross violation of the right to protest during the nationwide
    protests in January 2017 and November 2019. Therefore, in his role as Chief Justice
    of Isfahan, he is responsible for serious human rights violations in Iran.
