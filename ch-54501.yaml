  justification: Dzianis Mikusheu is the Head of the Department for Supervision of
    Compliance with the Law of Court Decisions in Criminal Cases of the Prosecutor’s
    Office of the Gomel Region/Oblast and senior legal adviser. In that position,
    he is responsible for initiating the prosecutions of Siarhei Tsikhanouski, Artsiom
    Sakau, Dzmitry Papou, lhar Losik, Uladzimir Tsyhanovich and Mikalai Statkevich.
    He contributed to the arbitrary detention of Siarhei Tsikhanouski, as presented
    in the report by the Human Rights Council’s Working Group on Arbitrary Detention.
    He is therefore responsible for serious human rights violations and for undermining
    the rule of law, as well as for the repression of civil society and democratic
    opposition.
