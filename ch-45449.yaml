  justification: In her position as judge of the Leninsky District Court in Minsk,
    Anastasia Achalava is responsible for numerous politically motivated rulings against
    journalists, activists and protesters, in particular the sentencing of Coordination
    Council member Dzmitry Kruk, as well as against medical personnel and senior citizens.
    Reliance on statements of anonymous witnesses was reported during trials conducted
    under her supervision. She is therefore responsible for serious human rights violations
    and for seriously undermining the rule of law, as well as for the repression of
    civil society and democratic opposition.
