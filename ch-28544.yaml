  justification: Arkady Rotenberg is a leading businessperson operating in Russia
    with close personal ties to the President of the Russian Federation Vladimir Putin.
    Since Mar 2014, Rotenberg, or his companies, have received State contracts totalling
    over USD 7 billion. In 2015, Rotenberg led the annual list of government contracts
    in terms of value, after being awarded contracts worth RUB 555 billion from the
    Russian Government. Many of these contracts were awarded without formal competitive
    processes. On 30 Jan 2015, Prime Minister Dmitry Medvedev signed a decree that
    awarded to Rotenberg’s company, Stroygazmontazh, a State contract for the construction
    of the Kerch bridge from Russia to the illegally annexed Autonomous “Republic
    of Crimea”.
