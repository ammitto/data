  justification: In her position as Head of the Directorate of Sentence Enforcement
    of the Penal Correction Department of the Ministry of Internal Affairs that has
    authority over detention facilities, Zhana Baturitskaia is responsible for the
    inhumane and degrading treatment, including torture, inflicted on citizens who
    participated in peaceful protests and were detained in those detention facilities
    in the wake of the 2020 presidential election, in line with the address of Lukashenka
    to officers of the Interior Ministry. In her position, she bears responsibility
    for detention conditions in Belarusian prisons, including the categorisation of
    prisoners corresponding to different kind of ill-treatment and torture the detainees
    are subject to, such as verbal abuse, punitive isolation, deprivation of calls
    and visits, mutilation, beatings, brutal torture. She is therefore responsible
    for serious human rights violations and for the repression of civil society and
    democratic opposition.
