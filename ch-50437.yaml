  justification: Viktor Vladimirovich Gulevich is the Chief of the General Staff of
    the Belarussian Armed Forces - First Deputy Defence Minister of the Republic of
    Belarus. He is part of the Belarussian army, which has supported Russian military
    aggression against Ukraine. In this position he supported, supervised and publicly
    commented on the joint Belarussian-Russian military exercises which prepared and
