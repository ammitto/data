  justification: Maung Maung Ohn has been the Minister of Information since 1 Aug
    2021. He was appointed by the State Administrative Council (SAC), led by Commander-in-Chief
    Min Aung Hlaing, which took over the legislative, executive and judicial powers
    of the State as of 2 Feb 2021. He was previously Minister of Hotels and Tourism,
    having been appointed on 7 Feb 2021. As Government Minister, he forms part of
    the military regime which seized power during a military coup and overthrew legitimately
    elected leaders in Myanmar/Burma. As Minister of Information, he has control over
    the State-owned media (MWD, MRTV, Myanmar Alin, Kyemon and Global New Light of
    Myanmar newspapers and the Myanmar News Agency (MNA) and Myanmar Digital News),
    and thus controls the broadcast and publication of official news. He has continued
    and further strengthened the repressive policies following the military coup,
    notably by amending the Television and Radio Broadcasting Law, imposing additional
    restrictions on the freedom of expression and press freedom, including by restricting
    internet access, criminalising journalism and imprisoning journalists. Additionally,
    he instructed the members of the Myanmar Media Council, an independent body, to
    implement the government’s objectives. Therefore, his actions, policies and activities
    undermine democracy and the rule of law in Myanmar/Burma, and he is engaged in
    actions that threaten the peace, security and stability of Myanmar/Burma.
