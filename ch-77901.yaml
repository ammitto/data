  justification: Aliaksei Kriakvin is a propagandist for the State-owned ONT TV channel
    and is engaged in the production of propaganda material in support of the Lukashenka
    regime. In particular, he was directly involved in the work on ONT’s “special
    investigation” about the criminal case of Viktor Babariko, in which data from
    the preliminary investigation were disclosed. He appears in television programmes,
