  justification: Former Vice-President of the National Electoral Council (Consejo
    Nacional Electoral (CNE)) and President of the Political Participation and Financing
    Commission (August 2020 – May 2021). Leonardo Enrique Morales Poleo was appointed
    Vice-President of the CNE and President of the Political Participation and Financing
    Commission on 7 August 2020 by the Supreme Court (Tribunal Supremo de Justicia
    (TSJ)) although this prerogative belongs to the National Assembly. Moreover, just
    prior to his appointment he served in the Advanced Progressive Party (Avanzada
    progresista). As member (rector) and Vice-President of the CNE, he fully took
    part in the decision-making process of the CNE. He supported and facilitated the
    supervision of the electoral process that led to the non-democratic elections
    of the National Assembly on 6 December 2020. His actions have therefore further
    undermined democracy and the rule of law in Venezuela. Leonardo Enrique Morales
    Poleo accepted to be appointed to the CNE and remained in his position as Vice-President
    of the CNE while democracy was severely undermined in Venezuela.
