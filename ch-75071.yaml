  justification: Vadim Sardanov is the temporary General Director of Joint Stock Company
    (JSC) 103 Armoured Repair Plant, a company specialised mostly in the repair and
    maintenance of tanks and armoured vehicles. It is the largest armoured vehicle
    repair and modernisation enterprise in the Russian Far East, located in the village
    of Atamanovka in the Transbaikal Territory. The plant received a government order
    for the repair and modernisation of 800 tanks for the next three years. Government
    officials praised the work of the plant for the preparation of T-62 tanks removed
    from storage for Russia’s war of aggression against Ukraine.
