  justification: A. Ties to Senior Members of the Former Iraqi Regime. Information
    available also indicates that after Operation Iraqi Freedom, Yasir Sabawi Ibrahim
    Hasan Al-Tikriti provided support to elements of the former regime and to groups
    carrying out attacks against Iraqi and Coalition forces, as well as against Iraqi
    civilians. B. Support to Members of the Former Iraqi Regime. Information indicates
    that Yasir Sabawi Ibrahim Hasan Al-Tikriti acted as a financier and bodyguard
    for Saddam Hussein prior to Saddam Hussein’s capture by U.S. forces. Additionally,
    after Operation Iraqi Freedom, Yasir Sabawi Ibrahim Hasan Al-Tikriti allegedly
    transferred funds to regime loyalists, and transported a large sum of money to
    Saddam Hussein’s wife, Sajida Khayrallah Tilfah, on Saddam Hussein’s behalf. Sajida
    Khayrallah Tilfah was designated by the 1518 Committee of the United Nations Security
    Council and was listed in the Annex to Executive Order 13315 by the U.S. Government.
    C. Activities against the New Iraqi Government, Coalition Forces, and Iraqi Civilians.
    According to available information, Yasir Sabawi Ibrahim Hasan Al-Tikriti directed
    a number of anti-Coalition activities in Iraq, and maintained communication with
    several insurgent groups throughout northern and central Iraq. Yasir Sabawi Ibrahim
    Hasan Al-Tikriti also provided financial support, weapons, and explosives for
    anti Coalition elements. D. Immediate Family Member of Senior Former Iraqi Regime
    Official. Yasir Sabawi Ibrahim Hasan Al-Tikriti falls under the requirements of
    Security Council resolution 1483 (2003) by virtue of him being an «immediate family
    member» of a senior former Iraqi regime official. His father, Sabawi Ibrahim Hasan
    Al-Tikriti, was former Presidential Advisor to Saddam Hussein.
