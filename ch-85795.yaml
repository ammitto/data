  justification: Mohamed Ali Ahmed Subir is a Lieutenant General in the Sudanese Armed
    Forces (SAF) and the Director of the Directorate of Military Intelligence (DMI)
    of the SAF. In this capacity, he has been in charge of the operations carried
    out by the DMI since the outbreak, on 15 April 2023, of the conflict between the
    SAF, the Rapid Support Forces (RSF) and their allied armed groups. This is underscored
    by his participation in publicly disclosed high-level meetings of senior commanders
    of the SAF, headed by Commander-in-Chief Abdelfattah Al-Burhan of the General
    Command of the SAF in Khartoum in May and July 2023.
