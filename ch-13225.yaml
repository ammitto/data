  justification: Head of Ward 5 and in charge of solitary confinement in EU-listed
    Rajaee Shahr Prison since 2015; formerly Keeper of Ward 1 of Rajaee Shahr Prison,
    Karadj until Jul 2010. Several former detainees have denounced his use of torture,
    as well as orders he gave to prevent inmates receiving medical assistance. According
    to a transcript of one reported detainee in the Rajaee Shahr Prison, wardens all
    beat him severely, with Akharian's full knowledge. There is also at least one
    reported case of ill treatment and the death of a detainee, Mohsen Beikvand, under
    Akharian's wardenship. Beikvand died in Sep 2010. Other prisoners claim credibly
    that he was killed by the instructions of Hassan Akharian.
