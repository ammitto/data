    Kresik to 12 days in jail, and Valeria Niadzvitskaya, Valiantsyna Busko and Hanna
    Dainiak to 10 days in jail. On 27 Dec 2010, he sentenced the deputy leader of
    the "Young Front" to 10 days in jail for his participation in the demonstration
    on 19 Dec 2010. On 4 and 7 Jul 2011, on 8 Nov 2011, and on 20 Dec 2011, he sentenced
    several activists (Viktoriya Bandarenka, 10 days in jail; Andrei Zakhareuski,
    5 days in jail; Mikhail Muski, 7 days in jail; Raman Grytsevich, 7 days in jail).
    The way he conducted the trials was a clear violation of the Code of Criminal
    Procedure. He sustained the use of evidence and testimonies irrelevant to the
    accused.
