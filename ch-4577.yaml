  justification: First Deputy Head of the Main Justice Department at the Minsk City
    Administration. Former Deputy President of the Minsk Central District Court, former
    Judge of the Minsk Central District Court. On 6 Aug 2006, he sentenced the civil
    society activists of the Civic Initiative "Partnership" to jail for having monitored
    the presidential elections in 2006. Nikolai Astreiko was sentenced to 2 years
    in jail, Timofei Dranchuk to 1 year, Aleksandr Shalaiko and Enira Bronitskaya
    to 6 months. In 2007, 2010, 2011 and 2012, he sentenced several activists to days
    in jail; particularly on 20 Dec 2010, he sentenced Andrei Luhin, Serhey Krauchanka,
    Stanislau Fedorau to 10 days in jail and, Volha Chernykh to 12 days in jail. On
    21 Dec 2010, he sentenced Mykalai Dzemidenka to 15 days in jail. On 20 Dec 2011,
    he sentenced two activists who participated in an action on the anniversary of
    the events of 19 Dec 2010, Vassil Parfenkau and Siarhey Pavel respectively to
    15 and 12 days in jail. On 6 Sep 2012, he sentenced Aliaksey Tseply to 5 days
    in jail for alleged resistance to a policeman, whereas he was distributing an
    opposition newspaper in central Minsk. His way of conducting the trials was a
    clear violation of the Code of Criminal Procedure.
