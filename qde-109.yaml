comments1: Reportedly defunct. Used to be officially registered in Bosnia and Herzegovina
  under registry number 24. Al-Haramain & Al Masjed Al-Aqsa Charity Foundation ceased
  its work by decision of the Ministry of Justice of the Bosnia and Herzegovina Federation
  (decision on cessation of operation number 03-05-2-203/04). It was no longer in
  existence as of Dec. 2008. Its premises and humanitarian activities were transferred
  under Government supervision to a new entity called Sretna Buducnost. Review pursuant
  to Security Council resolution 1822 (2008) was concluded on 22 Jun. 2010. Review
  pursuant to Security Council resolution 2368 (2017) was concluded on 24 November
  2020. Review pursuant to Security Council resolution 2610 (2021) was concluded on
  8 November 2022. INTERPOL-UN Security Council Special Notice web link:https://www.interpol.int/en/How-we-work/Notices/View-UN-Notices-Individuals
