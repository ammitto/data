  justification: Anton Kalyaga is an investigator of the Main Directorate for Investigating
    Crimes in the Sphere of Organized Crime and Corruption of the Central Office of
    the Investigative Committee of the Republic of Belarus. He conducts the criminal
    case against Viasna members. The judicial proceedings against Ales Bialiatski,
    Valianstin Stefanovich and Uladzimir Labkovich include numerous irregularities
    and the investigation period has been artificially extended by the authorities
    in an attempt to fabricate evidence, exceeding the time limit established by Belarusian
    law and international standards governing the right to a fair trial. The investigation
    and trial of the Viasna case did not comply with the rule of law. He is therefore
    responsible for serious human rights violations and for seriously undermining
    the rule of law, as well as for the repression of civil society and democratic
    opposition in Belarus.
