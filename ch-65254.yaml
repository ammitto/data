  justification: In her position of Head of Penal Colony No.°4 for women in Gomel,
    Sviatlana Pakhodava is responsible for the inhuman and degrading treatment, including
    torture, inflicted on the political prisoners and other citizens detained in that
    female penal colony. She was already the head of the penal colony at the time
    of the prosecution of Maria Kalesnikava, a political prisoner who was handed an
    11-year custodial sentence for her participation in the protests against the authoritarian
    rule of Aliaksandr Lukashenko in the penal colony. She was deprived of all prisoner
    rights, including the right to consult a lawyer. She is therefore responsible
    for serious violations of human rights and the repression of civil society in
    Belarus.
