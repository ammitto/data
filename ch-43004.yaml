  justification: Member of the non-democratically elected National Assembly. Former
    member and illegitimately elected second Vice-President of the National Assembly
    elected in 2015. Illegitimately appointed director of the ad-hoc board of the
    political party Voluntad Popular. As a member of the National Assembly elected
    in 2015, he staged his election as the second Vice-President of the National Assembly
    on 5 Jan 2020, thereby undermining democracy and the rule of law in Venezuela.
    The election took place while entry of several parliamentarians to the premises
    of the National Assembly was blocked by military police, and without a quorum
    being reached. Therefore, opposition members had to organise themselves outside
    of the premises of the National Assembly to re-elect Juan Guaidó as its President.
    Shortly after the staged election of Noriega, supported by the regime’s political
    party (PSUV), the election of the Board of Directors of the National Assembly
    was welcomed by Maduro and the non-recognised National Constituent Assembly (ANC).
    In Jul 2020, Noriega, helped by the Venezuelan Supreme Court of Justice (Tribunal
    Supremo de Justicia (TSJ)), illegitimately took over the leadership of the political
    party Voluntad Popular, thereby further undermining democracy in Venezuela.
