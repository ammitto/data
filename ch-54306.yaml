  justification: Otkritie FC Bank, formerly known as NOMOS Bank, is one of Russia’s
    10 largest banks and a systemically important financial institution for the Government
    of the Russian Federation. The Central Bank of Russia is the main investor of
    Otkritie Bank, holding 99-100 % of the shares. As one of Russia’s leading State-owned
    financial institutions, Otkritie Bank generates high revenue for the Russian Central
    Bank and the Government of the Russian Federation. Otkritie Bank is therefore
    an entity or body supporting, materially or financially, or benefitting from the
    Government of the Russian Federation, which is responsible for the annexation
    of Crimea and the destabilisation of Ukraine as well as a legal person, entity
    or body involved in economic sectors providing a substantial source of revenue
    to the Government of the Russian Federation, which is responsible for the annexation
    of Crimea and the destabilisation of Ukraine.
