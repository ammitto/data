  justification: Second Vice-President of the Supreme Court (Tribunal Supremo de Justicia
    (TSJ)), and President of the Constitutional Chamber of that court, since January
    2024. Former member (rector) of the National Electoral Council (Consejo Nacional
    Electoral (CNE)) for the period 2016-2023. Former Member (rector) of the CNE for
    the period 2010-2016. Tania d’Amelio Cardiet, as rector of the CNE since 2010,
    contributed directly by her activity in her functions to the undermining of democracy
    and the rule of law in Venezuela, including by preparing the non-democratic 2020
    National Assembly elections, participating in the change of 30 June 2020 to the
    electoral norms for those elections, and participating in the organisation and
    execution of the 2018 presidential elections. Moreover, Tania d’Amelio Cardiet
    accepted her 2016 appointment at the CNE by the Supreme Court, although this prerogative
    belongs to the National Assembly.
