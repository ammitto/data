  justification: Viktor Silivakin is the Executive Director of Open Joint Stock Company
    (OJSC) Barnaultransmash, a Russian military industry company manufacturing diesel
    engines for military vehicles and supplying the Russian Armed Forces. The company
    designed and produces the UTD-29 diesel engine, which is mainly used as a propulsion
    system for the BMP-3 infantry fighting vehicle. Those vehicles are the main infantry
    fighting vehicles in the Russian Army and have played a crucial role in the invasion
    of Ukraine. They are used on the front in every combat action. As the Executive
    Director, Viktor Stepanovich Silivakin oversees and controls production by OJSC
    Barnaultransmash.
