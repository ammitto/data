  justification: Colonel Khin Maung Yi is the current Minister for Natural Resources
    and Environmental Conservation (MONREC). He was Permanent Secretary in this department
    under the democratically elected government. On 1 Feb 2021, the Myanmar Armed
    Forces (Tatmadaw), led by Commander-in-Chief Min Aung Hlaing, staged a coup in
    Myanmar by setting aside the results of the elections held on 8 Nov 2020 and by
    overthrowing the democratically elected government. As part of the coup, Vice-President
    Myint Swe, functioning as Acting President, declared a state of emergency and
    transferred the legislative, executive and judicial powers of the state to the
    Commander-in-Chief of Defence Services Senior General Min Aung Hlaing. On 2 Feb,
    the SAC was established to exercise those powers, preventing the democratically
    elected government from fulfilling its mandate. Colonel Khin Maung Yi was appointed
    Minister for Natural Resources and Environmental Conservation (MONREC) on 2 Febr
    2021 by the State Administrative Council (SAC) led by Commander-in-Chief Min Aung
    Hlaing. According to Myanmar law, MONREC is sole responsible for management the
    exploitation of natural resources of Myanmar, having a crucial role in the exploitation
    and trade of, among others, resources such as gemstones, pearls and other mineral
    resources as well as forestry. Under his leadership, MONREC controls Myanmar Pearl
    Enterprise (MPE), Myanmar Gems Enterprise (MGE) and Myanmar Timber Enterprise
    (MTE), having exclusive rights on the production and trade of resources on their
    areas of competence. By accepting his nomination to Minister for Natural Resources
    and Environmental Conservation and through his role in the exploitation of natural
    resources of Myanmar, Khin Maung Yi contributes to the funding of the military
    regime, therefore he is responsible for undermining democracy and the rule of
    law in Myanmar/Burma.
