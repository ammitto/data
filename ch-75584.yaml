  justification: Taymuraz Bolloyev is a Russian businessperson who is closely associated
    with leading Russian decision-makers. In July 2023, the European entity Carlsberg
    A/S was subject to an asset seizure ordered by Presidential Decree. Baltica, Carlsberg’s
    former subsidiary in Russia, was transferred to the Federal Agency for State Property
    Management (Rosimushchestvo). Bolloyev was subsequently appointed as President
    of the seized Baltica entity without the consent of Carlsberg A/S. Bolloyev has
    thus been appointed to the governing bodies of an entity established in Russia,
    previously owned or controlled by entities established in the Union, without the
    consent of the Union entities which previously owned or controlled them.
