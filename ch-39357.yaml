  justification: Secretary-General of the National Electoral Council (CNE) from 2009
    until June 2020. In that role, Moreno Reyes facilitated, legitimised and gave
    credibility to CNE decisions, since the Secretary-General of the CNE has a role
    in agenda-setting and formalising decisions. Moreno Reyes remained Secretary-General
    of CNE while democracy was severely undermined and the independent role of the
    CNE within the electoral process was compromised. He is therefore responsible
    for undermining democracy in Venezuela, including facilitating the establishment
    of the illegitimate Constituent Assembly and the manipulation of the electoral
    process.
