  justification: |-
    Engaging in or providing support for acts that undermine the peace, stability or security of the Central African Republic (CAR): Noureddine is one of the original leaders of the Séléka. He has been identified as both a General and the President of one of the armed rebel groups of the Séléka, the Central PJCC, a group formally known as the Convention of Patriots for Justice and Peace and whose acronym is also acknowledged as CPJP. As former head of the “Fundamental” splinter group of the Convention of Patriots for Justice and Peace (CPJP/F), he was the military coordinator of the ex-Séléka during offensives in the former rebellion in the Central African Republic between early Dec 2012 and Mar 2013. Without Noureddine’s involvement, the Séléka would likely have been unable to wrest power from former CAR President François Bozizé. Since the appointment as interim president of Catherine Samba-Panza on 20 Jan 2014, he was one of the main architects of the ex-Séléka’s tactical withdrawal in Sibut with the aim of implementing his plan to create a Muslim stronghold in the north of the country. He had clearly urged his forces to resist the injunctions of the transitional government and of the military leaders of the African-led International Support Mission in the Central African Republic (MISCA). Noureddine actively directs ex-Séléka, the former Séléka forces that were dissolved by Djotodia in Sep 2013, and directs operations against
    Christian neighborhoods and continues to provide significant support and direction to the ex-Séléka operating in CAR.
