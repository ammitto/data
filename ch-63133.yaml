  justification: |-
    Mikhail Leontyev is a propagandist on Pervyi Kanal (Channel One), a major Russian TV channel which is under the permanent direct control of the Russian Federation. Pervyi Kanal amplifies and supports the policies of the Russian authorities through its propaganda activities. During the war of aggression against Ukraine, Pervyi Kanal has been among the most active and prominent instruments in spreading the Kremlin narrative and supporting the war with aggressive commentaries and undermining Ukraine’s territorial integrity, supporting the illegal annexation of Crimea, and Russia’s war of aggression against Ukraine. He is also a vice-president and press-secretary of Rosneft. Since 1999, he has been the author and a presenter of a flagship programme
    “Odnako” on Pervyi Kanal, where he routinely undermines the statehood of Ukraine and justifies the war of aggression against Ukraine.
