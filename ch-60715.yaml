  justification: Elektropribor JSC is a leading company in the Russian maritime defence
    industry. Elektropribor JSC develops and manufactures high-precision navigation,
    gyroscopy, gravimetry, and optical electronic systems for submarines, as well
    as marine communication systems. Elektropribor JSC holds an active licence from
    the Russian Ministry of Industry for the development of weapons, ammunition, and
    military equipment. In particular, Elektropribor JSC produces navigation systems
    for Russian Federation Navy combat ships. The company describes itself as “ensuring
    high operational availability of Russia’s naval submarine forces”.
