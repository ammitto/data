  justification: JSC “Alabuga” Special Economic Zone of Industrial and Production
    Type is responsible for the Alabuga special economic zone (SEZ) in the Russian
    Federation (Tatarstan) that was established in 2006. The Alabuga SEZ hosts manufacturing
    facilities including SuperCam, Aviatest Aero and Albatros that assemble unmanned
    aerial vehicles (UAVs). Those facilities are part of a Russian State-backed programme
    and have been set up with assistance from Iran in the training of staff and supply
    of material in order to assemble military drones for use in Russia’s war of aggression
    against Ukraine. The UAVs (Shahed-136) produced in the Alabuga SEZ with the financing
    of the State-owned VTB Banking Group are used by the Russian army in Ukraine.
    Therefore, JSC “Alabuga” is associated with JSC Albatros, AviatestAero and SuperCam
    Unmanned Systems Group.
