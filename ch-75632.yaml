  justification: Dmitriy Mezentsev is the Presidential Representative in the Constitutional
    Court of the Russian Federation and the former State Secretary of the Union State
    of Russia and Belarus. In his role as the State Secretary of the Union State of
    Russia and Belarus, Mezentsev contributed to the illegal deportation and adoption
    of Ukrainian children. He facilitated the unlawful deportation to Belarus and
    re-education of Ukrainian children. The activities pursued by Mezentsev are part
    of a broader strategy of the Russian Federation to illegally deport Ukrainian
    citizens, in which the Republic of Belarus is complicit. Since its war of aggression
    against Ukraine, Russia has transferred many Ukrainian civilians to Russian-occupied
    areas, to Russia itself and to Belarus, while often denying or impeding those
    civilians from having safe passage to government-held parts of Ukraine. Mezentsev
    is one of the senior leaders involved in the forcible deportation and abduction
    of Ukrainian children to Belarus. Mezentsev’s actions violate the rights of Ukrainian
    children and infringe Ukrainian law and administrative order.
