  justification: Artem Yamshchikov is the owner and General Director of OOO TSK Vektor,
    a company within the Russian military-industrial complex. OOO TSK Vektor has acted
    as an intermediary between IEMZ Kupol, a subsidiary of Russian state-owned arms
    company Almaz-Antey, and Chinese suppliers manufacturing long-range attack drones
    of the type Garpiya-3 (G3), which are developed and produced for use in Russia’s
    war of aggression against Ukraine. In particular, OOO TSK Vektor has received
    components from Redlepus TSK Vektor Industrial (Shenzhen) Co., Ltd and Juhang
    Aviation Technology Shenzhen Co. Limited, including parts from Xiamen Limbach,
    a Chinese entity producing L550 drone engines.
