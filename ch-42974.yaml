  justification: Minister of Electricity and Vice-President of Public Works and Utilities
    since 23 April 2024. Former Minister of the Office of the Presidency and Director-General
    of the National Commission of Telecommunications (CONATEL) since 7 August 2017.
    His actions have undermined democracy or the rule of law in Venezuela, including
    by severely limiting the rights of the Venezuelan people to a free press, free
    speech and information. He used the special powers of CONATEL to silence criticism
    and dissidents of the regime by blocking, filtering and obstructing internet websites,
    by revoking existing licences for radio and television stations and by refusing
    to grant new ones.
