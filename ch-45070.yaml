  justification: U Chit Naing was the Minister of Union Government heading the Ministry
    of Union Government Office from 1 Aug 2021 until 18 Aug 2022. He was the Minister
    for Information from 2 Feb 2021 to 31 Jul 2021. He was appointed by the Chairman
    of the State Administrative Council (SAC) that took over the legislative, executive
    and judicial powers of the State as of 2 Feb 2021. As Minister for Information,
    he was responsible for state-owned media (MWD, MRTV, Myanmar Alin, Kyemon and
    Global New Light of Myanmar newspapers, as well as the Myanmar News Agency (MNA)
    and Myanmar Digital News), and thus for the broadcasting and publication of official
    news. During his term as Minister for Information, the newspapers were filled
    with pro-military articles and he is therefore responsible for junta propaganda
    and spreading disinformation through state media that are not reporting accurately.
    He is directly responsible for decisions that led to the crackdown on Myanmar
    media. This includes directives, which ordered independent media not to use the
    words “coup”, “military regime” and “junta”, and which has seen five local news
    outlets banned in the country. In his previous positions as member of the government,
    his actions, policies and activities undermined democracy and the rule of law
    in Myanmar/Burma.
