  justification: Sergei Borissovich Korolev is the First Deputy Director of the Russian
    FSB, since February 2021. He is reported to be closely associated with FSB Director
    Alexander Bortnikov, and businessmen Arkadii and Boris Rotenberg. He is indicated
    as a potential replacement for Bortnikov in the position of Head of the FSB. He
    is a career officer in the FSB, having served there since the 2000s and having
    previously served as the director of the FSB’s Economic Security Service. In 2021,
    Vladimir Putin awarded him the rank of Army General, which is a distinctive senior
    rank reward. He is therefore supporting and benefitting from Russian decision
    makers responsible for the annexation of Crimea or the destabilisation of Eastern
    Ukraine.
