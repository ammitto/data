  justification: Vladimir Bulavin is the former Head of the Federal Customs Service
    of the Russian Federation and the Chairman of the Federation Council Committee
    on Defence and Security. As the Chairman of the Federation Council Committee on
    Defence and Security, Vladimir Bulavin heads the Committee responsible for legal
    support of Russian defence politics. In his role as Head of the Federal Customs
    Service, Vladimir Bulavin supervised efforts to secure parallel imports into Russia
    in order to undermine trade and customs restrictions and authorised the opening
    of offices and the exercise of direct authority over customs processes in the
    illegally annexed territories of Donetsk, Luhansk, Kherson and Zaporizhzhia, and
    the imposition of Russia’s customs code on those territories.
