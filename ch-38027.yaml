  justification: Muhindo Akili Mundos is an FARDC General, Commander of the 31st Brigade.
    He was appointed commander of the FARDC’s Operational Sector in the areas of Beni
    and Lubero, including Operation Sukola I against the Allied Democratic Forces
    (ADF) in September 2014. He remained in that position until June 2015. He is also
