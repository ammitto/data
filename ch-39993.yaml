  justification: Major Aung Myo Thu is the Field Unit Commander of 33rd Light Infantry
    Division (LID) of the Myanmar Armed Forces (Tatmadaw). As the Field Unit Commander
    of the 33rd LID he oversaw military operations carried out in Rakhine State in
    2017. In that context, he is responsible for the atrocities and serious human
    rights violations committed against the Rohingya population in Rakhine State in
    the second half of 2017 by the 33rd LID. These include unlawful killings, sexual
    violence and forced detention.
