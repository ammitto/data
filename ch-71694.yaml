  justification: |-
    Askon JSC is a Russian IT company that develops design, engineering and production management software for the Russian military-industrial complex. In particular, Askon JSC develops digital modelling software for JSC United Shipbuilding Corporation, JSC Research and Production Corporation URALVAGONZAVOD, JSC Tactical Missiles Corporation (KTRV), and JSC Almaz-Antey Air and Space Defence Corporation. Moreover, Askon JSC develops engineering software used for the manufacturing of missile systems deployed by the Russian Armed Forces, including the intercontinental
    ballistic missile system Topol-M, the short-range ballistic missile system Iskander-M, and the portable surface-to-air missile system (MANPADS) Igla.
