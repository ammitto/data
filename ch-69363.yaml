  justification: Alyona Trokai is the leader of the “Movement of the First” in the
    Zaporizhzhia region. The “Movement of the First” was established in Russia with
    the backing and under the supervision of President of the Russian Federation Vladimir
    Putin. The organisation, using its own television and radio broadcasting capabilities,
    aims to carry forward the traditions of the Soviet pioneers and actively contribute
    to the patriotic upbringing of Russian society as well as developing anti-Ukrainian
    sentiments in children from the territories illegally occupied by the Russian
    Federation. In her position as the leader of the “Movement of the First” in the
    Zaporizhzhia region, Alyona Trokai began activities that aim to support the Russian
    military and in general the Russian Federation propaganda. She is also undertaking
    activities aimed at the “militarisation” of education and encouraging the acquisition
    of Russian passports. On 30 April 2023, Alyona Trokai received a Russian state
    award, presented by the First Deputy Head of the Administration of the President
    of the Russian Federation Sergey Kiriyenko. Therefore, Alyona Trokai is supporting
    and implementing actions and policies which undermine and threaten the territorial
    integrity, sovereignty and independence of Ukraine.
