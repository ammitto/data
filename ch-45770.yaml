  justification: In his former position as Deputy Head of the Penal Correction Department
    that has authority over detention facilities of the Ministry of Internal Affairs,
    Aleh Lashchynouski is responsible for the inhumane and degrading treatment, including
    torture, inflicted on citizens who participated in peaceful protests and were
    detained in those detention facilities in the wake of the 2020 presidential election,
    in line with the address of Lukashenka to officers of the Interior Ministry. In
    his former position, he bears responsibility for conditions in Belarusian prisons
    and the repressive measures taken there, including the categorisation of prisoners
    corresponding to different kinds of ill-treatment and torture the detainees are
    subject to, such as verbal abuse, punitive isolation, deprivation of calls and
    visits, mutilation, beatings and brutal torture. He is therefore responsible for
    serious human rights violations and for the repression of civil society and democratic
    opposition.
