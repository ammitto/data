  justification: Serguey Mndoiants is former executive vice-president in charge of
    government relations for the Russian conglomerate company AFK Sistema PAO, active
    in the telecommunication and IT sector. Serguey Mndoiants is also former senior
    vice- president and shareholder of VLM Invest, a consulting firm acting as an
    intermediary between private companies and government bodies of the Russian Federation.
    He also has shares in the First Independent Rating Agency (Fira) and in the Regional
    Public Foundation for the Development of Business Cooperation and Entrepreneurship.
    Serguey Mndoiants is also a member of the board of the Council for foreign and
    defence policy (SVOP), a think tank advising the Government of the Russian Federation
    on the conduct of foreign and defence policy.
