  justification: Rustem Sulteev is First Deputy General Director of “TAIF” Management
    Company for production and commercial activities; Chairman of the Board of Directors
    of TAIF JSC; First Deputy Chairman of the Management Board of TAIF JSC for production
    and commercial activities. TAIF JSC is the parent company of the TAIF group of
    companies, which includes companies operating in various areas of the economy
    including oil and gas processing, petrochemical raw materials, retail sales of
    petroleum products, telecommunications, construction, and investment, financial
    and trade services. Among those companies is TAIF-NK PSC, which provides aviation
    fuel for the Russian Armed Forces. Rustem Sulteev is also a shareholder of PJSC
    SIBUR Holding, a Russian petrochemicals company, and of Avers Bank. He is also
    co-owner of Vulkan LLC, a company which was used for the transfer of assets between
    TAIF JSC and SIBUR Holding.
