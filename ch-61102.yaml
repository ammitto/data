  justification: Viktoria Yakimova is one of the main contributors to Russia’s so-called
    “humanitarian mission” entitled “Into the Hands of Children”. Within the framework
    of the “Into the Hands of Children” action, the Russian authorities – led by the
    Russian Commission for Children’s Rights – have sought to illegally deport and
    place for adoption Ukrainian children under the guise of “humanitarian assistance”
    during Russia’s war of aggression against Ukraine. In various public appearances,
    Viktoria Yakimova confirmed that she is an active contributor to the “Into the
    Hands of Children” action. She regularly serves as a main spokesperson for the
    so-called “humanitarian mission”. Importantly, since the beginning of the war
    of aggression against Ukraine, Russia has transferred many Ukrainian civilians
    to Russian-occupied areas or to Russia itself while often preventing or impeding
    those civilians from having safe passage to non-occupied parts of Ukraine. Viktoria
    Yakimova is one of the key persons involved in the forcible deportation of Ukrainian
    children to Russia and their subsequent illegal adoption into Russian families.
    Viktoria Yakimova’s actions violate the rights of Ukrainian children and infringe
    Ukrainian law and administrative order.
