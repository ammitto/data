    construction of a multi-functional business centre in front of the presidential
    palace in Minsk. He co-owns the company VIBEL, which sells commercials on a number
    of Belarusian national TV channels. He was the chairman of the Belarusian Tennis
    Federation and Lukashenka's former aide for sports matters.
