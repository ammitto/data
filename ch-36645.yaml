  justification: Brigadier General Muhammad Hasouri is a senior officer of the Syrian
    Air Force under the former al-Assad regime, in post after May 2011. He held the
    position as Chief of Staff of Air Force Brigade 50 and Deputy Commander of the
    Shayrat Airbase. Brigadier General Muhammad Hasouri operates in the chemical weapons
    proliferation sector and was involved in the chemical massacre in “Khan Sheikhoun”
    of 4 April 2017. As a senior military officer, he is responsible for the violent
    repression of the civilian population in Syria.
