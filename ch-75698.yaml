  justification: Igor Aksyonov is one of the co-controlling shareholders of the Volga
    Dnepr Group, a leading Russian air carrier holding company, which specialises
    in heavyweight cargo transportation through domestic and international charters
    and scheduled operations. Since the beginning of Russia’s war of aggression against
    Ukraine, the Volga Dnepr Group has been playing a crucial role in servicing Russia’s
    military-industrial complex and providing air transportation services for Russian
    military purposes. The Volga Dnepr Group’s fleet consists of 12 Antonov An-124
    type planes, five Boeing 747-8F and five IL-76TD-90VD (IV). Volga Dnepr Airlines
    LLC has significant air operations and provides transportation services in sectors
    of strategic significance for the Russian Government, by importing from third
    countries electronics, IT and communication equipment which are relevant for Russia’s
    efforts in its war of aggression against Ukraine. For its crucial role in supporting
    the Russian Federation, Volga Dnepr Group, including Volga Dnepr Airlines LLC,
    has received support subsidies from the Russian Government.
