  justification: Aleksandr Luzyanin is the General Director of JSC Hydromash, a leading
    Russian enterprise in the development, production and testing of landing gear,
    hydraulic cylinders and hydraulic units for all types of aircraft devices. The
    company participates in almost all domestic aircraft construction projects (both
    in civil and in military spheres). JSC Hydromash fulfils Russian state defence
    orders, and its products (chassis and other hydraulic units) are used by the Armed
    Forces of the Russian Federation. At the end of 2022, Aleksandr Luzyanin received
    a letter of acknowledgement from the Chairman of the Defence Committee of the
    State Duma of the Federal Assembly of the Russian Federation for his great personal
    contribution to strengthening the combat readiness of the Armed Forces of the
    Russian Federation. By being the General Director of JSC Hydromash, Aleksandr
    Luzyanin is responsible for the company’s actions and therefore he is supporting
    materially the Government of the Russian Federation, which is responsible for
    the annexation of Crimea and the destabilisation of Ukraine.
