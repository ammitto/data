  justification: Andrey Gartung is the General Director of Public Joint Stock Company
    “Chelyabinsk Forge and Press Plant” (PJSC CHKPZ), one of Russia’s leading enterprises
    in the machine-building and forging industries. PJSC CHKPZ’s activities are in
    economic sectors providing a substantial source of revenue to the Russian Federation.
    In 2012, PJSC CHKPZ entered the Association of Enterprises of the Military-Industrial
    Complex of the Chelyabinsk Region. Under the state defence order, it produces
    shells for artillery ammunition intended for use in Russia’s war of aggression
    against Ukraine. By being the General Director of PJSC CHKPZ, Andrey Gartung is
    responsible for its actions and therefore he is supporting materially the Government
    of the Russian Federation, which is responsible for the annexation of Crimea and
    the destabilisation of Ukraine.
