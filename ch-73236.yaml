  justification: The Missile General Bureau is the sole institution in the Democratic
    People’s Republic of Korea (DPRK) overseeing the development, planning and production
    of the DPRK’s unlawful ballistic missile programme. In light of the centralised
    nature of the DPRK’s production of ballistic missiles and the responsibility for
    such devolved to the Missile General Bureau, it plays a central role in ballistic
    missile transfers to third parties. Ballistic missiles designed, developed and
    produced under the stewardship of the Missile General Bureau have since been used
    against Ukraine by Russian Armed Forces and identified as DPRK-made devices.
